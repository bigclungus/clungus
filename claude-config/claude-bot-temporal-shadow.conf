# Temporal shadow mode toggle for subagent tracking.
# To enable: copy this file to ~/.config/systemd/user/claude-bot.service.d/temporal-shadow.conf
# then: systemctl --user daemon-reload && systemctl --user restart claude-bot.service
#
# When TEMPORAL_SHADOW=true, subagent-start.ts fires AgentTaskWorkflow in the
# "tasks" namespace alongside legacy DB writes. subagent-stop.ts sends add_metadata
# signal on completion. Both calls are non-blocking — hook exit code unaffected.
#
# Default is off (unset). Set to "false" explicitly to suppress stderr warnings.

[Service]
Environment=TEMPORAL_SHADOW=true
