name: 'Release Clungcord Tauri'
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Install deps
        working-directory: clungcord-desktop
        run: bun install
      - name: Build Tauri app
        working-directory: clungcord-desktop
        run: bun run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-clungcord
          path: clungcord-desktop/src-tauri/target/release/bundle/
          retention-days: 14
