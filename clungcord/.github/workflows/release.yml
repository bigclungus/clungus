name: 'Release Clungcord Tauri'
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Install deps
        working-directory: clungcord-desktop
        run: bun install
      - name: Build Tauri app
        working-directory: clungcord-desktop
        run: bun run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Clungcord ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            clungcord-desktop/src-tauri/target/release/bundle/**/*.dmg
            clungcord-desktop/src-tauri/target/release/bundle/**/*.exe
            clungcord-desktop/src-tauri/target/release/bundle/**/*.msi
            clungcord-desktop/src-tauri/target/release/bundle/**/*.app
            clungcord-desktop/src-tauri/target/release/bundle/**/*.AppImage
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bundle
          path: clungcord-desktop/src-tauri/target/release/bundle/
          retention-days: 14
