<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Board</title>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <style>
    /* Reset to prevent injected sitenav.css from interfering */
    :root {
      --bg: #ffffff !important;
      --accent: #333333 !important;
      --text: #333333 !important;
      --text-muted: #555 !important;
      --text-dim: #777 !important;
      --nav-bg: #f8f9fa !important;
      --nav-border: #dee2e6 !important;
      --hover-fg: #111 !important;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff !important;
      color: #333333 !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      /* Override sitenav's padding-top; account for nav bar */
      padding-top: 48px !important;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    .toolbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #333333;
      margin-right: auto;
    }

    .toolbar label {
      font-size: 13px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    .toolbar input[type="checkbox"] {
      margin-right: 4px;
    }

    .toolbar button {
      padding: 6px 14px;
      background: #ffffff;
      color: #333;
      border: 1px solid #ced4da;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .toolbar button:hover {
      background: #e9ecef;
      color: #111;
    }

    #grid-container {
      flex: 1;
      width: 100%;
    }

    /* AG Grid light spreadsheet overrides — !important to resist injected parent CSS */
    .ag-theme-alpine {
      --ag-background-color: #ffffff !important;
      --ag-header-background-color: #f8f9fa !important;
      --ag-odd-row-background-color: #fafbfc !important;
      --ag-row-hover-color: #e9ecef !important;
      --ag-selected-row-background-color: #d0e8ff !important;
      --ag-border-color: #dee2e6 !important;
      --ag-header-foreground-color: #333333 !important;
      --ag-foreground-color: #333333 !important;
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }

    .relevance-high { color: #1a7f4b; font-weight: 600; }
    .relevance-mid { color: #b8860b; font-weight: 600; }
    .relevance-low { color: #c0392b; font-weight: 600; }

    .status-new { background: #e8f4fd; color: #1565c0; }
    .status-applied { background: #fff8e1; color: #f57f17; }
    .status-referred { background: #e8eaf6; color: #283593; }
    .status-interviewing { background: #e3f2fd; color: #0277bd; }
    .status-denied { background: #fce4ec; color: #c62828; }
    .status-offer { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
    .status-stale { background: #f5f5f5; color: #9e9e9e; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Job Board</h1>
    <label>
      <input type="checkbox" id="showHidden"> Show hidden
    </label>
    <button id="refreshBtn">Refresh</button>
  </div>
  <div id="grid-container" class="ag-theme-alpine"></div>

  <script>
    const BASE = window.location.pathname.replace(/\/+$/, '');

    function salaryFormatter(params) {
      const min = params.data.salary_min;
      const max = params.data.salary_max;
      if (!min && !max) return '';
      const fmt = (v) => {
        if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
        if (v >= 1000) return '$' + Math.round(v / 1000) + 'k';
        return '$' + v;
      };
      if (min && max) return fmt(min) + ' - ' + fmt(max);
      if (min) return fmt(min) + '+';
      return 'up to ' + fmt(max);
    }

    function relevanceCellClass(params) {
      const v = params.value;
      if (v == null) return '';
      if (v > 0.7) return 'relevance-high';
      if (v >= 0.4) return 'relevance-mid';
      return 'relevance-low';
    }

    function linkRenderer(params) {
      if (!params.value) return '';
      return '<a href="' + params.value + '" target="_blank" rel="noopener" style="color:#1a73e8;">Link</a>';
    }

    function statusCellClass(params) {
      if (!params.value) return '';
      return 'status-' + params.value;
    }

    function employeeFormatter(params) {
      if (params.value == null) return '';
      return Number(params.value).toLocaleString();
    }

    function founderLedRenderer(params) {
      if (params.value === 1) return '<span title="Founder-led">&#x2705;</span>';
      if (params.value === 0) return '<span title="Not founder-led">&#x274C;</span>';
      return '<span style="color:#999;">?</span>';
    }

    function glassdoorRatingCellClass(params) {
      const v = params.value;
      if (v == null) return '';
      if (v >= 4.0) return 'relevance-high';
      if (v >= 3.0) return 'relevance-mid';
      return 'relevance-low';
    }

    function glassdoorRecommendFormatter(params) {
      if (params.value == null) return '';
      return params.value + '%';
    }

    function tickerRenderer(params) {
      if (!params.value) return '';
      const t = params.value;
      return '<a href="https://www.google.com/finance/quote/' + t + '" target="_blank" rel="noopener" style="color:#1a73e8;font-weight:600;">' + t + '</a>';
    }

    const columnDefs = [
      { field: 'company', headerName: 'Company', tooltipField: 'company', filter: true, sortable: true, width: 140 },
      { field: 'title', headerName: 'Title', tooltipField: 'title', filter: true, sortable: true, flex: 1, minWidth: 200 },
      { field: 'level', headerName: 'Level', tooltipField: 'level', filter: true, sortable: true, width: 110 },
      {
        headerName: 'Salary',
        valueGetter: (p) => (p.data.salary_min || 0) + (p.data.salary_max || 0),
        valueFormatter: salaryFormatter,
        sortable: true,
        width: 150
      },
      { field: 'employee_count', headerName: 'Employees', valueFormatter: employeeFormatter, filter: 'agNumberColumnFilter', sortable: true, width: 110 },
      { field: 'total_funding', headerName: 'Funding', tooltipField: 'total_funding', filter: true, sortable: true, width: 130 },
      { field: 'ticker', headerName: 'Stock', cellRenderer: tickerRenderer, filter: true, sortable: true, width: 90 },
      { field: 'founder_led', headerName: 'Founder-led', cellRenderer: founderLedRenderer, filter: true, sortable: true, width: 110 },
      { field: 'glassdoor_rating', headerName: 'GD Rating', cellClass: glassdoorRatingCellClass, filter: 'agNumberColumnFilter', sortable: true, width: 100, valueFormatter: (p) => p.value != null ? p.value.toFixed(1) : '' },
      { field: 'glassdoor_recommend_pct', headerName: 'GD Recommend', valueFormatter: glassdoorRecommendFormatter, filter: 'agNumberColumnFilter', sortable: true, width: 120 },
      { field: 'location', headerName: 'Location', tooltipField: 'location', filter: true, sortable: true, width: 160 },
      { field: 'remote', headerName: 'Remote', filter: true, sortable: true, width: 100 },
      { field: 'industry', headerName: 'Industry', tooltipField: 'industry', filter: true, sortable: true, width: 130 },
      {
        field: 'relevance',
        headerName: 'Relevance',
        sortable: true,
        filter: 'agNumberColumnFilter',
        width: 110,
        cellClass: relevanceCellClass,
        valueFormatter: (p) => p.value != null ? p.value.toFixed(2) : ''
      },
      { field: 'source', headerName: 'Source', filter: true, sortable: true, width: 120 },
      {
        field: 'status',
        headerName: 'Status',
        editable: true,
        cellEditor: 'agSelectCellEditor',
        cellEditorParams: { values: ['new', 'applied', 'referred', 'interviewing', 'denied', 'offer', 'stale'] },
        cellClass: statusCellClass,
        filter: true,
        sortable: true,
        width: 130
      },
      { field: 'fit_notes', headerName: 'Fit Notes', tooltipField: 'fit_notes', filter: true, sortable: true, width: 200 },
      { field: 'posted_at', headerName: 'Posted', sortable: true, width: 110 },
      { field: 'discovered_at', headerName: 'Discovered', sortable: true, width: 160 },
      { field: 'link', headerName: 'Link', cellRenderer: linkRenderer, width: 70 }
    ];

    const gridOptions = {
      columnDefs: columnDefs,
      defaultColDef: {
        resizable: true,
      },
      tooltipShowDelay: 300,
      tooltipInteraction: true,
      rowData: [],
      animateRows: true,
      onCellValueChanged: async (event) => {
        if (event.colDef.field === 'status') {
          await fetch(BASE + '/api/jobs/' + event.data.id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: event.newValue })
          });
        }
      }
    };

    const gridDiv = document.getElementById('grid-container');
    const grid = agGrid.createGrid(gridDiv, gridOptions);

    async function loadData() {
      const showHidden = document.getElementById('showHidden').checked;
      const params = new URLSearchParams();
      if (showHidden) params.set('hidden', '1');
      const res = await fetch(BASE + '/api/jobs?' + params.toString());
      const data = await res.json();
      grid.setGridOption('rowData', data);
    }

    document.getElementById('showHidden').addEventListener('change', loadData);
    document.getElementById('refreshBtn').addEventListener('click', loadData);

    loadData();
  </script>
</body>
</html>
