<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Board</title>
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <style>
    /*
     * Theme isolation: clunger injects sitenav.css (dark theme :root vars)
     * before </head>. We must override those vars AND ensure AG Grid's
     * Alpine light theme renders cleanly despite the inherited dark palette.
     *
     * Strategy: set :root vars with !important, then scope AG Grid overrides
     * to .ag-theme-alpine with full variable coverage.
     */

    /* 1. Override sitenav dark :root vars with light equivalents */
    :root {
      --bg: #ffffff !important;
      --accent: #333333 !important;
      --text: #333333 !important;
      --text-muted: #555 !important;
      --text-dim: #777 !important;
      --nav-bg: #f8f9fa !important;
      --nav-border: #dee2e6 !important;
      --hover-fg: #111 !important;
      color-scheme: light !important;
    }

    /* 2. Keep the nav bar styled with its own dark theme */
    nav.sitenav {
      --nav-bg: #1a1a2e;
      --nav-border: #e94560;
      --accent: #e94560;
      --text-muted: #888;
      --hover-fg: #fff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #ffffff !important;
      background-color: #ffffff !important;
      color: #333333 !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }

    body {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      padding-top: 48px !important;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }

    .toolbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #333333;
      margin-right: auto;
    }

    .toolbar label {
      font-size: 13px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    .toolbar input[type="checkbox"] {
      margin-right: 4px;
    }

    .toolbar button {
      padding: 6px 14px;
      background: #ffffff;
      color: #333;
      border: 1px solid #ced4da;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .toolbar button:hover {
      background: #e9ecef;
      color: #111;
    }

    #grid-container {
      flex: 1;
      width: 100%;
    }

    /*
     * 3. Comprehensive AG Grid Alpine light theme overrides.
     *    Cover every variable AG Grid uses so nothing leaks through from
     *    sitenav's dark palette or inherited :root values.
     */
    .ag-theme-alpine {
      --ag-alpine-active-color: #2196f3 !important;
      --ag-background-color: #ffffff !important;
      --ag-foreground-color: #333333 !important;
      --ag-header-background-color: #f8f9fa !important;
      --ag-header-foreground-color: #333333 !important;
      --ag-odd-row-background-color: #fafbfc !important;
      --ag-row-hover-color: #e9ecef !important;
      --ag-selected-row-background-color: #d0e8ff !important;
      --ag-border-color: #dee2e6 !important;
      --ag-secondary-border-color: #e9ecef !important;
      --ag-row-border-color: #e9ecef !important;
      --ag-header-cell-hover-background-color: #eef1f4 !important;
      --ag-header-cell-moving-background-color: #d9dee4 !important;
      --ag-control-panel-background-color: #ffffff !important;
      --ag-subheader-background-color: #ffffff !important;
      --ag-invalid-color: #e53935 !important;
      --ag-checkbox-unchecked-color: #999 !important;
      --ag-range-selection-background-color: rgba(33, 150, 243, 0.15) !important;
      --ag-range-selection-border-color: #2196f3 !important;
      --ag-modal-overlay-background-color: rgba(255, 255, 255, 0.66) !important;
      --ag-input-focus-border-color: #2196f3 !important;
      --ag-font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
      --ag-font-size: 13px !important;
      --ag-card-shadow: 0 1px 4px 1px rgba(0, 0, 0, 0.1) !important;
      --ag-popup-shadow: 0 5px 12px rgba(0, 0, 0, 0.15) !important;
      --ag-side-button-selected-background-color: #ffffff !important;
      --ag-chip-background-color: #e0e0e0 !important;
      --ag-input-border-color: #ccc !important;
      --ag-input-disabled-background-color: #f5f5f5 !important;
      --ag-disabled-foreground-color: #999 !important;
      --ag-tooltip-background-color: #f8f9fa !important;
      --ag-value-change-delta-up-color: #43a047 !important;
      --ag-value-change-delta-down-color: #e53935 !important;
      --ag-value-change-value-highlight-background-color: rgba(22, 160, 133, 0.5) !important;
    }

    /* Explicit overrides for AG Grid elements that might inherit from :root */
    .ag-theme-alpine .ag-root-wrapper {
      background-color: #ffffff !important;
      color: #333333 !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }
    .ag-theme-alpine .ag-header {
      background-color: #f8f9fa !important;
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-row {
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-row-odd {
      background-color: #fafbfc !important;
    }
    .ag-theme-alpine .ag-row-even {
      background-color: #ffffff !important;
    }
    .ag-theme-alpine .ag-cell {
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-header-cell {
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-popup {
      background-color: #ffffff !important;
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-filter {
      background-color: #ffffff !important;
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-menu {
      background-color: #ffffff !important;
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-picker-field-wrapper {
      background-color: #ffffff !important;
    }
    .ag-theme-alpine .ag-select .ag-picker-field-display {
      color: #333333 !important;
    }
    .ag-theme-alpine .ag-tooltip {
      background-color: #f8f9fa !important;
      color: #333333 !important;
      border: 1px solid #dee2e6 !important;
    }
    .ag-theme-alpine input,
    .ag-theme-alpine select,
    .ag-theme-alpine textarea {
      background-color: #ffffff !important;
      color: #333333 !important;
    }

    .relevance-high { color: #1a7f4b !important; font-weight: 600; }
    .relevance-mid { color: #b8860b !important; font-weight: 600; }
    .relevance-low { color: #c0392b !important; font-weight: 600; }

    .status-new { background: #e8f4fd !important; color: #1565c0 !important; }
    .status-applied { background: #fff8e1 !important; color: #f57f17 !important; }
    .status-referred { background: #e8eaf6 !important; color: #283593 !important; }
    .status-interviewing { background: #e3f2fd !important; color: #0277bd !important; }
    .status-denied { background: #fce4ec !important; color: #c62828 !important; }
    .status-offer { background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: 600; }
    .status-stale { background: #f5f5f5 !important; color: #9e9e9e !important; }

    /* Filter pills */
    #filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
    }
    #filters .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-right: 12px;
    }
    #filters .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    #filters .pill {
      display: inline-block;
      padding: 3px 10px;
      font-size: 12px;
      border-radius: 12px;
      background: #e9ecef;
      color: #555;
      cursor: pointer;
      user-select: none;
      border: 1px solid transparent;
      transition: background 0.15s, color 0.15s;
    }
    #filters .pill:hover {
      background: #dee2e6;
    }
    #filters .pill.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Job Board</h1>
    <label>
      <input type="checkbox" id="showHidden"> Show hidden
    </label>
    <button id="refreshBtn">Refresh</button>
  </div>
  <div id="filters">
    <div class="filter-group">
      <span class="filter-label">Level</span>
      <span class="pill" data-col="level" data-val="Staff">Staff</span>
      <span class="pill" data-col="level" data-val="Principal">Principal</span>
      <span class="pill" data-col="level" data-val="Senior">Senior</span>
      <span class="pill" data-col="level" data-val="Lead">Lead</span>
    </div>
    <div class="filter-group">
      <span class="filter-label">Remote</span>
      <span class="pill" data-col="remote" data-val="remote">Remote</span>
      <span class="pill" data-col="remote" data-val="hybrid">Hybrid</span>
      <span class="pill" data-col="remote" data-val="onsite">Onsite</span>
    </div>
    <div class="filter-group">
      <span class="filter-label">Stage</span>
      <span class="pill" data-col="total_funding" data-val="Public">Public</span>
      <span class="pill" data-col="total_funding" data-val="Series A">Series A</span>
      <span class="pill" data-col="total_funding" data-val="Series B">Series B</span>
      <span class="pill" data-col="total_funding" data-val="Series C">Series C</span>
      <span class="pill" data-col="total_funding" data-val="Series D">Series D</span>
      <span class="pill" data-col="total_funding" data-val="Bootstrapped">Bootstrapped</span>
    </div>
  </div>
  <div id="grid-container" class="ag-theme-alpine"></div>

  <script>
    const BASE = window.location.pathname.replace(/\/+$/, '');

    function salaryFormatter(params) {
      const min = params.data.salary_min;
      const max = params.data.salary_max;
      if (!min && !max) return '';
      const fmt = (v) => {
        if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
        if (v >= 1000) return '$' + Math.round(v / 1000) + 'k';
        return '$' + v;
      };
      if (min && max) return fmt(min) + ' - ' + fmt(max);
      if (min) return fmt(min) + '+';
      return 'up to ' + fmt(max);
    }

    function relevanceCellClass(params) {
      const v = params.value;
      if (v == null) return '';
      if (v > 0.7) return 'relevance-high';
      if (v >= 0.4) return 'relevance-mid';
      return 'relevance-low';
    }

    function linkRenderer(params) {
      if (!params.value) return '';
      return '<a href="' + params.value + '" target="_blank" rel="noopener" style="color:#1a73e8;">Link</a>';
    }

    function statusCellClass(params) {
      if (!params.value) return '';
      return 'status-' + params.value;
    }

    function employeeFormatter(params) {
      if (params.value == null) return '';
      return Number(params.value).toLocaleString();
    }

    function founderLedRenderer(params) {
      if (params.value === 1) return '<span title="Founder-led">&#x2705;</span>';
      if (params.value === 0) return '<span title="Not founder-led">&#x274C;</span>';
      return '<span style="color:#999;">?</span>';
    }

    function glassdoorRatingCellClass(params) {
      const v = params.value;
      if (v == null) return '';
      if (v >= 4.0) return 'relevance-high';
      if (v >= 3.0) return 'relevance-mid';
      return 'relevance-low';
    }

    function glassdoorRecommendFormatter(params) {
      if (params.value == null) return '';
      return params.value + '%';
    }

    function tickerRenderer(params) {
      if (!params.value) return '';
      const t = params.value;
      return '<a href="https://www.google.com/finance/quote/' + t + '" target="_blank" rel="noopener" style="color:#1a73e8;font-weight:600;">' + t + '</a>';
    }

    const columnDefs = [
      { field: 'company', headerName: 'Company', tooltipField: 'company', filter: true, sortable: true, width: 140 },
      { field: 'title', headerName: 'Title', tooltipField: 'title', filter: true, sortable: true, flex: 1, minWidth: 200 },
      { field: 'level', headerName: 'Level', tooltipField: 'level', filter: true, sortable: true, width: 110 },
      {
        headerName: 'Salary',
        valueGetter: (p) => (p.data.salary_min || 0) + (p.data.salary_max || 0),
        valueFormatter: salaryFormatter,
        sortable: true,
        width: 150
      },
      { field: 'employee_count', headerName: 'Employees', valueFormatter: employeeFormatter, filter: 'agNumberColumnFilter', sortable: true, width: 110 },
      { field: 'total_funding', headerName: 'Stage', tooltipField: 'total_funding', filter: true, sortable: true, width: 100 },
      { field: 'ticker', headerName: 'Stock', cellRenderer: tickerRenderer, filter: true, sortable: true, width: 90 },
      { field: 'founder_led', headerName: 'Founder-led', cellRenderer: founderLedRenderer, filter: true, sortable: true, width: 110 },
      { field: 'glassdoor_rating', headerName: 'GD Rating', cellClass: glassdoorRatingCellClass, filter: 'agNumberColumnFilter', sortable: true, width: 100, valueFormatter: (p) => p.value != null ? p.value.toFixed(1) : '' },
      { field: 'glassdoor_recommend_pct', headerName: 'GD Recommend', valueFormatter: glassdoorRecommendFormatter, filter: 'agNumberColumnFilter', sortable: true, width: 120 },
      { field: 'location', headerName: 'Location', tooltipField: 'location', filter: true, sortable: true, width: 160 },
      { field: 'remote', headerName: 'Remote', filter: true, sortable: true, width: 100 },
      { field: 'industry', headerName: 'Industry', tooltipField: 'industry', filter: true, sortable: true, width: 130 },
      {
        field: 'relevance',
        headerName: 'Relevance',
        sortable: true,
        filter: 'agNumberColumnFilter',
        width: 110,
        cellClass: relevanceCellClass,
        valueFormatter: (p) => p.value != null ? p.value.toFixed(2) : ''
      },
      { field: 'source', headerName: 'Source', filter: true, sortable: true, width: 120 },
      {
        field: 'status',
        headerName: 'Status',
        editable: true,
        cellEditor: 'agSelectCellEditor',
        cellEditorParams: { values: ['new', 'applied', 'referred', 'interviewing', 'denied', 'offer', 'stale'] },
        cellClass: statusCellClass,
        filter: true,
        sortable: true,
        width: 130
      },
      { field: 'fit_notes', headerName: 'Fit Notes', tooltipField: 'fit_notes', filter: true, sortable: true, width: 200 },
      { field: 'posted_at', headerName: 'Posted', sortable: true, width: 110, hide: true },
      { field: 'discovered_at', headerName: 'Discovered', sortable: true, width: 160 },
      { field: 'link', headerName: 'Link', cellRenderer: linkRenderer, width: 70, hide: true },
      { field: 'enriched_at', headerName: 'Enriched', sortable: true, width: 160, hide: true }
    ];

    const gridOptions = {
      columnDefs: columnDefs,
      defaultColDef: {
        resizable: true,
      },
      tooltipShowDelay: 300,
      tooltipInteraction: true,
      rowData: [],
      animateRows: true,
      onCellValueChanged: async (event) => {
        if (event.colDef.field === 'status') {
          await fetch(BASE + '/api/jobs/' + event.data.id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: event.newValue })
          });
        }
      }
    };

    const gridDiv = document.getElementById('grid-container');
    const grid = agGrid.createGrid(gridDiv, gridOptions);

    async function loadData() {
      const showHidden = document.getElementById('showHidden').checked;
      const params = new URLSearchParams();
      if (showHidden) params.set('hidden', '1');
      const res = await fetch(BASE + '/api/jobs?' + params.toString());
      const data = await res.json();
      grid.setGridOption('rowData', data);
    }

    document.getElementById('showHidden').addEventListener('change', loadData);
    document.getElementById('refreshBtn').addEventListener('click', loadData);

    // Filter pill logic
    const activeFilters = {}; // { colField: Set of active values }

    function applyPillFilters() {
      const filterModel = {};
      for (const [col, vals] of Object.entries(activeFilters)) {
        if (vals.size === 0) continue;
        if (vals.size === 1) {
          filterModel[col] = { filterType: 'text', type: 'equals', filter: [...vals][0] };
        } else {
          filterModel[col] = {
            filterType: 'text',
            operator: 'OR',
            conditions: [...vals].map(v => ({ filterType: 'text', type: 'equals', filter: v }))
          };
        }
      }
      grid.setFilterModel(filterModel);
    }

    document.getElementById('filters').addEventListener('click', (e) => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      const col = pill.dataset.col;
      const val = pill.dataset.val;
      if (!activeFilters[col]) activeFilters[col] = new Set();
      if (activeFilters[col].has(val)) {
        activeFilters[col].delete(val);
        pill.classList.remove('active');
      } else {
        activeFilters[col].add(val);
        pill.classList.add('active');
      }
      applyPillFilters();
    });

    loadData();
  </script>
</body>
</html>
