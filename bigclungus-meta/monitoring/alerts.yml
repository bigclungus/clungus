groups:
  - name: system
    rules:
      - alert: DiskHigh
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} > 0.80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage on / above 80%"

      - alert: MemoryHigh
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85%"

      - alert: DiskHighData
        expr: (node_filesystem_size_bytes{mountpoint="/mnt/data"} - node_filesystem_free_bytes{mountpoint="/mnt/data"}) / node_filesystem_size_bytes{mountpoint="/mnt/data"} > 0.80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage on /mnt/data above 80%"

      - alert: SystemdServiceFlapping
        expr: systemd_service_flaps_10m > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.service }} has flapped {{ $value }} times in 10 min"

      - alert: TemporalWorkflowHighRetries
        expr: temporal_workflow_max_attempt >= 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Temporal workflow {{ $labels.workflow_id }} at attempt {{ $value }}"
