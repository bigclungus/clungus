syntax = "proto3";
package agent.v1;

service AgentService {
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
}

message Agent {
  string id = 1;
  string name = 2;
  string role = 3;
  string emoji = 4;
  string color = 5;
  string description = 6;
  string model = 7;
  string display_name = 8;
  string avatar_url = 9;
  string title = 10;
  string sex = 11;
  bool is_moderator = 12;
  int32 stats_retained = 13;
  int32 stats_evolved = 14;
  int32 stats_retired = 15;
  string last_verdict = 16;
  repeated string traits = 17;
}

message ListAgentsRequest {}
message ListAgentsResponse {
  repeated Agent active = 1;
  repeated Agent retired = 2;
  Agent moderator = 3;
}
