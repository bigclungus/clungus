syntax = "proto3";
package congress.v1;

service CongressService {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc PostDebate(PostDebateRequest) returns (PostDebateResponse);
  rpc StreamDebate(StreamDebateRequest) returns (stream DebateToken);
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc PatchSession(PatchSessionRequest) returns (PatchSessionResponse);
}

message StartSessionRequest {
  string topic = 1;
  string discord_user = 2;
}
message StartSessionResponse {
  string session_id = 1;
  int32 session_number = 2;
}

message PostDebateRequest {
  string task = 1;
  string identity = 2;
  string session_id = 3;
}
message PostDebateResponse {
  string response = 1;
  string identity = 2;
}

message StreamDebateRequest {
  string session_id = 1;
}
message DebateToken {
  string identity = 1;
  string display_name = 2;
  string text = 3;
  bool done = 4;
}

message ListIdentitiesRequest {}
message Identity {
  string name = 1;
  string role = 2;
  string display_name = 3;
  string avatar_url = 4;
  string model = 5;
  string status = 6;
  bool congress = 7;
  bool evolves = 8;
  string title = 9;
  string sex = 10;
  repeated string traits = 11;
}

message ListIdentitiesResponse {
  repeated Identity identities = 1;
}

message ListSessionsRequest {
  int32 page_size = 1;
}
message SessionSummary {
  string session_id = 1;
  int32 session_number = 2;
  string topic = 3;
  string status = 4;
  string verdict = 5;
}
message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message GetSessionRequest {
  string session_id = 1;
}
message GetSessionResponse {
  string session_json = 1;  // full session as JSON string for now
}

message PatchSessionRequest {
  string session_id = 1;
  optional string verdict = 2;
  optional string status = 3;
  optional string finished_at = 4;
  optional string evolution = 5;
  optional string thread_id = 6;
  optional string task_titles = 7;
}
message PatchSessionResponse {
  bool ok = 1;
  string session_id = 2;
}
