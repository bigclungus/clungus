name: Release Clungcord Tauri
on:
  push:
    branches: [ main ]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin, x86_64-pc-windows-msvc
      - name: Install Bun
        uses: oven-sh/setup-bun@v1
      - name: Install deps
        run: cd clungiverse && bun install
      - name: Build frontend
        run: cd clungiverse/packages/client && bun run build
      - name: Build Tauri
        run: |
          cd clungiverse/packages/clungcord-desktop
          bun add -D @tauri-apps/cli@next
          npx @tauri-apps/cli build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-clungcord
          path: |
            clungiverse/packages/clungcord-desktop/src-tauri/target/release/bundle/**/*
