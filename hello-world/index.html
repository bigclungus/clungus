<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigClungus — Operations Dashboard</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css?v=d004dbf">
  <script src="/sitenav.js?v=d004dbf" defer></script>
  <style>
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
    }

    .dashboard {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 12px 18px;
      background: #11111f;
      border: 1px solid #2a2a40;
      border-radius: 6px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-pill .dot {
      font-size: 10px;
    }

    .status-pill.active { color: #4ecca3; }
    .status-pill.failed { color: #e94560; }
    .status-pill.failed.zero { color: #555570; }
    .status-pill.stale  { color: #f0a500; }
    .status-pill.stale.zero  { color: #555570; }

    .status-pulse {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
    }

    /* ── Section headers ── */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a40;
    }

    /* ── Active tasks strip ── */
    .active-tasks {
      margin-bottom: 28px;
    }

    .task-card {
      border-left: 3px solid #4ecca3;
      padding: 10px 14px;
      background: #13132a;
      border-radius: 0 4px 4px 0;
      margin-bottom: 6px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .task-card-body {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-size: 13px;
    }

    .task-snippet {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      margin-top: 3px;
    }

    .task-age {
      color: #555570;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tasks-footer {
      margin-top: 8px;
      font-size: 11px;
    }

    .tasks-footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .tasks-footer a:hover {
      color: var(--accent);
    }

    .empty-note {
      color: #555570;
      font-size: 12px;
      padding: 8px 0;
    }

    /* ── Activity feed ── */
    .activity-feed {
      margin-bottom: 28px;
    }

    .feed-entry {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #1a1a30;
      align-items: baseline;
    }

    .feed-entry:last-child {
      border-bottom: none;
    }

    .feed-task {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-msg {
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-event-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .feed-event-dot.done      { background: #4ecca3; }
    .feed-event-dot.failed    { background: #e94560; }
    .feed-event-dot.milestone { background: #7a7aaa; }
    .feed-event-dot.blocked   { background: #f0a500; }
    .feed-event-dot.started   { background: #444460; }
    .feed-event-dot.stale     { background: #f0a500; }
    .feed-event-dot.default   { background: #333355; }

    .feed-ts {
      color: #555570;
      font-size: 11px;
      white-space: nowrap;
    }

    /* ── Services widget ── */
    .services-widget {
      margin-bottom: 28px;
    }

    .services-table-wrap {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #2a2a40;
      border-radius: 6px;
      background: #0d0d14;
    }

    .services-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      color: #c8c8d8;
    }

    .services-table thead tr {
      background: #11111f;
      border-bottom: 1px solid #2a2a40;
    }

    .services-table th {
      padding: 7px 12px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .services-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #1a1a30;
      white-space: nowrap;
    }

    .services-table tbody tr:last-child td {
      border-bottom: none;
    }

    .services-table tbody tr:hover {
      background: #13132a;
    }

    .svc-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .svc-dot.green  { background: #4ecca3; }
    .svc-dot.red    { background: #e94560; }
    .svc-dot.yellow { background: #f0a500; }

    .svc-name {
      color: #c8c8d8;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .svc-status {
      display: flex;
      align-items: center;
    }

    .svc-muted {
      color: #555570;
    }

    .svc-restart-btn {
      background: none;
      border: 1px solid #2a2a40;
      color: #555570;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.1s, border-color 0.1s;
    }

    .svc-restart-btn:hover {
      color: #c8c8d8;
      border-color: #4a4a60;
    }

    .svc-restart-btn.restarting {
      color: #f0a500;
      border-color: #f0a500;
      cursor: default;
    }

    /* ── Loading / error states ── */
    #loading-note {
      color: #555570;
      font-size: 12px;
      padding: 20px 0;
      text-align: center;
    }

    /* ── Metrics row ── */
    .metrics-widget {
      margin-bottom: 28px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 160px 200px 1fr;
      gap: 10px;
    }

    .metric-box {
      background: #0d0d14;
      border: 1px solid #2a2a40;
      border-radius: 6px;
      padding: 12px 14px;
    }

    .metric-box-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .metric-big {
      font-size: 1.5rem;
      color: #4ecca3;
      line-height: 1;
      margin-bottom: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .metric-sub {
      font-size: 11px;
      color: #555570;
    }

    canvas.metric-sparkline {
      display: block;
      margin-top: 8px;
    }

    .metric-bar-track {
      height: 5px;
      background: #1a1a30;
      border-radius: 3px;
      margin-top: 6px;
      overflow: hidden;
    }

    .metric-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #4ecca3;
      transition: width 0.4s;
    }

    .metric-bar-fill.warn { background: #f0a500; }
    .metric-bar-fill.crit { background: #e94560; }

    .metric-disk-entry {
      margin-bottom: 8px;
    }

    .metric-disk-entry:last-child { margin-bottom: 0; }

    .metric-disk-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #555570;
      margin-bottom: 3px;
    }

    .metric-disk-path { color: #c8c8d8; }

    .metric-net-row {
      display: flex;
      gap: 14px;
      font-size: 11px;
      color: #555570;
      margin-top: 4px;
    }

    .metric-net-val { color: #c8c8d8; }

    /* ── Containers widget ── */
    .containers-widget {
      margin-bottom: 28px;
    }

    .containers-table-wrap {
      border: 1px solid #2a2a40;
      border-radius: 6px;
      background: #0d0d14;
    }

    .containers-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      color: #c8c8d8;
    }

    .containers-table thead tr {
      background: #11111f;
      border-bottom: 1px solid #2a2a40;
    }

    .containers-table th {
      padding: 7px 12px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .containers-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #1a1a30;
      white-space: nowrap;
    }

    .containers-table tbody tr:last-child td {
      border-bottom: none;
    }

    .containers-table tbody tr:hover {
      background: #13132a;
    }

    .ct-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 0.03em;
    }

    .ct-badge-running { background: #143a1e; color: #4ecca3; border: 1px solid #2a6a44; }
    .ct-badge-exited  { background: #2a2010; color: #f0a500; border: 1px solid #4a3a10; }
    .ct-badge-stopped { background: #2a1a1a; color: #888; border: 1px solid #442a2a; }
    .ct-badge-unknown { background: #1e1e2e; color: #555570; border: 1px solid #2a2a40; }

    .ct-image { color: #555570; font-size: 11px; }
    .ct-id    { color: #333355; font-size: 10px; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .status-bar { gap: 14px; }
      .status-pulse { margin-left: 0; width: 100%; }

      .feed-entry {
        grid-template-columns: 100px 1fr auto;
        gap: 6px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <span class="status-pill active">
        <span class="dot">●</span>
        <span id="count-active">—</span> active
      </span>
      <span class="status-pill failed zero" id="pill-failed">
        <span class="dot">✗</span>
        <span id="count-failed">—</span> failed
      </span>
      <span class="status-pill stale zero" id="pill-stale">
        <span class="dot">⚠</span>
        <span id="count-stale">—</span> stale
      </span>
      <span class="status-pulse" id="last-pulse">last pulse: —</span>
    </div>

    <!-- Active tasks -->
    <div class="active-tasks">
      <p class="section-label">in progress</p>
      <div id="active-list"><span class="empty-note">loading…</span></div>
      <div class="tasks-footer"><a href="/tasks">See all tasks →</a></div>
    </div>

    <!-- Recent activity feed -->
    <div class="activity-feed">
      <p class="section-label">recent activity</p>
      <div id="feed-list"><span class="empty-note">loading…</span></div>
    </div>

    <!-- Metrics row -->
    <div class="metrics-widget" id="metrics-widget">
      <p class="section-label">system</p>
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-box-label">cpu</div>
          <div class="metric-big" id="m-cpu-pct">—</div>
          <div class="metric-sub" id="m-cpu-sub">waiting…</div>
          <canvas class="metric-sparkline" id="m-cpu-sparkline" width="132" height="28"></canvas>
        </div>
        <div class="metric-box">
          <div class="metric-box-label">memory</div>
          <div class="metric-big" id="m-ram-used">—</div>
          <div class="metric-sub" id="m-ram-sub">waiting…</div>
          <div class="metric-bar-track"><div class="metric-bar-fill" id="m-ram-bar" style="width:0%"></div></div>
        </div>
        <div class="metric-box">
          <div class="metric-box-label">disk</div>
          <div id="m-disk-entries"><span style="color:#333355;font-size:11px">loading…</span></div>
          <div style="margin-top:10px" class="metric-box-label">network</div>
          <div class="metric-net-row" id="m-net-row"><span style="color:#333355;font-size:11px">loading…</span></div>
        </div>
      </div>
    </div>

    <!-- Services status table -->
    <div class="services-widget" id="services-widget">
      <p class="section-label">services <a href="/cockpit" style="font-size:10px;opacity:0.6;text-decoration:none;letter-spacing:0.08em">cockpit →</a></p>
      <div class="services-table-wrap" id="services-table-wrap">
        <span class="empty-note" style="display:block;padding:10px 12px">loading…</span>
      </div>
    </div>

    <!-- Containers section -->
    <div class="containers-widget" id="containers-widget">
      <p class="section-label">containers</p>
      <div class="containers-table-wrap" id="containers-table-wrap">
        <span class="empty-note" style="display:block;padding:10px 12px">loading…</span>
      </div>
    </div>

  </div><!-- /dashboard -->

  <script>
  (function () {
    'use strict';

    var REFRESH_MS = 30000;

    /* ── Helpers ── */
    function trunc(str, max) {
      if (!str) return '';
      str = str.replace(/\s+/g, ' ').trim();
      return str.length > max ? str.slice(0, max - 1) + '…' : str;
    }

    function relTime(isoStr) {
      if (!isoStr) return '';
      var d = new Date(isoStr);
      if (isNaN(d)) return '';
      var diffMs = Date.now() - d.getTime();
      var diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1)  return 'just now';
      if (diffMin < 60) return diffMin + 'm ago';
      var diffH = Math.floor(diffMin / 60);
      if (diffH < 24)   return diffH + 'h ago';
      return Math.floor(diffH / 24) + 'd ago';
    }

    function fmtTime(isoStr) {
      if (!isoStr) return '';
      var d = new Date(isoStr);
      if (isNaN(d)) return '';
      return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    function eventDotClass(evt) {
      var known = {done:1, failed:1, milestone:1, blocked:1, started:1, stale:1};
      return known[evt] ? evt : 'default';
    }

    /* ── DOM helpers ── */
    function el(tag, cls, text) {
      var e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }

    /* ── Render ── */
    function render(tasks) {
      var active = tasks.filter(function(t){ return t.status === 'in_progress'; });
      var failed = tasks.filter(function(t){ return t.status === 'failed'; });
      var stale  = tasks.filter(function(t){ return t.status === 'stale'; });

      /* Status bar */
      document.getElementById('count-active').textContent = active.length;
      document.getElementById('count-failed').textContent = failed.length;
      document.getElementById('count-stale').textContent  = stale.length;

      var pfailed = document.getElementById('pill-failed');
      pfailed.classList.toggle('zero', failed.length === 0);

      var pstale = document.getElementById('pill-stale');
      pstale.classList.toggle('zero', stale.length === 0);

      /* Last pulse: most recent log timestamp across all tasks */
      var latestTs = '';
      tasks.forEach(function(t) {
        var log = t.log;
        if (log && log.length) {
          var last = log[log.length - 1].ts || '';
          if (last > latestTs) latestTs = last;
        }
      });
      document.getElementById('last-pulse').textContent =
        latestTs ? 'last pulse: ' + fmtTime(latestTs) : 'last pulse: —';

      /* Active tasks strip (top 5) */
      var activeEl = document.getElementById('active-list');
      activeEl.innerHTML = '';
      if (active.length === 0) {
        activeEl.appendChild(el('span', 'empty-note', 'No active tasks right now.'));
      } else {
        active.slice(0, 5).forEach(function(t) {
          var card = el('div', 'task-card');
          var body = el('div', 'task-card-body');

          var titleEl = el('div', 'task-title', trunc(t.title, 65));
          body.appendChild(titleEl);

          /* Last non-started log entry context */
          var snippet = '';
          var snippetTs = '';
          var log = t.log || [];
          for (var i = log.length - 1; i >= 0; i--) {
            if (log[i].event !== 'started') {
              snippet  = log[i].context || log[i].message || '';
              snippetTs = log[i].ts || '';
              break;
            }
          }
          if (!snippet && t.summary) snippet = t.summary;

          if (snippet) {
            body.appendChild(el('div', 'task-snippet', trunc(snippet, 90)));
          }

          card.appendChild(body);

          var age = relTime(snippetTs || t.started_at);
          card.appendChild(el('div', 'task-age', age));

          activeEl.appendChild(card);
        });
      }

      /* Recent activity feed — last 8 log entries across all tasks, newest first */
      var allEntries = [];
      tasks.forEach(function(t) {
        var log = t.log || [];
        log.forEach(function(entry) {
          allEntries.push({
            taskTitle: t.title || t.id,
            event: entry.event || '',
            msg: entry.context || entry.message || '',
            ts: entry.ts || ''
          });
        });
      });

      allEntries.sort(function(a, b) {
        return b.ts.localeCompare(a.ts);
      });

      var feedEl = document.getElementById('feed-list');
      feedEl.innerHTML = '';
      var top8 = allEntries.slice(0, 8);

      if (top8.length === 0) {
        feedEl.appendChild(el('span', 'empty-note', 'No activity yet.'));
      } else {
        top8.forEach(function(entry) {
          var row = el('div', 'feed-entry');

          var taskCell = el('div', 'feed-task', trunc(entry.taskTitle, 22));
          row.appendChild(taskCell);

          var msgCell = el('div', 'feed-msg');
          var dot = el('span', 'feed-event-dot ' + eventDotClass(entry.event));
          msgCell.appendChild(dot);
          msgCell.appendChild(document.createTextNode(trunc(entry.msg, 80) || entry.event));
          row.appendChild(msgCell);

          row.appendChild(el('div', 'feed-ts', relTime(entry.ts)));

          feedEl.appendChild(row);
        });
      }
    }

    /* ── Fetch ── */
    function fetchAndRender() {
      fetch('/api/tasks?limit=50', { signal: AbortSignal.timeout(8000) })
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(data) {
          var tasks = Array.isArray(data) ? data : (data.tasks || []);
          render(tasks);
        })
        .catch(function(err) {
          var activeEl = document.getElementById('active-list');
          var feedEl   = document.getElementById('feed-list');
          var pulseEl  = document.getElementById('last-pulse');
          if (err.message === 'HTTP 403') {
            var loginUrl = '/auth/github?next=' + encodeURIComponent(window.location.pathname);
            activeEl.innerHTML = '<span class="empty-note"><a href="' + loginUrl + '" style="color:var(--accent)">sign in</a> to see task data</span>';
            if (pulseEl) pulseEl.innerHTML = 'last pulse: <a href="' + loginUrl + '" style="color:var(--accent)">sign in</a>';
          } else {
            var msg = 'Could not load task data (' + err.message + ')';
            activeEl.innerHTML = '<span class="empty-note">' + msg + '</span>';
            if (pulseEl) pulseEl.textContent = 'last pulse: error';
          }
          feedEl.innerHTML = '';
        });
    }

    fetchAndRender();
    setInterval(fetchAndRender, REFRESH_MS);
  })();

  /* ── Services status table ── */
  (function () {
    'use strict';

    var SERVICES_REFRESH_MS = 15000;
    var widget = document.getElementById('services-widget');
    var wrap   = document.getElementById('services-table-wrap');

    function fmtUptime(sec) {
      if (sec == null || sec < 0) return '—';
      if (sec < 60) return sec + 's';
      var m = Math.floor(sec / 60);
      if (m < 60) return m + 'm';
      var h = Math.floor(m / 60);
      var rm = m % 60;
      if (h < 24) return h + 'h ' + rm + 'm';
      var d = Math.floor(h / 24);
      var rh = h % 24;
      return d + 'd ' + rh + 'h';
    }

    function fmtMemory(mb) {
      if (mb == null) return '—';
      return Math.round(mb) + ' MB';
    }

    function dotClass(state, sub) {
      if (state === 'active' && sub === 'running') return 'green';
      if (state === 'failed') return 'red';
      return 'yellow';
    }

    function renderServices(services) {
      if (!services.length) {
        wrap.innerHTML = '<span class="empty-note" style="display:block;padding:10px 12px">No services found.</span>';
        return;
      }

      var table = document.createElement('table');
      table.className = 'services-table';

      var thead = document.createElement('thead');
      thead.innerHTML = '<tr><th>service</th><th>description</th><th>status</th><th>uptime</th><th>memory</th><th>restarts</th><th></th></tr>';
      table.appendChild(thead);

      var tbody = document.createElement('tbody');

      services.forEach(function (svc) {
        var tr = document.createElement('tr');

        /* name */
        var tdName = document.createElement('td');
        tdName.className = 'svc-name';
        tdName.textContent = svc.name;
        tr.appendChild(tdName);

        /* description */
        var tdDesc = document.createElement('td');
        var rawDesc = svc.description || '';
        tdDesc.textContent = rawDesc.length > 35 ? rawDesc.slice(0, 34) + '…' : rawDesc;
        tdDesc.style.opacity = '0.6';
        tdDesc.style.maxWidth = '220px';
        tdDesc.style.overflow = 'hidden';
        tdDesc.style.textOverflow = 'ellipsis';
        tr.appendChild(tdDesc);

        /* status */
        var tdStatus = document.createElement('td');
        var statusWrap = document.createElement('div');
        statusWrap.className = 'svc-status';
        var dot = document.createElement('span');
        dot.className = 'svc-dot ' + dotClass(svc.state, svc.sub);
        statusWrap.appendChild(dot);
        var label = document.createElement('span');
        label.textContent = svc.sub || svc.state || '—';
        statusWrap.appendChild(label);
        tdStatus.appendChild(statusWrap);
        tr.appendChild(tdStatus);

        /* uptime */
        var tdUptime = document.createElement('td');
        tdUptime.className = 'svc-muted';
        tdUptime.textContent = fmtUptime(svc.uptime_sec);
        tr.appendChild(tdUptime);

        /* memory */
        var tdMem = document.createElement('td');
        tdMem.className = 'svc-muted';
        tdMem.textContent = fmtMemory(svc.memory_mb);
        tr.appendChild(tdMem);

        /* restarts */
        var tdRestarts = document.createElement('td');
        tdRestarts.className = 'svc-muted';
        tdRestarts.textContent = svc.restarts != null ? svc.restarts : '—';
        tr.appendChild(tdRestarts);

        /* restart button */
        var tdAction = document.createElement('td');
        var btn = document.createElement('button');
        btn.className = 'svc-restart-btn';
        btn.textContent = '↺';
        btn.title = 'Restart ' + svc.name;
        (function (serviceName, button) {
          button.addEventListener('click', function () {
            if (button.classList.contains('restarting')) return;
            button.classList.add('restarting');
            button.textContent = 'restarting…';
            fetch('/api/cockpit/restart', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({service: serviceName}),
              signal: AbortSignal.timeout(15000)
            })
            .then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.json();
            })
            .then(function () {
              setTimeout(function () {
                button.classList.remove('restarting');
                button.textContent = '↺';
                fetchServices();
              }, 2000);
            })
            .catch(function (err) {
              button.classList.remove('restarting');
              button.textContent = '↺';
              button.title = 'Error: ' + err.message;
            });
          });
        })(svc.name, btn);
        tdAction.appendChild(btn);
        tr.appendChild(tdAction);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrap.innerHTML = '';
      wrap.appendChild(table);
    }

    function fetchServices() {
      fetch('/api/cockpit/status', { signal: AbortSignal.timeout(8000) })
        .then(function (r) {
          if (r.status === 403) {
            /* Not authed — hide widget silently */
            if (widget) widget.style.display = 'none';
            return null;
          }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          if (!data) return;
          var services = Array.isArray(data) ? data : [];
          renderServices(services);
        })
        .catch(function (err) {
          wrap.innerHTML = '<span class="empty-note" style="display:block;padding:10px 12px">Could not load service data (' + err.message + ').</span>';
        });
    }

    fetchServices();
    setInterval(fetchServices, SERVICES_REFRESH_MS);
  })();

  /* ── Metrics ── */
  (function () {
    'use strict';

    var METRICS_INTERVAL = 5000;
    var MAX_SAMPLES = 20;
    var CPU_HISTORY = [];
    var prevNet = null;
    var metricsWidget = document.getElementById('metrics-widget');

    function drawSparkline(canvas, data, color) {
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      if (data.length < 2) return;
      var max = Math.max.apply(null, data.concat([10]));
      var step = W / (MAX_SAMPLES - 1);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (var i = 0; i < data.length; i++) {
        var x = i * step;
        var y = H - (data[i] / max) * H * 0.9;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.lineTo((data.length - 1) * step, H);
      ctx.lineTo(0, H);
      ctx.closePath();
      ctx.fillStyle = color + '22';
      ctx.fill();
    }

    function fmtBytes(b) {
      if (b >= 1e9) return (b / 1e9).toFixed(2) + ' GB';
      if (b >= 1e6) return (b / 1e6).toFixed(1) + ' MB';
      if (b >= 1e3) return (b / 1e3).toFixed(0) + ' KB';
      return b + ' B';
    }

    function fetchMetrics() {
      fetch('/api/cockpit/metrics', { signal: AbortSignal.timeout(8000) })
        .then(function (r) {
          if (r.status === 401 || r.status === 403) {
            if (metricsWidget) metricsWidget.style.display = 'none';
            return null;
          }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (d) {
          if (!d) return;

          /* CPU */
          CPU_HISTORY.push(d.cpu_pct);
          if (CPU_HISTORY.length > MAX_SAMPLES) CPU_HISTORY.shift();
          document.getElementById('m-cpu-pct').textContent = d.cpu_pct.toFixed(1) + '%';
          document.getElementById('m-cpu-sub').textContent = CPU_HISTORY.length + ' samples';
          drawSparkline(document.getElementById('m-cpu-sparkline'), CPU_HISTORY, '#4ecca3');

          /* RAM */
          var ramPct = d.ram_total_mb > 0 ? Math.round((d.ram_used_mb / d.ram_total_mb) * 100) : 0;
          var ramUsedG = (d.ram_used_mb / 1024).toFixed(1);
          var ramTotalG = (d.ram_total_mb / 1024).toFixed(1);
          document.getElementById('m-ram-used').textContent = ramUsedG + 'G';
          document.getElementById('m-ram-sub').textContent = 'of ' + ramTotalG + 'G — ' + ramPct + '%';
          var ramBar = document.getElementById('m-ram-bar');
          ramBar.style.width = ramPct + '%';
          ramBar.className = 'metric-bar-fill' + (ramPct >= 90 ? ' crit' : ramPct >= 75 ? ' warn' : '');

          /* Disk */
          var diskEl = document.getElementById('m-disk-entries');
          diskEl.innerHTML = '';
          (d.disks || []).forEach(function (disk) {
            var warnClass = disk.pct >= 90 ? ' crit' : disk.pct >= 75 ? ' warn' : '';
            var div = document.createElement('div');
            div.className = 'metric-disk-entry';
            div.innerHTML =
              '<div class="metric-disk-row">' +
              '<span class="metric-disk-path">' + disk.path + '</span>' +
              '<span>' + disk.used + ' / ' + disk.total + ' — ' + disk.pct + '%</span>' +
              '</div>' +
              '<div class="metric-bar-track"><div class="metric-bar-fill' + warnClass + '" style="width:' + disk.pct + '%"></div></div>';
            diskEl.appendChild(div);
          });

          /* Network */
          var netEl = document.getElementById('m-net-row');
          if (prevNet) {
            var rxDelta = d.net.rx_bytes - prevNet.rx_bytes;
            var txDelta = d.net.tx_bytes - prevNet.tx_bytes;
            var interval = METRICS_INTERVAL / 1000;
            netEl.innerHTML =
              '<span>rx <span class="metric-net-val">' + fmtBytes(Math.max(0, rxDelta) / interval) + '/s</span></span>' +
              '<span>tx <span class="metric-net-val">' + fmtBytes(Math.max(0, txDelta) / interval) + '/s</span></span>';
          } else {
            netEl.innerHTML = '<span style="color:#555570;font-size:11px">rx ' + fmtBytes(d.net.rx_bytes) + ' / tx ' + fmtBytes(d.net.tx_bytes) + '</span>';
          }
          prevNet = d.net;
        })
        .catch(function () { /* silent — metrics failure doesn't break the page */ });
    }

    fetchMetrics();
    setInterval(fetchMetrics, METRICS_INTERVAL);
  })();

  /* ── Containers ── */
  (function () {
    'use strict';

    var CONTAINERS_INTERVAL = 15000;
    var containersWidget = document.getElementById('containers-widget');
    var containersWrap   = document.getElementById('containers-table-wrap');

    function badgeClass(state) {
      if (!state) return 'ct-badge-unknown';
      var s = state.toLowerCase();
      if (s === 'running') return 'ct-badge-running';
      if (s === 'exited')  return 'ct-badge-exited';
      if (s === 'paused')  return 'ct-badge-stopped';
      return 'ct-badge-unknown';
    }

    function renderContainers(containers) {
      if (!containers.length) {
        containersWrap.innerHTML = '<span class="empty-note" style="display:block;padding:10px 12px">no containers</span>';
        return;
      }

      var table = document.createElement('table');
      table.className = 'containers-table';

      var thead = document.createElement('thead');
      thead.innerHTML = '<tr><th>name</th><th>image</th><th>status</th><th>state</th></tr>';
      table.appendChild(thead);

      var tbody = document.createElement('tbody');
      containers.forEach(function (c) {
        var tr = document.createElement('tr');
        var shortId = (c.id || '').slice(0, 12);
        tr.innerHTML =
          '<td><span style="color:#c8c8d8">' + (c.name || '—') + '</span>' +
          (shortId ? '<br><span class="ct-id">' + shortId + '</span>' : '') + '</td>' +
          '<td><span class="ct-image">' + (c.image || '—') + '</span></td>' +
          '<td style="color:#555570;font-size:11px">' + (c.status || '—') + '</td>' +
          '<td><span class="ct-badge ' + badgeClass(c.state) + '">' + (c.state || 'unknown') + '</span></td>';
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      containersWrap.innerHTML = '';
      containersWrap.appendChild(table);
    }

    function fetchContainers() {
      fetch('/api/cockpit/containers', { signal: AbortSignal.timeout(8000) })
        .then(function (r) {
          if (r.status === 401 || r.status === 403) {
            if (containersWidget) containersWidget.style.display = 'none';
            return null;
          }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) {
          if (!data) return;
          renderContainers(Array.isArray(data) ? data : []);
        })
        .catch(function (err) {
          containersWrap.innerHTML = '<span class="empty-note" style="display:block;padding:10px 12px">Could not load containers (' + err.message + ').</span>';
        });
    }

    fetchContainers();
    setInterval(fetchContainers, CONTAINERS_INTERVAL);
  })();

  </script>
</body>
