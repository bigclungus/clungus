    body {
      margin: 0;
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 12px 60px;
      flex: 1;
    }
    .page-title {
      font-size: 22px;
      letter-spacing: 0.18em;
      color: #4ecca3;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .page-subtitle {
      font-size: 11px;
      color: #666688;
      margin-bottom: 6px;
      letter-spacing: 0.08em;
    }
    .page-note {
      font-size: 11px;
      color: #886688;
      margin-bottom: 36px;
      letter-spacing: 0.05em;
      font-style: italic;
    }
    .persona-section {
      width: 100%;
      max-width: 780px;
      margin-bottom: 48px;
    }
    .persona-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid #1e1e3a;
      padding-bottom: 8px;
    }
    .persona-name {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .persona-title {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.06em;
    }
    .persona-role {
      font-size: 10px;
      color: #555577;
      letter-spacing: 0.04em;
      margin-left: auto;
    }
    .variants {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .variant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      border: 1px solid #2a2a4a;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #0d0d1a;
    }
    .variant-label {
      font-size: 22px;
      font-weight: bold;
      color: #4ecca3;
      letter-spacing: 0.08em;
    }
    .variant-desc {
      font-size: 10px;
      color: #9090b8;
      text-align: center;
      max-width: 90px;
      line-height: 1.5;
      letter-spacing: 0.03em;
    }
    .vote-btn {
      background: #4ecca3;
      color: #0d0d1a;
      border: 2px solid transparent;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 18px;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }
    .vote-btn:hover { opacity: 0.82; }
    .vote-btn.voted { background: #2aa884; }
    .vote-btn.winner-glow {
      border-color: #4ecca3;
      box-shadow: 0 0 10px 2px #4ecca3aa;
    }
    .vote-count {
      font-size: 10px;
      color: #5a8a78;
      letter-spacing: 0.05em;
      min-height: 14px;
    }
    .divider {
      width: 100%;
      max-width: 780px;
      height: 1px;
      background: #1e1e3a;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

    {

      ]

  // ─── Canvas sizing ─────────────────────────────────────────────────────────
  const CANVAS_W = 80;
  const CANVAS_H = 120;

  // ─── Build DOM ─────────────────────────────────────────────────────────────
  function buildPersonaSection(persona) {
    const section = document.createElement('div');
    section.className = 'persona-section';
    section.id = 'section-' + persona.slug;

    // Header
    const header = document.createElement('div');
    header.className = 'persona-header';

    const nameEl = document.createElement('div');
    nameEl.className = 'persona-name';
    nameEl.style.color = persona.color;
    nameEl.textContent = persona.name;

    const titleEl = document.createElement('div');
    titleEl.className = 'persona-title';
    titleEl.textContent = persona.title;

    const roleEl = document.createElement('div');
    roleEl.className = 'persona-role';
    roleEl.textContent = persona.role;

    header.appendChild(nameEl);
    header.appendChild(titleEl);
    header.appendChild(roleEl);
    section.appendChild(header);

    // Variants row
    const variantsEl = document.createElement('div');
    variantsEl.className = 'variants';

    ['A', 'B', 'C'].forEach((letter, idx) => {
      const varData = persona.variants[idx];
      const variantEl = document.createElement('div');
      variantEl.className = 'variant';

      const canvas = document.createElement('canvas');
      canvas.width = CANVAS_W;
      canvas.height = CANVAS_H;
      canvas.id = 'canvas-' + persona.slug + '-' + letter;

      const labelEl = document.createElement('div');
      labelEl.className = 'variant-label';
      labelEl.textContent = letter;

      const descEl = document.createElement('div');
      descEl.className = 'variant-desc';
      descEl.textContent = varData ? varData.desc : '';

      const btn = document.createElement('button');
      btn.className = 'vote-btn';
      btn.id = 'btn-' + persona.slug + '-' + letter;
      btn.textContent = 'Vote ' + letter;
      btn.onclick = () => castVote(persona.slug, letter);

      const countEl = document.createElement('div');
      countEl.className = 'vote-count';
      countEl.id = 'count-' + persona.slug + '-' + letter;
      countEl.textContent = '— votes';

      variantEl.appendChild(canvas);
      variantEl.appendChild(labelEl);
      variantEl.appendChild(descEl);
      variantEl.appendChild(btn);
      variantEl.appendChild(countEl);
      variantsEl.appendChild(variantEl);
    });

    section.appendChild(variantsEl);
    return section;
  }

  // ─── Render all personas into container ───────────────────────────────────
  const container = document.getElementById('personas-container');
  PERSONAS.forEach(p => {
    container.appendChild(buildPersonaSection(p));
  });

  // ─── Draw sprites after DOM + scripts loaded ──────────────────────────────
  function drawAllSprites() {
    PERSONAS.forEach(persona => {
      ['A', 'B', 'C'].forEach(letter => {
        const canvasId = 'canvas-' + persona.slug + '-' + letter;
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0d0d1a';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

        // Function name: drawSprite_<id>_<letter>
        const fnName = 'drawSprite_' + persona.id + '_' + letter;
        const fn = window[fnName];
        if (typeof fn === 'function') {
          const cx = CANVAS_W / 2;
          const cy = CANVAS_H - 4;
          fn(ctx, cx, cy);
        } else {
          // fallback: draw placeholder
          ctx.fillStyle = persona.color;
          ctx.globalAlpha = 0.15;
          ctx.fillRect(4, 4, CANVAS_W - 8, CANVAS_H - 8);
          ctx.globalAlpha = 1.0;
          ctx.fillStyle = persona.color;
          ctx.fillRect(CANVAS_W / 2 - 8, CANVAS_H / 2 - 16, 16, 28);
          ctx.fillRect(CANVAS_W / 2 - 5, CANVAS_H / 2 - 24, 10, 10);
          ctx.fillStyle = '#2a2a4a';
          ctx.fillRect(CANVAS_W / 2 - 2, CANVAS_H / 2 - 20, 2, 2);
          ctx.fillRect(CANVAS_W / 2 + 1, CANVAS_H / 2 - 20, 2, 2);
          ctx.fillStyle = '#e0e0ff';
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(letter, CANVAS_W / 2, CANVAS_H - 10);
        }
      });
    });
  }

  // ─── Voting logic ─────────────────────────────────────────────────────────
  const userVotes = {};

  async function castVote(slug, letter) {
    const pollId = 'sprite-' + slug;
    const body = { poll_id: pollId, option: letter };

    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) return;

    userVotes[slug] = letter;
    ['A', 'B', 'C'].forEach(l => {
      const btn = document.getElementById('btn-' + slug + '-' + l);
      if (btn) {
        btn.classList.remove('voted', 'winner-glow');
        if (l === letter) btn.classList.add('voted');
      }
    });
    await loadCounts(slug);
  }

  async function loadCounts(slug) {
    const pollId = 'sprite-' + slug;
    const res = await fetch('/api/vote/results?poll_id=' + encodeURIComponent(pollId));
    if (!res.ok) return;
    const data = await res.json();
    const counts = data.counts || {};
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const maxVotes = Math.max(0, ...Object.values(counts));

    ['A', 'B', 'C'].forEach(l => {
      const countEl = document.getElementById('count-' + slug + '-' + l);
      const btn = document.getElementById('btn-' + slug + '-' + l);
      const v = counts[l] || 0;
      if (countEl) countEl.textContent = v + (v === 1 ? ' vote' : ' votes');
      if (btn && v === maxVotes && v > 0) {
        btn.classList.add('winner-glow');
      } else if (btn) {
        btn.classList.remove('winner-glow');
      }
    });
  }

  async function loadAllCounts() {
    await Promise.all(PERSONAS.map(p => loadCounts(p.slug)));
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    drawAllSprites();
    loadAllCounts();
  });
