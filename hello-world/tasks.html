<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — BigClungus</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/sitenav.css?v=d004dbf">
  <script src="/sitenav.js?v=d004dbf" defer></script>
  <style>
    :root {
      --card-bg: #1e1e30;
      --card-bg-hover: #242438;
      --card-border: #2e2e48;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.35);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.5);
      --teal: #34d399;
      --teal-dim: rgba(52,211,153,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --blue: #60a5fa;
      --blue-dim: rgba(96,165,250,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --violet: #c084fc;
      --violet-dim: rgba(192,132,252,0.1);
      --status-open-color: var(--blue);
      --status-open-bg: var(--blue-dim);
      --status-open-border: rgba(96,165,250,0.35);
      --status-inprogress-color: var(--amber);
      --status-inprogress-bg: var(--amber-dim);
      --status-inprogress-border: rgba(251,191,36,0.35);
      --status-done-color: var(--teal);
      --status-done-bg: var(--teal-dim);
      --status-done-border: rgba(52,211,153,0.35);
      --status-failed-color: var(--red);
      --status-failed-bg: var(--red-dim);
      --status-failed-border: rgba(248,113,113,0.35);
      --status-stale-color: #6b7280;
      --status-stale-bg: rgba(107,114,128,0.08);
      --status-stale-border: rgba(107,114,128,0.3);
      --font-ui: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    [data-theme="light"] {
      --card-bg: #fffcf5;
      --card-bg-hover: #fff8e8;
      --card-border: #e2d9c8;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.1);
      --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.15);
      --teal: #059669;
      --teal-dim: rgba(5,150,105,0.1);
      --amber: #d97706;
      --amber-dim: rgba(217,119,6,0.1);
      --blue: #2563eb;
      --blue-dim: rgba(37,99,235,0.08);
      --red: #dc2626;
      --red-dim: rgba(220,38,38,0.08);
      --violet: #7c3aed;
      --violet-dim: rgba(124,58,237,0.08);
      --status-stale-color: #9ca3af;
      --status-stale-border: rgba(156,163,175,0.4);
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: var(--font-ui);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }

    /* ── Page header ── */
    .page-header {
      padding: 24px 32px 14px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .page-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      text-shadow: 0 0 18px var(--accent);
      letter-spacing: -0.02em;
      font-family: var(--font-mono);
    }
    .page-header .subtitle {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: var(--font-mono);
      opacity: 0.7;
    }
    .refresh-status {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-status .blink {
      color: var(--teal);
      animation: blink 2s step-end infinite;
    }
    .refresh-status .blink.inactive {
      animation: none;
      opacity: 0.35;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Task list ── */
    .task-list {
      padding: 16px 28px 48px;
      max-width: 1100px;
    }

    /* ── Task card ── */
    .task-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-left: 3px solid var(--card-border);
      border-radius: 8px;
      padding: 14px 18px 13px;
      margin-bottom: 8px;
      box-shadow: var(--card-shadow);
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.18s ease, transform 0.12s ease;
      cursor: default;
    }
    .task-card:hover {
      background: var(--card-bg-hover);
      box-shadow: var(--card-shadow-hover);
      transform: translateY(-1px);
    }
    .task-card.status-open {
      border-left-color: var(--status-open-color);
    }
    .task-card.status-in_progress {
      border-left-color: var(--status-inprogress-color);
    }
    .task-card.status-done {
      border-left-color: var(--status-done-color);
    }
    .task-card.status-stale {
      border-left-color: var(--status-stale-color);
      opacity: 0.75;
    }
    .task-card.status-stale:hover {
      opacity: 1;
    }
    .task-card.status-failed {
      border-left-color: var(--status-failed-color);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      flex-wrap: wrap;
    }

    .card-title {
      flex: 1;
      min-width: 0;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
      letter-spacing: -0.01em;
    }

    .status-badge {
      flex-shrink: 0;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
      font-family: var(--font-ui);
      align-self: flex-start;
      margin-top: 1px;
    }
    .status-badge.open {
      color: var(--status-open-color);
      border-color: var(--status-open-border);
      background: var(--status-open-bg);
    }
    .status-badge.in_progress {
      color: var(--status-inprogress-color);
      border-color: var(--status-inprogress-border);
      background: var(--status-inprogress-bg);
    }
    .status-badge.done {
      color: var(--status-done-color);
      border-color: var(--status-done-border);
      background: var(--status-done-bg);
    }
    .status-badge.stale {
      color: var(--status-stale-color);
      border-color: var(--status-stale-border);
      background: var(--status-stale-bg);
    }
    .status-badge.failed {
      color: var(--status-failed-color);
      border-color: var(--status-failed-border);
      background: var(--status-failed-bg);
    }

    /* ── Cost badge ── */
    .cost-badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--violet);
      letter-spacing: 0.01em;
      background: var(--violet-dim);
      border: 1px solid rgba(192,132,252,0.35);
      border-radius: 20px;
      padding: 2px 9px;
      align-self: flex-start;
      margin-top: 1px;
      font-family: var(--font-mono);
    }
    .cost-badge.cost-nonzero {
      box-shadow: 0 0 8px rgba(192,132,252,0.18);
    }
    .cost-badge.cost-zero {
      color: var(--text-muted);
      opacity: 0.4;
      background: none;
      border-color: transparent;
      font-size: 0.68rem;
      font-weight: 500;
      box-shadow: none;
    }

    /* ── Token badge ── */
    .token-badge {
      flex-shrink: 0;
      font-size: 0.63rem;
      color: var(--text-muted);
      opacity: 0.6;
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1px 7px;
      align-self: flex-start;
      margin-top: 1px;
      font-family: var(--font-mono);
      white-space: nowrap;
    }
    .token-badge.token-zero {
      display: none;
    }

    /* ── Last log snippet ── */
    .card-log-snippet {
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.65;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-family: var(--font-mono);
    }

    /* ── Failed reason ── */
    .card-fail-reason {
      margin-top: 7px;
      font-size: 0.72rem;
      color: var(--red);
      opacity: 0.85;
      word-break: break-word;
      line-height: 1.5;
      background: var(--red-dim);
      border: 1px solid var(--status-failed-border);
      border-radius: 5px;
      padding: 6px 10px;
      font-family: var(--font-mono);
    }

    /* ── Age pill ── */
    .age-pill {
      display: inline-flex;
      align-items: center;
      font-size: 0.63rem;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 1px;
      font-family: var(--font-mono);
    }
    .age-pill.age-fresh {
      color: var(--text-muted);
      border-color: var(--card-border);
      opacity: 0.55;
    }
    .age-pill.age-amber {
      color: var(--amber);
      border-color: rgba(251,191,36,0.4);
      background: var(--amber-dim);
    }
    .age-pill.age-red {
      color: var(--red);
      border-color: rgba(248,113,113,0.4);
      background: var(--red-dim);
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 9px;
      font-size: 0.69rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .meta-item .label {
      color: var(--text-muted);
      opacity: 0.55;
    }
    .meta-item .value {
      color: var(--text-dim);
    }
    .meta-item.user .value {
      color: var(--accent);
    }

    .card-summary {
      margin-top: 9px;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.6;
      border-left: 2px solid var(--card-border);
      padding-left: 10px;
      word-break: break-word;
      font-family: var(--font-mono);
    }

    /* ── Log timeline ── */
    .card-log-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      font-size: 0.67rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: 1px solid var(--card-border);
      border-radius: 5px;
      padding: 3px 9px;
      font-family: var(--font-mono);
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .card-log-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(233,69,96,0.05);
    }

    .card-log {
      display: none;
      margin-top: 8px;
      background: #0f0f1a;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.67rem;
      line-height: 1.65;
      font-family: var(--font-mono);
    }
    [data-theme="light"] .card-log {
      background: #f2ece0;
    }
    .card-log.open {
      display: block;
    }

    .temporal-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      margin-top: 8px;
      background: #1a1a2e;
      border: 1px solid #4a4a8a;
      border-radius: 12px;
      color: #8888ff;
      font-size: 11px;
      text-decoration: none;
      font-family: monospace;
    }
    .temporal-pill:hover { background: #2a2a4e; border-color: #8888ff; }

    .provider-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 0.03em;
      vertical-align: middle;
      margin-left: 4px;
    }
    .provider-badge.provider-claude {
      background: rgba(99,179,237,0.12);
      border: 1px solid rgba(99,179,237,0.35);
      color: #63b3ed;
    }
    .provider-badge.provider-xai {
      background: rgba(251,146,60,0.12);
      border: 1px solid rgba(251,146,60,0.35);
      color: #fb923c;
    }
    .provider-badge.provider-other {
      background: rgba(156,163,175,0.1);
      border: 1px solid rgba(156,163,175,0.3);
      color: #9ca3af;
    }

    .log-entry {
      display: grid;
      grid-template-columns: 82px 68px 1fr;
      gap: 6px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    [data-theme="light"] .log-entry {
      border-bottom-color: rgba(0,0,0,0.04);
    }
    .log-entry:last-child {
      border-bottom: none;
    }

    .log-event {
      font-weight: 600;
    }
    .log-event.started   { color: var(--blue); }
    .log-event.done      { color: var(--teal); }
    .log-event.stale     { color: var(--amber); }
    .log-event.failed    { color: var(--red); }
    .log-event.progress  { color: var(--blue); }
    .log-event.error     { color: var(--red); }
    .log-event.milestone { color: var(--violet); }
    .log-event.blocked   { color: var(--amber); }
    .log-event.user_feedback { color: var(--teal); }

    .log-ts {
      color: var(--text-muted);
      opacity: 0.55;
    }
    .log-context {
      color: var(--text-dim);
      word-break: break-word;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 9px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--font-ui);
    }
    .section-header .section-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-header.sec-open        .section-dot  { background: var(--blue);   box-shadow: 0 0 7px var(--blue); }
    .section-header.sec-open        .section-label { color: var(--blue); }
    .section-header.sec-in_progress .section-dot  { background: var(--amber);  box-shadow: 0 0 7px var(--amber); }
    .section-header.sec-in_progress .section-label { color: var(--amber); }
    .section-header.sec-done        .section-dot  { background: var(--teal);   box-shadow: 0 0 7px var(--teal); }
    .section-header.sec-done        .section-label { color: var(--teal); }
    .section-header.sec-stale       .section-dot  { background: #4b5563; }
    .section-header.sec-stale       .section-label { color: #6b7280; }
    .section-header.sec-failed      .section-dot  { background: var(--red);    box-shadow: 0 0 7px var(--red); }
    .section-header.sec-failed      .section-label { color: var(--red); }

    .section-count {
      color: var(--text-muted);
      font-weight: 400;
      opacity: 0.55;
    }

    /* ── Empty state ── */
    .empty-state {
      padding: 56px 0 40px;
      text-align: center;
    }
    .empty-state .empty-prompt {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      opacity: 0.45;
      font-family: var(--font-mono);
    }
    .empty-state .empty-msg {
      font-size: 0.88rem;
      color: var(--text-dim);
      border-left: 3px solid var(--accent);
      display: inline-block;
      padding: 10px 18px;
      text-align: left;
      line-height: 1.8;
      max-width: 480px;
      border-radius: 0 6px 6px 0;
      background: rgba(233,69,96,0.04);
      font-family: var(--font-mono);
    }
    .empty-state .empty-msg em {
      color: var(--accent);
      font-style: normal;
    }

    /* ── Summary bar ── */
    #tasks-summary {
      padding: 9px 28px;
      border-bottom: 1px solid var(--card-border);
      background: rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px 8px;
      font-size: 0.7rem;
      font-family: var(--font-ui);
    }
    [data-theme="light"] #tasks-summary {
      background: rgba(0,0,0,0.03);
    }
    .sum-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-muted);
      white-space: nowrap;
      font-size: 0.68rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .sum-pill .sum-val { font-weight: 700; }
    .sum-pill.pill-inprogress { border-color: var(--status-inprogress-border); background: var(--status-inprogress-bg); }
    .sum-pill.pill-inprogress .sum-val { color: var(--amber); }
    .sum-pill.pill-done { border-color: var(--status-done-border); background: var(--status-done-bg); }
    .sum-pill.pill-done .sum-val { color: var(--teal); }
    .sum-pill.pill-stale { border-color: var(--status-stale-border); background: var(--status-stale-bg); }
    .sum-pill.pill-stale .sum-val { color: var(--status-stale-color); }
    .sum-pill.pill-failed { border-color: var(--status-failed-border); background: var(--status-failed-bg); }
    .sum-pill.pill-failed .sum-val { color: var(--red); }
    .sum-pill.pill-bg .sum-val,
    .sum-pill.pill-fg .sum-val { color: var(--text-dim); }
    .sum-pill.filterable { cursor: pointer; }
    .sum-pill.filterable:hover {
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }
    [data-theme="light"] .sum-pill.filterable:hover {
      border-color: rgba(0,0,0,0.2);
      background: rgba(0,0,0,0.05);
    }
    .sum-pill.active-filter {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.3);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }
    [data-theme="light"] .sum-pill.active-filter {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.25);
    }
    .sum-pill.active-filter .sum-val { opacity: 1; }
    .sum-sep {
      color: var(--card-border);
      padding: 0 1px;
      user-select: none;
      opacity: 0.6;
    }
    .sum-last {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      max-width: 320px;
      overflow: hidden;
      white-space: nowrap;
      font-size: 0.68rem;
    }
    .sum-last .sum-last-title {
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
    }
    .sum-last .sum-last-age { flex-shrink: 0; opacity: 0.55; }
    .sum-pill.pill-cost { border-color: rgba(192,132,252,0.4); background: var(--violet-dim); font-weight: 600; }
    .sum-pill.pill-cost .sum-val { color: var(--violet); font-size: 0.75rem; }
    .sum-pill.pill-tokens { border-color: var(--card-border); }
    .sum-pill.pill-tokens .sum-val { color: var(--text-dim); }
    @media (max-width: 768px) {
      #tasks-summary { padding: 8px 16px; }
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px 32px;
      font-size: 0.73rem;
      font-family: var(--font-mono);
    }
    .page-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 5px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.7rem;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(233,69,96,0.06);
    }
    .page-btn:disabled {
      opacity: 0.28;
      cursor: default;
    }
    .page-info {
      color: var(--text-muted);
      opacity: 0.65;
    }
    @media (max-width: 768px) {
      .pagination { padding: 10px 16px 24px; }
    }

    /* ── Error banner ── */
    .error-banner {
      margin: 14px 28px;
      padding: 10px 14px;
      background: var(--red-dim);
      border: 1px solid var(--status-failed-border);
      border-radius: 6px;
      color: var(--red);
      font-size: 0.78rem;
      font-family: var(--font-mono);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .page-header { padding: 18px 16px 12px; gap: 8px; }
      .refresh-status { margin-left: 0; flex: 0 0 100%; }
      .task-list { padding: 12px 12px 40px; }

      .task-card { padding: 12px 14px 11px; }

      .log-entry {
        grid-template-columns: 68px 1fr;
        grid-template-rows: auto auto;
      }
      .log-ts { grid-column: 2; grid-row: 1; }
      .log-event { grid-column: 1; grid-row: 1; }
      .log-context { grid-column: 1 / -1; grid-row: 2; padding-left: 4px; }
    }

    /* ── Search + sort controls ── */
    .controls-bar {
      padding: 10px 28px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    @media (max-width: 768px) {
      .controls-bar { padding: 8px 16px; }
    }

    .search-input {
      flex: 1;
      min-width: 160px;
      max-width: 340px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 5px 11px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(233,69,96,0.15);
    }

    .sort-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      opacity: 0.65;
      flex-shrink: 0;
    }

    .sort-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 3px 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .sort-btn:hover {
      border-color: rgba(255,255,255,0.22);
      color: var(--text);
    }
    [data-theme="light"] .sort-btn:hover {
      border-color: rgba(0,0,0,0.2);
    }
    .sort-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(233,69,96,0.08);
    }

    .search-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 2px;
      opacity: 0.5;
      flex-shrink: 0;
      line-height: 1;
    }
    .search-clear:hover { opacity: 1; }
    .search-clear.hidden { display: none; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>tasks</h1>
    <span class="subtitle">// subagent activity log</span>
    <span class="refresh-status" id="refresh-status">
      <span class="blink inactive">_</span> loading...
    </span>
  </div>

  <div class="controls-bar">
    <input class="search-input" id="search-input" type="text" placeholder="search tasks..." autocomplete="off" spellcheck="false">
    <button class="search-clear hidden" id="search-clear" title="clear search">&times;</button>
    <span class="sort-label">sort:</span>
    <button class="sort-btn active" data-sort="recent">status priority</button>
    <button class="sort-btn" data-sort="oldest">oldest</button>
    <button class="sort-btn" data-sort="expensive">most expensive</button>
    <button class="sort-btn" data-sort="longest">longest running</button>
  </div>

  <div id="tasks-summary" style="display:none;"></div>

  <div id="error-banner" class="error-banner" style="display:none;"></div>

  <div class="task-list" id="task-list">
    <!-- rendered by JS -->
  </div>

  <div class="pagination" id="pagination" style="display:none;">
    <button class="page-btn" id="btn-prev" onclick="goPage(currentPage - 1)">&#8592; prev</button>
    <span class="page-info" id="page-info"></span>
    <button class="page-btn" id="btn-next" onclick="goPage(currentPage + 1)">next &#8594;</button>
  </div>

  <script>
    // ── Relative time helpers ──
    function timeAgo(isoStr) {
      if (!isoStr) return '?';
      var dt = new Date(isoStr);
      var now = new Date();
      var diff = Math.floor((now - dt) / 1000);
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    // Seconds since an ISO timestamp
    function secsSince(isoStr) {
      if (!isoStr) return Infinity;
      return Math.floor((new Date() - new Date(isoStr)) / 1000);
    }

    // Human-readable hours/minutes for stale label
    function staleAge(isoStr) {
      if (!isoStr) return '';
      var secs = secsSince(isoStr);
      if (secs < 60) return secs + 's';
      if (secs < 3600) return Math.floor(secs / 60) + 'm';
      return Math.floor(secs / 3600) + 'h';
    }

    function escHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Format cost_usd: returns "$0.0032" or "—" for zero/null
    function fmtCost(val) {
      if (val == null || val === 0 || val === '') return '—';
      var n = parseFloat(val);
      if (!isFinite(n) || n === 0) return '—';
      if (n < 0.0001) return '<$0.0001';
      if (n < 0.01) return '$' + n.toFixed(4);
      if (n < 1) return '$' + n.toFixed(3);
      return '$' + n.toFixed(2);
    }

    // Format token count: e.g. 1234 → "1.2k", 123456 → "123k"
    function fmtTokens(n) {
      if (!n || n === 0) return null;
      if (n < 1000) return String(n);
      if (n < 1000000) return (n / 1000).toFixed(n < 10000 ? 1 : 0) + 'k';
      return (n / 1000000).toFixed(2) + 'M';
    }

    var _cardCounter = 0;

    function makeLogTimeline(log) {
      if (!log || !log.length) return '';
      return log.map(function(entry) {
        var ev = escHtml(entry.event || '?');
        var absTs = entry.ts ? new Date(entry.ts).toLocaleString() : '?';
        var relTs = entry.ts ? timeAgo(entry.ts) : '?';
        var ctx = entry.context ? entry.context.slice(0, 160) : '';
        return '<div class="log-entry">' +
          '<span class="log-event ' + escHtml(entry.event || '') + '">' + ev + '</span>' +
          '<span class="log-ts" title="' + escHtml(absTs) + '">' + escHtml(relTs) + '</span>' +
          '<span class="log-context">' + escHtml(ctx) + (entry.context && entry.context.length > 160 ? '…' : '') + '</span>' +
        '</div>';
      }).join('');
    }

    // Get the most recent log entry's timestamp and message
    function lastLogEntry(log) {
      if (!log || !log.length) return null;
      return log[log.length - 1];
    }

    // Get last activity timestamp: newest log entry ts, or started_at
    function lastActivityTs(task) {
      var last = lastLogEntry(task.log);
      if (last && last.ts) return last.ts;
      return task.started_at || null;
    }

    // Build age pill HTML based on seconds since last activity
    // Terminal statuses (done/failed/cancelled) always use neutral color regardless of age
    var TERMINAL_STATUSES = { done: true, failed: true, cancelled: true };
    function makeAgePill(ts, status) {
      if (!ts) return '';
      var secs = secsSince(ts);
      var rel = timeAgo(ts);
      var abs = new Date(ts).toLocaleString();
      var cls;
      if (TERMINAL_STATUSES[status] || secs < 300) {
        cls = 'age-fresh';
      } else if (secs < 3600) {
        cls = 'age-amber';
      } else {
        cls = 'age-red';
      }
      return '<span class="age-pill ' + cls + '" title="last activity: ' + escHtml(abs) + '">' + escHtml(rel) + '</span>';
    }

    function makeCard(task) {
      var title = escHtml(task.title || '(no title)');
      var agentType = escHtml(task.agent_type || '?');
      var status = task.status || 'stale';
      var badgeClass = status === 'open'        ? 'open'
                     : status === 'in_progress' ? 'in_progress'
                     : status === 'done'        ? 'done'
                     : status === 'failed'      ? 'failed'
                     : 'stale';

      // Timestamps
      var startedAbsTs = task.started_at ? new Date(task.started_at).toLocaleString() : null;
      var startedRel   = task.started_at ? timeAgo(task.started_at) : '?';

      var activityTs = lastActivityTs(task);
      var agePill = makeAgePill(activityTs, status);

      // Last log snippet (for inline display, ~80 chars)
      var lastEntry = lastLogEntry(task.log);
      var snippetHtml = '';
      if (lastEntry && lastEntry.context) {
        var snippet = lastEntry.context.slice(0, 80);
        if (lastEntry.context.length > 80) snippet += '…';
        snippetHtml = '<div class="card-log-snippet">' + escHtml(snippet) + '</div>';
      }

      // Failed reason: show last log message in muted red without expansion
      var failReasonHtml = '';
      if (status === 'failed' && lastEntry && lastEntry.context) {
        failReasonHtml = '<div class="card-fail-reason">&#9888; ' + escHtml(lastEntry.context.slice(0, 200)) +
          (lastEntry.context.length > 200 ? '…' : '') + '</div>';
      }

      var userMeta = task.discord_user
        ? '<span class="meta-item user"><span class="label">from</span><span class="value">@' + escHtml(task.discord_user) + '</span></span>'
        : '';

      var sessionShort = task.session_id ? escHtml(task.session_id.slice(0, 12)) : null;
      var sessionMeta = sessionShort
        ? '<span class="meta-item"><span class="label">session</span><span class="value" title="' + escHtml(task.session_id) + '">' + sessionShort + '</span></span>'
        : '';

      var bgMeta = (task.run_in_background !== null && task.run_in_background !== undefined)
        ? '<span class="meta-item"><span class="value">' + (task.run_in_background ? '🔄 background' : '⚡ foreground') + '</span></span>'
        : '';

      var isolationMeta = (task.isolation === 'worktree')
        ? '<span class="meta-item"><span class="value">🌳 worktree</span></span>'
        : '';

      var modelMeta = task.model
        ? '<span class="meta-item"><span class="label">model</span><span class="value">' + escHtml(task.model) + '</span></span>'
        : '';

      // Started at: relative primary, absolute as tooltip
      var startedMeta = startedAbsTs
        ? '<span class="meta-item"><span class="label">started</span><span class="value" title="' + escHtml(startedAbsTs) + '">' + escHtml(startedRel) + '</span></span>'
        : '';

      var summaryHtml = task.summary
        ? '<div class="card-summary">' + escHtml(task.summary.slice(0, 200)) + (task.summary.length > 200 ? '…' : '') + '</div>'
        : '';

      var logHtml = '';
      if (task.log && task.log.length > 0) {
        var cardId = 'log-' + (++_cardCounter);
        var taskIdAttr = task.id ? ' data-task-id="' + escHtml(String(task.id)) + '"' : '';
        logHtml = '<button class="card-log-toggle" onclick="toggleLog(\'' + cardId + '\', this)">▶ log (' + task.log.length + ')</button>' +
          '<div class="card-log"' + taskIdAttr + ' id="' + cardId + '">' + makeLogTimeline(task.log) + '</div>';
      }

      var costFmt = fmtCost(task.cost_usd);
      var costIsZero = costFmt === '—';
      var costHtml = '<span class="cost-badge' + (costIsZero ? ' cost-zero' : ' cost-nonzero') + '" title="agent cost">' + escHtml(costFmt) + '</span>';

      // Token badge: show total tokens if present
      var totalTokens = (task.input_tokens || 0) + (task.output_tokens || 0);
      var tokenFmt = fmtTokens(totalTokens);
      var tokenTitle = tokenFmt ? ('in: ' + fmtTokens(task.input_tokens || 0) + ' / out: ' + fmtTokens(task.output_tokens || 0)) : '';
      var tokenHtml = tokenFmt
        ? '<span class="token-badge" title="' + escHtml(tokenTitle) + '">' + escHtml(tokenFmt) + ' tok</span>'
        : '';

      var temporalLink = task.agent_id
        ? '<a class="temporal-pill" href="https://temporal.clung.us/namespaces/tasks/workflows/agent-task-' + escHtml(String(task.agent_id)) + '" target="_blank" rel="noopener">&#9201; Temporal</a>'
        : '';

      var providerRaw = (task.provider || '').toLowerCase();
      var providerClass = providerRaw === 'claude' ? 'provider-claude'
                        : providerRaw === 'xai'    ? 'provider-xai'
                        : providerRaw              ? 'provider-other'
                        : '';
      var providerBadge = providerClass
        ? '<span class="provider-badge ' + providerClass + '">' + escHtml(providerRaw) + '</span>'
        : '';

      var cardTaskIdAttr = task.id ? ' data-task-id="' + escHtml(String(task.id)) + '"' : '';
      return '<div class="task-card status-' + escHtml(status) + '"' + cardTaskIdAttr + '>' +
        '<div class="card-top">' +
          '<div class="card-title">' + title + providerBadge + '</div>' +
          agePill +
          costHtml +
          tokenHtml +
          '<span class="status-badge ' + escHtml(badgeClass) + '">' + escHtml(status.replace('_', ' ')) + '</span>' +
        '</div>' +
        snippetHtml +
        (status === 'failed' ? failReasonHtml : '') +
        '<div class="card-meta">' +
          '<span class="meta-item"><span class="label">agent</span><span class="value">' + agentType + '</span></span>' +
          userMeta +
          startedMeta +
          sessionMeta +
          bgMeta +
          isolationMeta +
          modelMeta +
        '</div>' +
        summaryHtml +
        logHtml +
        temporalLink +
      '</div>';
    }

    function toggleLog(id, btn) {
      var el = document.getElementById(id);
      if (!el) return;
      var isOpen = el.classList.toggle('open');
      btn.textContent = (isOpen ? '▼' : '▶') + btn.textContent.slice(1);
    }

    function fmtTime(d) {
      return String(d.getHours()).padStart(2,'0') + ':' +
             String(d.getMinutes()).padStart(2,'0') + ':' +
             String(d.getSeconds()).padStart(2,'0');
    }

    function sectionHeader(key, label, count, extraLabel) {
      var displayLabel = extraLabel ? label + ' ' + extraLabel : label;
      return '<div class="section-header sec-' + key + '">' +
        '<span class="section-dot"></span>' +
        '<span class="section-label">' + displayLabel + '</span>' +
        '<span class="section-count">(' + count + ')</span>' +
      '</div>';
    }

    function updateSummary(tasks, serverTotals) {
      var bar = document.getElementById('tasks-summary');
      if (!tasks || tasks.length === 0) { bar.style.display = 'none'; return; }

      // Use server-provided totals (full dataset) when available; fall back to counting local page
      var inProgress, done, stale, failed, bg, fg, totalCount, totalCost, totalInputTok, totalOutputTok;
      if (serverTotals && serverTotals.total != null) {
        totalCount     = serverTotals.total;
        inProgress     = serverTotals.in_progress     || 0;
        done           = serverTotals.done             || 0;
        stale          = serverTotals.stale            || 0;
        failed         = serverTotals.failed           || 0;
        bg             = serverTotals.background       || 0;
        fg             = serverTotals.foreground       || 0;
        totalCost      = serverTotals.total_cost_usd   || 0;
        totalInputTok  = serverTotals.total_input_tokens  || 0;
        totalOutputTok = serverTotals.total_output_tokens || 0;
      } else {
        inProgress = 0; done = 0; stale = 0; failed = 0; bg = 0; fg = 0; totalCost = 0; totalInputTok = 0; totalOutputTok = 0;
        tasks.forEach(function(t) {
          var s = t.status;
          if (s === 'in_progress') inProgress++;
          else if (s === 'done') done++;
          else if (s === 'failed') failed++;
          else stale++;
          if (t.run_in_background === true) bg++;
          else if (t.run_in_background === false) fg++;
          var c = parseFloat(t.cost_usd);
          if (isFinite(c) && c > 0) totalCost += c;
          totalInputTok  += (t.input_tokens  || 0);
          totalOutputTok += (t.output_tokens || 0);
        });
        totalCount = (_lastMeta && _lastMeta.total != null && _lastMeta.total > 0) ? _lastMeta.total : tasks.length;
      }

      var costLabel = totalCost > 0 ? fmtCost(totalCost) : '—';
      var totalTokens = totalInputTok + totalOutputTok;
      var tokenLabel = fmtTokens(totalTokens);
      var tokenTitle = tokenLabel ? ('in: ' + fmtTokens(totalInputTok) + ' / out: ' + fmtTokens(totalOutputTok)) : '';

      // Find newest task on the current page for "last:" display
      var newest = null;
      tasks.forEach(function(t) {
        if (t.started_at) {
          if (!newest || new Date(t.started_at) > new Date(newest.started_at)) newest = t;
        }
      });

      var lastHtml = '';
      if (newest) {
        var titleShort = (newest.title || '(no title)').slice(0, 50);
        if ((newest.title || '').length > 50) titleShort += '…';
        lastHtml = '<span class="sum-sep">|</span>' +
          '<span class="sum-last">' +
            '<span>last:</span>' +
            '<span class="sum-last-title">&ldquo;' + escHtml(titleShort) + '&rdquo;</span>' +
            '<span class="sum-last-age">(' + timeAgo(newest.started_at) + ')</span>' +
          '</span>';
      }

      var tokenPill = tokenLabel
        ? '<span class="sum-pill pill-tokens" title="' + escHtml(tokenTitle) + '"><span>tok</span><span class="sum-val">' + escHtml(tokenLabel) + '</span></span>'
        : '';

      bar.innerHTML =
        '<span class="sum-pill filterable" data-filter=""><span>total</span><span class="sum-val">' + totalCount + '</span></span>' +
        '<span class="sum-pill pill-inprogress filterable" data-filter="in_progress"><span>&#9889;</span><span class="sum-val">' + inProgress + '</span><span>in progress</span></span>' +
        '<span class="sum-pill pill-done filterable" data-filter="done"><span>&#10003;</span><span class="sum-val">' + done + '</span><span>done</span></span>' +
        '<span class="sum-pill pill-stale filterable" data-filter="stale"><span>&#9888;</span><span class="sum-val">' + stale + '</span><span>stale</span></span>' +
        '<span class="sum-pill pill-failed filterable" data-filter="failed"><span>&#10007;</span><span class="sum-val">' + failed + '</span><span>failed</span></span>' +
        '<span class="sum-sep">|</span>' +
        '<span class="sum-pill pill-bg"><span>&#128260;</span><span class="sum-val">' + bg + '</span><span>background</span></span>' +
        '<span class="sum-pill pill-fg"><span>&#9889;</span><span class="sum-val">' + fg + '</span><span>foreground</span></span>' +
        '<span class="sum-sep">|</span>' +
        '<span class="sum-pill pill-cost" title="total agent cost (all tasks)"><span>cost</span><span class="sum-val">' + escHtml(costLabel) + '</span></span>' +
        tokenPill +
        lastHtml;

      // Wire up filter clicks and mark active pill in one pass
      bar.querySelectorAll('.filterable').forEach(function(pill) {
        var f = pill.getAttribute('data-filter') || null;
        pill.classList.toggle('active-filter', f === currentFilter && currentFilter !== null);
        pill.addEventListener('click', function() {
          currentFilter = (currentFilter === f && f !== null) ? null : f;
          render(_lastTasks, _lastMeta, _lastTotals);
        });
      });

      bar.style.display = '';
    }

    var currentFilter = null;
    var currentSort = 'recent';
    var currentSearch = '';
    var _searchDebounce = null;
    var _lastTasks = [];
    // For change detection
    var _lastStateKey = null;
    // Pagination state
    var currentPage = 1;
    var PAGE_LIMIT = 50;
    var _lastMeta = { total: 0, pages: 1 };
    var _lastTotals = null;

    function stateKey(tasks) {
      return tasks.map(function(t) { return t.id + ':' + t.status; }).join(',');
    }

    function updatePagination(meta) {
      _lastMeta = meta;
      var pager = document.getElementById('pagination');
      var info = document.getElementById('page-info');
      var btnPrev = document.getElementById('btn-prev');
      var btnNext = document.getElementById('btn-next');
      if (!meta || meta.pages <= 1) {
        pager.style.display = 'none';
        return;
      }
      pager.style.display = '';
      info.textContent = 'page ' + meta.page + ' / ' + meta.pages + ' (' + meta.total + ' total)';
      btnPrev.disabled = meta.page <= 1;
      btnNext.disabled = meta.page >= meta.pages;
    }

    function goPage(p) {
      if (p < 1 || p > _lastMeta.pages) return;
      currentPage = p;
      fetchTasks();
    }

    function render(tasks, meta, totals) {
      _lastTasks = tasks;
      if (totals != null) _lastTotals = totals;
      tasks = tasks.filter(function(t) { return t.status !== 'milestone'; });

      // Detect whether task count or states changed
      var key = stateKey(tasks);
      var changed = key !== _lastStateKey;
      _lastStateKey = key;

      // Save the set of task IDs whose log panels are currently open
      var openLogIds = new Set(
        Array.prototype.slice.call(document.querySelectorAll('.card-log.open[data-task-id]'))
          .map(function(el) { return el.getAttribute('data-task-id'); })
      );

      _cardCounter = 0;

      // Ordering is handled server-side; tasks arrive in the requested sort order
      var sorted = tasks;

      updateSummary(tasks, totals);
      updatePagination(meta);

      var container = document.getElementById('task-list');

      if (tasks.length === 0) {
        var emptyMsg = currentSearch
          ? '<div class="empty-state"><div class="empty-msg"><em>no tasks matching &ldquo;' + escHtml(currentSearch) + '&rdquo;</em></div></div>'
          : '<div class="empty-state">' +
              '<div class="empty-prompt">$ bigclungus --list-tasks</div>' +
              '<div class="empty-msg">' +
                '<em>nothing running.</em><br>' +
                'my subagents are idle, my queues are empty,<br>' +
                'and for once i have nothing to say about it.<br>' +
                '<em>probably fine.</em>' +
              '</div>' +
            '</div>';
        container.innerHTML = emptyMsg;

        document.getElementById('refresh-status').innerHTML =
          '<span class="blink inactive">_</span> updated ' + fmtTime(new Date()) + ' &middot; 0 tasks';
        return;
      }

      var visible = currentFilter
        ? sorted.filter(function(t) { return (t.status || 'stale') === currentFilter; })
        : sorted;

      var html = visible.map(makeCard).join('');

      if (!html) {
        html = '<div class="empty-state"><div class="empty-msg"><em>no tasks in this category.</em></div></div>';
      }
      container.innerHTML = html;

      // Re-open any log panels that were open before the re-render
      if (openLogIds.size > 0) {
        openLogIds.forEach(function(taskId) {
          var logEl = container.querySelector('.card-log[data-task-id="' + taskId + '"]');
          if (!logEl) return;
          logEl.classList.add('open');
          // Update the sibling toggle button label to reflect open state
          var btn = logEl.previousElementSibling;
          if (btn && btn.classList.contains('card-log-toggle')) {
            btn.textContent = '▼' + btn.textContent.slice(1);
          }
        });
      }

      // Blink indicator only when state changed
      var blinkEl = document.getElementById('refresh-blink');
      var statusEl = document.getElementById('refresh-status');
      var totalLabel = meta && meta.total != null ? meta.total : tasks.length;
      statusEl.innerHTML =
        '<span class="blink' + (changed ? '' : ' inactive') + '" id="refresh-blink">_</span> updated ' +
        fmtTime(new Date()) + ' &middot; ' + totalLabel + ' tasks';
    }

    function showAuthPrompt() {
      var loginUrl = '/auth/github?next=' + encodeURIComponent(window.location.pathname);
      document.getElementById('error-banner').style.display = 'none';
      document.getElementById('task-list').innerHTML = '';
      document.getElementById('tasks-summary').style.display = 'none';
      var container = document.getElementById('auth-prompt');
      if (!container) {
        container = document.createElement('div');
        container.id = 'auth-prompt';
        document.getElementById('task-list').parentNode.insertBefore(container, document.getElementById('task-list'));
      }
      container.innerHTML =
        '<div style="text-align:center; padding: 80px 20px;">' +
          '<h2 style="margin: 0 0 10px; font-size: 1.4rem; color: var(--accent); text-shadow: 0 0 14px var(--accent);">Sign in to view tasks</h2>' +
          '<p style="color: var(--text-muted); margin: 0 0 28px; font-size: 0.9rem;">Authentication required</p>' +
          '<a href="' + loginUrl + '" style="' +
            'display: inline-block;' +
            'background: #24292e;' +
            'color: #fff;' +
            'padding: 12px 28px;' +
            'border-radius: 6px;' +
            'text-decoration: none;' +
            'font-size: 1rem;' +
            'font-weight: 500;' +
            'border: 1px solid rgba(255,255,255,0.12);' +
            'transition: background 0.15s ease;' +
          '" onmouseover="this.style.background=\'#363d44\'" onmouseout="this.style.background=\'#24292e\'">Sign in with GitHub</a>' +
        '</div>';
      document.getElementById('refresh-status').innerHTML =
        '<span style="color:var(--text-muted)">not signed in</span>';
    }

    function fetchTasks() {
      var url = '/api/tasks?page=' + currentPage + '&limit=' + PAGE_LIMIT +
        '&sort=' + encodeURIComponent(currentSort) +
        (currentSearch ? '&search=' + encodeURIComponent(currentSearch) : '');
      fetch(url)
        .then(function(r) {
          if (r.status === 403 || r.status === 401) {
            showAuthPrompt();
            return null;
          }
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(data) {
          if (data === null) return;
          document.getElementById('error-banner').style.display = 'none';
          var authPrompt = document.getElementById('auth-prompt');
          if (authPrompt) authPrompt.innerHTML = '';
          // Handle both paginated response {tasks, total, page, limit, pages, totals} and legacy array
          if (Array.isArray(data)) {
            render(data, null, null);
          } else {
            render(data.tasks || [], { total: data.total, page: data.page, limit: data.limit, pages: data.pages }, data.totals || null);
          }
        })
        .catch(function(err) {
          var banner = document.getElementById('error-banner');
          banner.textContent = 'failed to load tasks: ' + err.message;
          banner.style.display = 'block';
          document.getElementById('refresh-status').innerHTML =
            '<span style="color:var(--accent)">error</span>';
        });
    }

    // ── Sort button wiring ──
    document.querySelectorAll('.sort-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var s = btn.getAttribute('data-sort');
        if (currentSort === s) return;
        currentSort = s;
        document.querySelectorAll('.sort-btn').forEach(function(b) {
          b.classList.toggle('active', b.getAttribute('data-sort') === s);
        });
        currentPage = 1;
        fetchTasks();
      });
    });

    // ── Search input wiring ──
    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', function() {
      var val = searchInput.value.trim();
      searchClear.classList.toggle('hidden', val === '');
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(function() {
        if (val !== currentSearch) {
          currentSearch = val;
          currentPage = 1;
          fetchTasks();
        }
      }, 300);
    });

    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      searchClear.classList.add('hidden');
      currentSearch = '';
      currentPage = 1;
      fetchTasks();
    });

    fetchTasks();
    setInterval(function() {
      // Don't poll if we're showing the auth prompt
      if (document.getElementById('auth-prompt') && document.getElementById('auth-prompt').innerHTML) return;
      fetchTasks();
    }, 10000);
  </script>
</body>
</html>
