<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clungiverse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #0a0a0a;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100dvh;
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #888;
      font-family: monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Clungiverse...</div>
  <canvas id="game-canvas"></canvas>
  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.getElementById('game-canvas').addEventListener('selectstart', e => e.preventDefault());
    window.addEventListener('load', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', e => e.preventDefault(), { passive: false });
    document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  </script>
  <script src="/static/clungiverse/mob-sprites.js"></script>
  <script type="module" src="/clungiverse/main.js?v=f6fc5cc0"></script>
</body>
</html>
