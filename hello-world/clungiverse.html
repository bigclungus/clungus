<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clungiverse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #888;
      font-family: monospace;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Clungiverse...</div>
  <canvas id="game-canvas"></canvas>
  <script>
    // Remove loading text once the canvas is ready
    document.getElementById('game-canvas').addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('load', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script src="/static/clungiverse/mob-sprites.js"></script>
  <script type="module" src="/clungiverse/main.js?v=43c23378"></script>
</body>
</html>
