<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>costs — clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css?v=d004dbf">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="/sitenav.js?v=0823aca" defer></script>
  <style>
    :root {
      --bg: #0e0e1a;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #4ecca3;
      --card-bg: #1a1a2e;
      --card-border: #2a2a45;
      --bar-color: #4ecca3;
      --bar-bg: #2a2a45;
    }
    [data-theme="light"] {
      --bg: #f5f0e8;
      --text: #2a2a2a;
      --text-muted: #666;
      --accent: #2aa198;
      --card-bg: #fff8ea;
      --card-border: #d0c9b0;
      --bar-color: #2aa198;
      --bar-bg: #d0c9b0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
    }
    #main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 40px;
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 24px 20px;
    }
    .stat-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }
    section {
      margin-bottom: 40px;
    }
    section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--card-border);
    }
    /* Bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 180px;
      padding: 0 4px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      gap: 4px;
    }
    .bar-wrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      width: 100%;
    }
    .bar {
      width: 100%;
      background: var(--bar-color);
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height 0.4s ease;
    }
    .bar-date {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }
    .bar-cost {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
    }
    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--card-border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--card-border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .mono {
      font-family: monospace;
      font-size: 0.82rem;
    }
    .cost-val { color: var(--accent); font-weight: 700; }
    .refresh-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ingest-btn {
      background: var(--accent);
      border: none;
      color: #0e0e1a;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      margin-left: 10px;
      font-weight: 700;
    }
    .ingest-btn:hover { opacity: 0.85; }
    .status-msg {
      display: inline-block;
      margin-left: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .loading { color: var(--text-muted); padding: 20px 0; }
    .empty { color: var(--text-muted); font-size: 0.9rem; padding: 12px 0; }
  </style>
</head>
<body>
<div id="main">
  <h1>costs</h1>
  <p class="subtitle">token usage and API spend across all BigClungus sessions</p>

  <div>
    <button class="refresh-btn" id="refresh-btn">refresh</button>
    <button class="ingest-btn" id="ingest-btn">ingest now</button>
    <span class="status-msg" id="status-msg"></span>
  </div>

  <!-- Today's stats -->
  <div class="grid" id="today-grid">
    <div class="stat-card">
      <div class="label">today's cost</div>
      <div class="value" id="today-cost">—</div>
    </div>
    <div class="stat-card">
      <div class="label">input tokens today</div>
      <div class="value" id="today-input">—</div>
    </div>
    <div class="stat-card">
      <div class="label">output tokens today</div>
      <div class="value" id="today-output">—</div>
    </div>
  </div>

  <!-- Last 7 days chart -->
  <section>
    <h2>last 7 days</h2>
    <div class="bar-chart" id="bar-chart">
      <div class="loading">loading…</div>
    </div>
  </section>

  <!-- Top agents -->
  <section>
    <h2>top agents by cost (all time)</h2>
    <div id="top-agents-wrap">
      <div class="loading">loading…</div>
    </div>
  </section>

  <!-- Sessions -->
  <section>
    <h2>session breakdown</h2>
    <div id="sessions-wrap">
      <div class="loading">loading…</div>
    </div>
  </section>
</div>

<script>
(function () {
  'use strict';

  function fmt(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  }

  function fmtCost(n) {
    if (n >= 1) return '$' + n.toFixed(2);
    if (n >= 0.01) return '$' + n.toFixed(3);
    return '$' + n.toFixed(4);
  }

  function fmtDate(d) {
    const parts = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1], 10) - 1] + ' ' + parseInt(parts[2], 10);
  }

  async function loadStats() {
    document.getElementById('status-msg').textContent = 'loading…';
    try {
      const resp = await fetch('/api/tokens/stats');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      renderStats(data);
      document.getElementById('status-msg').textContent = 'updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('status-msg').textContent = 'error: ' + e.message;
    }
  }

  function renderStats(data) {
    // Today
    document.getElementById('today-cost').textContent = fmtCost(data.today.cost);
    document.getElementById('today-input').textContent = fmt(data.today.inputTokens);
    document.getElementById('today-output').textContent = fmt(data.today.outputTokens);

    // Bar chart — last 7 days
    const chart = document.getElementById('bar-chart');
    chart.innerHTML = '';
    const days = data.last7days || [];
    const maxCost = Math.max(...days.map(d => d.cost), 0.0001);

    days.forEach(function (day) {
      const col = document.createElement('div');
      col.className = 'bar-col';

      const barWrap = document.createElement('div');
      barWrap.className = 'bar-wrap';

      const bar = document.createElement('div');
      bar.className = 'bar';
      const heightPct = Math.max((day.cost / maxCost) * 100, 1);
      bar.style.height = heightPct + '%';
      bar.title = fmtCost(day.cost);
      barWrap.appendChild(bar);

      const costLabel = document.createElement('div');
      costLabel.className = 'bar-cost';
      costLabel.textContent = day.cost > 0 ? fmtCost(day.cost) : '';

      const dateLabel = document.createElement('div');
      dateLabel.className = 'bar-date';
      dateLabel.textContent = fmtDate(day.date);

      col.appendChild(barWrap);
      col.appendChild(costLabel);
      col.appendChild(dateLabel);
      chart.appendChild(col);
    });

    if (days.length === 0) {
      chart.innerHTML = '<div class="empty">no data yet</div>';
    }

    // Top agents
    const agentsWrap = document.getElementById('top-agents-wrap');
    const agents = data.topAgents || [];
    if (agents.length === 0) {
      agentsWrap.innerHTML = '<div class="empty">no data yet</div>';
    } else {
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>#</th><th>agent name</th><th>runs</th><th>total cost</th></tr></thead>';
      const tbody = document.createElement('tbody');
      agents.forEach(function (a, i) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="mono">' + (i + 1) + '</td>' +
          '<td>' + escHtml(a.name || '—') + '</td>' +
          '<td>' + a.count + '</td>' +
          '<td class="cost-val">' + fmtCost(a.totalCost) + '</td>';
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      agentsWrap.innerHTML = '';
      agentsWrap.appendChild(table);
    }

    // Sessions
    const sessionsWrap = document.getElementById('sessions-wrap');
    const sessions = data.sessions || [];
    if (sessions.length === 0) {
      sessionsWrap.innerHTML = '<div class="empty">no data yet</div>';
    } else {
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>session id</th><th>agents</th><th>total cost</th></tr></thead>';
      const tbody = document.createElement('tbody');
      sessions.forEach(function (s) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="mono">' + escHtml(s.sessionId.slice(0, 20)) + '…</td>' +
          '<td>' + s.agentCount + '</td>' +
          '<td class="cost-val">' + fmtCost(s.cost) + '</td>';
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      sessionsWrap.innerHTML = '';
      sessionsWrap.appendChild(table);
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function ingest() {
    const btn = document.getElementById('ingest-btn');
    const msg = document.getElementById('status-msg');
    btn.disabled = true;
    msg.textContent = 'ingesting…';
    try {
      const resp = await fetch('/api/tokens/ingest', { method: 'POST' });
      const data = await resp.json();
      msg.textContent = 'ingested ' + data.ingested + ', skipped ' + data.skipped;
      await loadStats();
    } catch (e) {
      msg.textContent = 'ingest error: ' + e.message;
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', loadStats);
  document.getElementById('ingest-btn').addEventListener('click', ingest);

  loadStats();
})();
</script>
</body>
</html>
