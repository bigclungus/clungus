<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cockpit — clung.us</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/sitenav.css">
  <script src="/sitenav.js" defer></script>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d14;
      color: #c8c8d8;
      margin: 0;
      padding: 24px;
    }
    h1 {
      font-size: 1.4rem;
      color: #a0c4ff;
      margin: 0 0 20px 0;
      letter-spacing: 0.05em;
    }
    .service-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .service-table th {
      text-align: left;
      color: #7eb8f7;
      font-weight: normal;
      padding: 8px 12px;
      border-bottom: 1px solid #2a2a40;
      letter-spacing: 0.04em;
    }
    .service-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #1e1e2e;
      vertical-align: middle;
    }
    .service-table tr:hover td {
      background: #141422;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 0.03em;
    }
    .badge-running { background: #143a1e; color: #4ecca3; border: 1px solid #2a6a44; }
    .badge-stopped { background: #2a1a1a; color: #888; border: 1px solid #442a2a; }
    .badge-failed  { background: #3a1010; color: #f87171; border: 1px solid #6a2020; }
    .badge-unknown { background: #1e1e2e; color: #888; border: 1px solid #333; }
    .btn-restart {
      background: #1e1e38;
      color: #a0c4ff;
      border: 1px solid #444466;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-restart:hover { background: #2a2a50; }
    .btn-restart:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-logs {
      background: transparent;
      color: #7eb8f7;
      border: 1px solid #2a3a55;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-logs:hover { background: #141c2e; }
    .uptime { color: #888; font-size: 0.8rem; }
    .log-panel {
      display: none;
      margin-top: 20px;
      background: #0a0a12;
      border: 1px solid #222238;
      border-radius: 4px;
      padding: 16px;
    }
    .log-panel.visible { display: block; }
    .log-panel h3 {
      margin: 0 0 12px 0;
      font-size: 0.9rem;
      color: #7eb8f7;
    }
    .log-panel pre {
      margin: 0;
      font-size: 0.75rem;
      line-height: 1.5;
      color: #b0b0c0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-close {
      float: right;
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .log-close:hover { color: #aaa; }
    .status-bar {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 16px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e2a3a;
      border: 1px solid #3a5a7a;
      color: #a0c4ff;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #2a1010; border-color: #6a2020; color: #f87171; }
  </style>
</head>
<body>
  <h1>cockpit</h1>
  <div class="status-bar" id="status-bar">loading...</div>
  <table class="service-table">
    <thead>
      <tr>
        <th>service</th>
        <th>status</th>
        <th>uptime</th>
        <th>mem</th>
        <th>restarts</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="service-tbody">
      <tr><td colspan="6" style="color:#555;padding:20px 12px">loading...</td></tr>
    </tbody>
  </table>

  <div class="log-panel" id="log-panel">
    <h3 id="log-title">logs <button class="log-close" id="log-close">✕</button></h3>
    <pre id="log-content"></pre>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const POLL_INTERVAL_MS = 10000;
    let activeLogService = null;
    let pollTimer = null;

    function formatUptime(seconds) {
      if (seconds === null || seconds === undefined) return '—';
      if (seconds < 60) return `${seconds}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${h}h ${m}m`;
    }

    function formatMem(mb) {
      if (mb === null || mb === undefined) return '—';
      if (mb >= 1024) return `${(mb / 1024).toFixed(1)}G`;
      return `${mb}M`;
    }

    function badgeClass(state) {
      if (state === 'active') return 'badge-running';
      if (state === 'failed') return 'badge-failed';
      if (state === 'inactive' || state === 'dead') return 'badge-stopped';
      return 'badge-unknown';
    }

    function badgeLabel(state, sub) {
      if (state === 'active' && sub === 'running') return 'running';
      if (state === 'active') return sub || state;
      if (state === 'inactive') return 'stopped';
      return state || 'unknown';
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/cockpit/status');
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            window.location.href = '/auth/github?next=' + encodeURIComponent(window.location.href);
            return;
          }
          throw new Error(`HTTP ${res.status}`);
        }
        const services = await res.json();
        renderServices(services);
        document.getElementById('status-bar').textContent =
          `last updated ${new Date().toLocaleTimeString()} — auto-refresh every 10s`;
      } catch (err) {
        document.getElementById('status-bar').textContent = `error: ${err.message}`;
      }
    }

    function renderServices(services) {
      const tbody = document.getElementById('service-tbody');
      tbody.innerHTML = '';
      for (const svc of services) {
        const tr = document.createElement('tr');
        const bClass = badgeClass(svc.state);
        const bLabel = badgeLabel(svc.state, svc.sub);
        tr.innerHTML = `
          <td><strong>${svc.name}</strong>${svc.description ? `<br><span style="color:#555;font-size:0.75rem">${svc.description}</span>` : ''}</td>
          <td><span class="badge ${bClass}">${bLabel}</span></td>
          <td class="uptime">${formatUptime(svc.uptime_sec)}</td>
          <td class="uptime">${formatMem(svc.memory_mb)}</td>
          <td class="uptime">${svc.restarts ?? 0}</td>
          <td style="white-space:nowrap">
            <button class="btn-logs" data-service="${svc.name}">logs</button>
            <button class="btn-restart" data-service="${svc.name}" style="margin-left:6px">restart</button>
          </td>
        `;
        tbody.appendChild(tr);
      }

      tbody.querySelectorAll('.btn-logs').forEach(btn => {
        btn.addEventListener('click', () => loadLogs(btn.dataset.service));
      });
      tbody.querySelectorAll('.btn-restart').forEach(btn => {
        btn.addEventListener('click', () => restartService(btn));
      });
    }

    async function loadLogs(service) {
      activeLogService = service;
      const panel = document.getElementById('log-panel');
      const content = document.getElementById('log-content');
      const title = document.getElementById('log-title');
      title.innerHTML = `logs: ${service} <button class="log-close" id="log-close">✕</button>`;
      document.getElementById('log-close').addEventListener('click', () => {
        panel.classList.remove('visible');
        activeLogService = null;
      });
      content.textContent = 'loading...';
      panel.classList.add('visible');
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      try {
        const res = await fetch(`/api/cockpit/logs/${encodeURIComponent(service)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        content.textContent = data.logs || '(no output)';
        content.scrollTop = content.scrollHeight;
      } catch (err) {
        content.textContent = `error loading logs: ${err.message}`;
      }
    }

    async function restartService(btn) {
      const service = btn.dataset.service;
      btn.disabled = true;
      btn.textContent = 'restarting...';
      try {
        const res = await fetch('/api/cockpit/restart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ service }),
        });
        const data = await res.json();
        if (!res.ok) {
          showToast(`restart failed: ${data.error || res.status}`, true);
        } else {
          showToast(`${service} restarted`, false);
          setTimeout(fetchStatus, 1500);
        }
      } catch (err) {
        showToast(`error: ${err.message}`, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'restart';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchStatus();
      pollTimer = setInterval(fetchStatus, POLL_INTERVAL_MS);
    });
  </script>
</body>
</html>
