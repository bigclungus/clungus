<script>
(function() {
  var loginUrl = '/auth/github?next=' + encodeURIComponent(window.location.pathname);
  document.getElementById('login-link').href = loginUrl;

  fetch('/api/me')
    .then(function(r) {
      if (r.status === 401 || r.status === 403) {
        document.getElementById('auth-prompt').style.display = 'block';
        document.getElementById('commons-content').style.display = 'none';
        window.__commons_authed = false;
        return null;
      }
      return r.json();
    })
    .then(function(user) {
      if (!user || !user.username) {
        document.getElementById('auth-prompt').style.display = 'block';
        document.getElementById('commons-content').style.display = 'none';
        window.__commons_authed = false;
        return;
      }
      document.getElementById('auth-prompt').style.display = 'none';
      document.getElementById('commons-content').style.display = '';
      window.__commons_authed = true;
    })
    .catch(function() {
      document.getElementById('auth-prompt').style.display = 'block';
      document.getElementById('commons-content').style.display = 'none';
      window.__commons_authed = false;
    });
})();
</script>

<script>
(function () {
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────────
var W = 1000, H = 700;
var TILE = 20;
var COLS = Math.floor(W / TILE); // 50
var ROWS = Math.floor(H / TILE); // 35

// ── Persona audition system ─────────────────────────────────────────────────────
var AUDITION_URL = '';
var auditionWalkers = [];
var auditionLastFetch = 0;
var auditionHoveredId = null;
var auditionCardWalkerId = null;
var auditionWalkerY = 18 * 20 + 10; // pixel y (TILE*18 center)

function fetchAuditionWalkers() {
  var now = Date.now();
  if (now - auditionLastFetch < 2000) return;
  auditionLastFetch = now;
  fetch(AUDITION_URL + '/api/audition/walkers')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) { if (data) auditionWalkers = data; })
    .catch(function() {});
}

function drawAuditionWalkers() {
  for (var i = 0; i < auditionWalkers.length; i++) {
    var w = auditionWalkers[i];
    // Skip walkers that haven't entered the visible canvas yet
    if (w.x < 0) continue;
    var wx = Math.round(w.x);
    var wy = auditionWalkerY;
    // Simple humanoid silhouette (similar to drawCharacter but more mysterious)
    var color = w.avatar_color || '#a78bfa';
    var isHovered = (w.id === auditionHoveredId);

    if (isHovered) {
      // Glow behind paused walker
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
    }

    // Shadow
    ctx.fillStyle = '#00000044';
    ctx.fillRect(wx - 4 + 2, wy + 12 - 2, 8, 4);

    // Body
    ctx.fillStyle = color;
    ctx.fillRect(wx - 4, wy, 8, 12);

    // Head
    ctx.fillStyle = lighten(color, 20);
    ctx.fillRect(wx - 3, wy - 6, 6, 6);

    // Eyes
    ctx.fillStyle = '#00000088';
    ctx.fillRect(wx - 2, wy - 5, 1, 2);
    ctx.fillRect(wx + 1, wy - 5, 1, 2);

    if (isHovered) {
      ctx.restore();
      // Name + title bubble above
      var bubLines = [w.name, w.title];
      drawBubble(wx, wy - 8, bubLines, 1.0);
    } else {
      // Subtle "?" indicator above non-paused walkers
      ctx.save();
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = color + 'aa';
      ctx.fillText('?', wx, wy - 10);
      ctx.restore();
    }
  }
}

// Audition card UI elements
var auditionCard = document.getElementById('audition-card');
var auditionCardName = document.getElementById('audition-card-name');
var auditionCardTitle = document.getElementById('audition-card-title');
var auditionCardTraits = document.getElementById('audition-card-traits');
var auditionCardDesc = document.getElementById('audition-card-desc');
var auditionKeepBtn = document.getElementById('audition-keep-btn');
var auditionDismissBtn = document.getElementById('audition-dismiss-btn');

function showAuditionCard(walker, clientX, clientY) {
  auditionCardWalkerId = walker.id;
  auditionCardName.textContent = walker.name;
  auditionCardTitle.textContent = walker.title;
  auditionCardTraits.innerHTML = walker.traits.map(function(t) {
    return '<span class="audition-trait">' + t + '</span>';
  }).join('');
  auditionCardDesc.textContent = walker.description;
  // Position card near walker but ensure it's visible
  var cardLeft = Math.min(clientX + 20, window.innerWidth - 300);
  var cardTop = Math.max(clientY - 20, 10);
  auditionCard.style.left = cardLeft + 'px';
  auditionCard.style.top = cardTop + 'px';
  auditionCard.classList.add('active');
}

function hideAuditionCard() {
  auditionCard.classList.remove('active');
  auditionCardWalkerId = null;
}

auditionKeepBtn.addEventListener('click', function() {
  var id = auditionCardWalkerId;
  if (!id) return;
  hideAuditionCard();
  fetch(AUDITION_URL + '/api/audition/keep', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id }),
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      // Remove from local list
      auditionWalkers = auditionWalkers.filter(function(w) { return w.id !== id; });
      auditionHoveredId = null;
    })
    .catch(function(err) { console.error('[audition] keep failed:', err); });
});

auditionDismissBtn.addEventListener('click', function() {
  var id = auditionCardWalkerId;
  if (!id) return;
  hideAuditionCard();
  fetch(AUDITION_URL + '/api/audition/dismiss', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id }),
  })
    .then(function() {
      auditionWalkers = auditionWalkers.filter(function(w) { return w.id !== id; });
      auditionHoveredId = null;
    })
    .catch(function(err) { console.error('[audition] dismiss failed:', err); });
});

// ── Chunk system ───────────────────────────────────────────────────────────────
var chunkX = 0, chunkY = 0;

function chunkSeed(cx, cy) {
  var h = cx * 374761393 + cy * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return h ^ (h >> 16);
}

function seededRand(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function generateChunk(cx, cy) {
  var m = [];
  for (var r = 0; r < ROWS; r++) {
    m.push(new Uint8Array(COLS));
  }

  var rng = seededRand(chunkSeed(cx, cy));

  // Scatter trees (~10%) — keep 2-tile border clear
  for (var r = 2; r < ROWS - 2; r++) {
    for (var c = 2; c < COLS - 2; c++) {
      // Keep center 20x12 area mostly clear for NPCs
      var inCenter = (c >= 15 && c <= 35 && r >= 12 && r <= 23);
      if (inCenter) continue;
      var roll = rng();
      if (roll < 0.10) {
        m[r][c] = 4; // tree
      }
    }
  }

  // Scatter water clusters (~5%)
  var numPonds = 1 + Math.floor(rng() * 3);
  for (var p = 0; p < numPonds; p++) {
    var pr = 5 + Math.floor(rng() * (ROWS - 12));
    var pc = 5 + Math.floor(rng() * (COLS - 12));
    var pw = 3 + Math.floor(rng() * 5);
    var ph = 2 + Math.floor(rng() * 4);
    for (var wr = pr; wr < Math.min(pr + ph, ROWS - 3); wr++) {
      for (var wc = pc; wc < Math.min(pc + pw, COLS - 3); wc++) {
        m[wr][wc] = 2;
      }
    }
  }

  // Scatter rocks
  var numRocks = 3 + Math.floor(rng() * 6);
  for (var k = 0; k < numRocks; k++) {
    var rr = 2 + Math.floor(rng() * (ROWS - 4));
    var rc = 2 + Math.floor(rng() * (COLS - 4));
    if (m[rr][rc] === 0) m[rr][rc] = 5;
  }

  // Add 1-2 path corridors (grass strips through tree areas)
  var numPaths = 1 + Math.floor(rng() * 2);
  for (var pp = 0; pp < numPaths; pp++) {
    if (rng() < 0.5) {
      // Horizontal strip
      var pathRow = 3 + Math.floor(rng() * (ROWS - 6));
      for (var pc2 = 0; pc2 < COLS; pc2++) {
        if (m[pathRow][pc2] === 4 || m[pathRow][pc2] === 5) m[pathRow][pc2] = 1;
      }
    } else {
      // Vertical strip
      var pathCol = 3 + Math.floor(rng() * (COLS - 6));
      for (var pr2 = 0; pr2 < ROWS; pr2++) {
        if (m[pr2][pathCol] === 4 || m[pr2][pathCol] === 5) m[pr2][pathCol] = 1;
      }
    }
  }

  // Always clear entry/exit corridors at each edge (middle 10 tiles)
  var midC = Math.floor(COLS / 2);
  var midR = Math.floor(ROWS / 2);
  for (var i = -5; i <= 5; i++) {
    // Top edge
    if (m[0][midC + i] !== 0) m[0][midC + i] = 0;
    if (m[1][midC + i] !== 0) m[1][midC + i] = 0;
    // Bottom edge
    if (m[ROWS - 1][midC + i] !== 0) m[ROWS - 1][midC + i] = 0;
    if (m[ROWS - 2][midC + i] !== 0) m[ROWS - 2][midC + i] = 0;
    // Left edge
    if (m[midR + i][0] !== 0) m[midR + i][0] = 0;
    if (m[midR + i][1] !== 0) m[midR + i][1] = 0;
    // Right edge
    if (m[midR + i][COLS - 1] !== 0) m[midR + i][COLS - 1] = 0;
    if (m[midR + i][COLS - 2] !== 0) m[midR + i][COLS - 2] = 0;
  }

  return m;
}

// ── Sprite winner system ────────────────────────────────────────────────────────
// Maps npc.name → winning variant letter ('A'|'B'|'C') once quorum is reached
var SPRITE_WINNERS = {};

// Maps npc.name (API slug) → sprite function ID (used in drawSprite_<id>_<letter>)
// and poll slug (used in /api/vote/results?poll_id=sprite-<slug>)
var SPRITE_SLUG_MAP = {
  'chairman':   { id: 'chairman',   pollSlug: 'chairman'  },
  'critic':     { id: 'critic',     pollSlug: 'critic'    },
  'architect':  { id: 'architect',  pollSlug: 'architect' },
  'ux':         { id: 'ux',         pollSlug: 'ux'        },
  'designer':   { id: 'designer',   pollSlug: 'designer'  },
  'galactus':   { id: 'galactus',   pollSlug: 'galactus'  },
  'hume':       { id: 'hume',       pollSlug: 'hume'      },
  'otto':       { id: 'otto',       pollSlug: 'otto'      },
  'pm':         { id: 'pm',         pollSlug: 'pm'        },
  'spengler':   { id: 'spengler',   pollSlug: 'spengler'  },

// Apply faction targets to NPCs (called every second from main loop)
var factionLastApplied = 0;
function applyFactionClustering() {
  var now = Date.now();
  if (now - factionLastApplied < 1000) return;
  factionLastApplied = now;
  if (!npcs || npcs.length === 0) return;
  var active = factionState.expiresAt > now;
  for (var i = 0; i < npcs.length; i++) {
    var n = npcs[i];
    if (!active || factionState.debaters.indexOf(n.name) < 0) {
      n.factionTarget = null;
      continue;
    }
    // Find another debater to drift toward
    for (var j = 0; j < npcs.length; j++) {
      if (i === j) continue;
      if (factionState.debaters.indexOf(npcs[j].name) >= 0) {
        n.factionTarget = npcs[j];
        break;
      }
    }
  }
}

// 0=grass, 1=path (dirt), 2=water(pond), 3=wall/building, 4=tree, 5=rock, 6=fountain
function buildChunk00() {
  var m = [];
  for (var r = 0; r < ROWS; r++) {
    m.push(new Uint8Array(COLS));
  }

  // Grass is default (0). Let's carve out paths, pond, buildings.

  // Horizontal path across middle
  for (var c = 0; c < COLS; c++) { m[17][c] = 1; m[18][c] = 1; }
  // Vertical path down center
  for (var r = 0; r < ROWS; r++) { m[r][24] = 1; m[r][25] = 1; }

  // Pond bottom-left area  (rows 22-27, cols 4-10)
  for (var r = 22; r <= 27; r++)
    for (var c = 4; c <= 10; c++)
      m[r][c] = 2;

  // Building top-left (rows 2-6, cols 2-8)
  for (var r = 2; r <= 6; r++)
    for (var c = 2; c <= 8; c++)
      m[r][c] = 3;

  // Building top-right (rows 2-6, cols 40-47)
  for (var r = 2; r <= 6; r++)
    for (var c = 40; c <= 47; c++)
      m[r][c] = 3;

  // Building bottom-right (rows 26-31, cols 38-46)
  for (var r = 26; r <= 31; r++)
    for (var c = 38; c <= 46; c++)
      m[r][c] = 3;

  // Trees scattered
  var trees = [
    [1,1],[1,12],[1,35],[1,48],
    [8,3],[8,14],[8,38],[8,47],
    [10,10],[10,30],[10,45],
    [14,2],[14,20],[14,44],
    [20,5],[20,15],[20,35],[20,48],
    [22,18],[22,40],
    [28,3],[28,20],[28,47],
    [32,8],[32,30],[32,46],
    [33,1],[33,48],
    [34,14],[34,35],
  ];
  trees.forEach(function(t) { if (t[0] < ROWS && t[1] < COLS) m[t[0]][t[1]] = 4; });

  // Rocks
  var rocks = [
    [9,22],[11,40],[15,12],[16,32],[21,27],[25,14],[29,35],[31,12],[33,40],
  ];
  rocks.forEach(function(t) { if (t[0] < ROWS && t[1] < COLS) m[t[0]][t[1]] = 5; });

  // Fountain — 3x3 town square near path intersection (rows 13-15, cols 19-21)
  for (var r = 13; r <= 15; r++)
    for (var c = 19; c <= 21; c++)
      m[r][c] = 6;

  return m;
}

function isBlocked(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return true;

    if (tx === 5 && ty === 5) return false; // doorway

  return t === 2 || t === 3 || t === 4 || t === 5 || t === 6;

// ── Rendering: draw map ────────────────────────────────────────────────────────
// Grass color variants (seeded by position for variety, season-aware)
function grassColor(tx, ty) {
  var h = (tx * 7 + ty * 13 + tx * ty) % 16;
  if (SEASON === 1) { // summer — brighter
    if (h < 4) return '#1f501f';
    if (h < 8) return '#235223';
    if (h < 12) return '#244d24';
    return '#1f4a1f';
  }
  if (SEASON === 2) { // autumn — brown-tinged
    if (h < 4) return '#3a2c14';
    if (h < 8) return '#3d2e18';
    if (h < 12) return '#3a3018';
    return '#382c14';
  }
  if (SEASON === 3) { // winter — dark snow-gray
    if (h < 4) return '#28283a';
    if (h < 8) return '#2c2c3e';
    if (h < 12) return '#2a2a3c';
    return '#2a2a3a';
  }
  // spring (default)
  if (h < 4) return '#1a3a1a';
  if (h < 8) return '#1d421d';
  if (h < 12) return '#1f3d1f';
  return '#1c381c';
}

function drawMap() {
  for (var ty = 0; ty < ROWS; ty++) {
    for (var tx = 0; tx < COLS; tx++) {
      var t = MAP[ty][tx];
      var x = tx * TILE, y = ty * TILE;
      switch (t) {
        case 0: // grass
          ctx.fillStyle = grassColor(tx, ty);
          ctx.fillRect(x, y, TILE, TILE);
          // occasional darker grass blade
          if ((tx * 3 + ty * 5) % 7 === 0) {
            ctx.fillStyle = '#14281480';
            ctx.fillRect(x + 2, y + 6, 2, 6);
          }
          // Seasonal decorations
          if (SEASON === 0 && (tx * 11 + ty * 17) % 50 === 0) {
            // Spring: white flower pixels (2% chance per tile)
            ctx.fillStyle = '#ffffffcc';
            ctx.fillRect(x + 6, y + 5, 2, 2);
            ctx.fillStyle = '#ffccddcc';
            ctx.fillRect(x + 5, y + 6, 4, 1);
          } else if (SEASON === 1 && (tx * 13 + ty * 19) % 50 === 0) {
            // Summer: yellow wildflowers
            ctx.fillStyle = '#f0e030cc';
            ctx.fillRect(x + 6, y + 4, 2, 2);
            ctx.fillStyle = '#f0e030aa';
            ctx.fillRect(x + 5, y + 5, 4, 1);
          } else if (SEASON === 2 && (tx * 7 + ty * 11) % 30 === 0) {
            // Autumn: fallen leaf pixels
            ctx.fillStyle = '#c06820aa';
            ctx.fillRect(x + ((tx * 5) % 8) + 2, y + ((ty * 7) % 8) + 2, 3, 2);
          }
          break;
        case 1: // path/dirt
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#5a4020' : '#503a1c';
          ctx.fillRect(x, y, TILE, TILE);
          break;
        case 2: // water
          ctx.fillStyle = (tx + ty) % 2 === 0 ? '#1a3a6a' : '#1e4278';
          ctx.fillRect(x, y, TILE, TILE);
          // shimmer highlight
          if ((tx + ty * 2) % 3 === 0) {
            ctx.fillStyle = '#3a6ab880';
            ctx.fillRect(x + 3, y + 2, 4, 2);
          }
          break;
        case 3: // building
          if (ty >= 2 && ty <= 6 && tx >= 2 && tx <= 8) {
            // ── Classical Pillars — Council Building (Variant A winner) ──────
            // Base: stone gray wall
            ctx.fillStyle = '#2a2050';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#3a3068';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

            if (ty === 2) {
              // Pediment row: triangular peak effect
              var distFromCenter = Math.abs(tx - 5);
              var peakColor = distFromCenter <= 1 ? '#8a8aaa' : distFromCenter <= 2 ? '#6a6a8a' : '#4a4a6a';
              ctx.fillStyle = peakColor;
              ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
              // Pediment triangle: fill top portion proportionally to distance
              var triH = Math.max(0, (3 - distFromCenter) * 4);
              if (triH > 0) {
                ctx.fillStyle = '#9a9abb';
                ctx.fillRect(x + 2, y + 1, TILE - 4, triH);
              }
            } else if (ty === 6) {
              // Steps row: 3-tier lighter stone at bottom
              ctx.fillStyle = '#4a4080';
              ctx.fillRect(x, y + 10, TILE, 6);
              ctx.fillStyle = '#5a5090';
              ctx.fillRect(x, y + 12, TILE, 4);
              ctx.fillStyle = '#6a60a0';
              ctx.fillRect(x, y + 14, TILE, TILE - 14);
            }

            // Columns: at tx 2, 4, 6, 8 draw vertical column strips
            if (tx === 2 || tx === 4 || tx === 6 || tx === 8) {
              if (ty > 2 && ty < 6) {
                ctx.fillStyle = '#7a7a9a';
                ctx.fillRect(x + 5, y, 5, TILE);
                // Column highlight
                ctx.fillStyle = '#9a9ab8';
                ctx.fillRect(x + 6, y, 2, TILE);
              } else if (ty === 6) {
                // Column base on steps row
                ctx.fillStyle = '#7a7a9a';
                ctx.fillRect(x + 5, y, 5, 10);
              }
            }

            // Doorway: center column at tx===5, lower rows
            if (tx === 5 && (ty === 5 || ty === 6)) {
              ctx.fillStyle = '#000010';
              ctx.fillRect(x + 3, y + (ty === 5 ? 4 : 0), 9, ty === 5 ? TILE - 4 : 10);
              // Amber glow around doorway
              ctx.fillStyle = '#f0d06044';
              ctx.fillRect(x + 2, y + (ty === 5 ? 4 : 0), 1, ty === 5 ? TILE - 4 : 10);
              ctx.fillRect(x + 12, y + (ty === 5 ? 4 : 0), 1, ty === 5 ? TILE - 4 : 10);
              if (ty === 5) {
                ctx.fillStyle = '#f0d06066';
                ctx.fillRect(x + 3, y + 3, 9, 2);
              }
            }
          } else if (ty >= 2 && ty <= 6 && tx >= 40 && tx <= 47) {
            // ── Dungeon Entrance Building (top-right corner) ──────────────────
            // Dark stone walls
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

            // Stone block texture: mortar lines
            ctx.fillStyle = '#111';
            ctx.fillRect(x, y + TILE / 2, TILE, 1);
            var brickOffset = (ty % 2 === 0) ? 0 : TILE / 2;
            ctx.fillRect(x + brickOffset, y, 1, TILE);

            if (ty === 2) {
              // Battlements / crenellations on top row
              ctx.fillStyle = '#3a3a3a';
              ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
              if ((tx % 2) === 0) {
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(x + 4, y, TILE - 8, 8);
              } else {
                ctx.fillStyle = '#3a3a3a';
                ctx.fillRect(x + 1, y + 1, TILE - 2, 8);
              }
            } else if (ty === 6) {
              // Bottom row: gate arch base / steps
              ctx.fillStyle = '#222';
              ctx.fillRect(x, y + 14, TILE, TILE - 14);
              ctx.fillStyle = '#2e2e2e';
              ctx.fillRect(x, y + 10, TILE, 4);
            }

            // Torch sconces on col 41 and 46, rows 4-5
            if ((tx === 41 || tx === 46) && (ty === 4 || ty === 5)) {
              ctx.fillStyle = '#8b4513';
              ctx.fillRect(x + 8, y + 2, 3, 8);
              ctx.fillStyle = 'rgba(255,140,0,0.85)';
              ctx.fillRect(x + 7, y, 5, 5);
              ctx.fillStyle = 'rgba(255,220,0,0.6)';
              ctx.fillRect(x + 8, y + 1, 3, 3);
            }

            // Dungeon doorway arch at tx=43, rows 5-6
            if (tx === 43 && (ty === 5 || ty === 6)) {
              ctx.fillStyle = '#000';
              ctx.fillRect(x + 2, y + (ty === 5 ? 3 : 0), 12, ty === 5 ? TILE - 3 : 14);
              ctx.fillStyle = '#3a3030';
              ctx.fillRect(x + 1, y + (ty === 5 ? 2 : 0), 2, ty === 5 ? TILE - 2 : 14);

            }
          } else {
            // Generic building tile (outside named areas)
            ctx.fillStyle = '#2a2050';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = '#3a3068';
            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
            // window
            if ((tx + ty) % 3 === 0) {
              ctx.fillStyle = '#f0d060aa';
              ctx.fillRect(x + 4, y + 4, 4, 5);
            }
          }
          break;
        case 4: // tree
        case 5: // rock
          drawTreeRockTile(t, x, y);
          break;
        case 6: // fountain (static stone structure — water drawn each frame in drawFountainAnimation)
          // Outer basin — stone gray base fill
          ctx.fillStyle = '#3a3a54';
          ctx.fillRect(x, y, TILE, TILE);
          // Outer basin ring
          ctx.fillStyle = '#5a5a7a';
          ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          // Basin interior (darker water-bed)
          ctx.fillStyle = '#1a2848';
          ctx.fillRect(x + 3, y + 3, TILE - 6, TILE - 6);
          // Mid-tier ring (drawn only for center tile at tx=23,ty=14)
          if (tx === 23 && ty === 14) {
            ctx.fillStyle = '#6a6a8a';
            ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
            ctx.fillStyle = '#1e2c50';
            ctx.fillRect(x + 6, y + 6, TILE - 12, TILE - 12);
            // Top-tier center nub
            ctx.fillStyle = '#7a7a9a';
            ctx.fillRect(x + 7, y + 7, TILE - 14, TILE - 14);
          }
          break;

  }

  // Pond edge ripple
  for (var ty = 22; ty <= 27; ty++) {
    for (var tc = 4; tc <= 10; tc++) {

  }

  // Path edge shading
  ctx.fillStyle = '#3a2810aa';
  for (var c = 0; c < COLS; c++) {
    if (MAP[16] && MAP[16][c] === 0) { ctx.fillRect(c*TILE, 16*TILE, TILE, 2); }
    if (MAP[19] && MAP[19][c] === 0) { ctx.fillRect(c*TILE, 19*TILE-2, TILE, 2); }

  // Outer basin water sheen (ripple ring)
  for (var i = 0; i < 8; i++) {
    if (((fountainFrame + i * 4) % 30) < 15) {
      ctx.fillStyle = '#1a6aaaaa';
    } else {
      ctx.fillStyle = '#1a6aaa44';
    }
    // Scatter ripple pixels around basin ring
    var rx = bx + 3 + (i * 5) % 40;
    var ry = by + 3 + (i * 7) % 40;
    ctx.fillRect(rx, ry, 2, 1);
  }

  // Cascade streams from top tier — bright blue drops falling outward
  // Top tier is at center tile (col 20, row 14) pixel center
  var cx0 = FOUNTAIN_CX * TILE + TILE / 2;
  var cy0 = FOUNTAIN_CY * TILE + TILE / 2;

  // 4 cascade directions: up, down, left, right
  var cascades = [
    { dx: 0,  dy: -1, len: 8 },
    { dx: 0,  dy:  1, len: 8 },
    { dx: -1, dy:  0, len: 8 },
    { dx:  1, dy:  0, len: 8 },
  ];
  cascades.forEach(function(c, ci) {
    var offset = (fountainFrame + ci * 8) % 16;
    // Bright cascade pixel moving outward
    var px = cx0 + c.dx * (4 + offset);
    var py = cy0 + c.dy * (4 + offset);
    ctx.fillStyle = '#4a9fff';
    ctx.fillRect(Math.round(px), Math.round(py), 2, 2);
    // Trailing lighter pixel
    if (offset > 2) {
      ctx.fillStyle = '#1a6aaa88';
      ctx.fillRect(Math.round(px - c.dx * 2), Math.round(py - c.dy * 2), 2, 2);
    }
  });

  // Sporadic splash pixels in the basin
  if (phase < 10) {
    ctx.fillStyle = '#4a9fff88';
    ctx.fillRect(bx + 4 + (phase * 3) % 32, by + 8 + (phase * 5) % 24, 2, 1);
    ctx.fillRect(bx + 8 + (phase * 7) % 28, by + 4 + (phase * 3) % 32, 1, 2);
  }

  ctx.restore();
}

// ── Character sprite drawing ───────────────────────────────────────────────────
function drawCharacter(cx, cy, color, scale, isGalactus) {
  var s = scale || 1;
  var bw = isGalactus ? 14 : 8;   // body width
  var bh = isGalactus ? 20 : 12;  // body height
  var hw = isGalactus ? 12 : 6;   // head width
  var hh = isGalactus ? 10 : 6;   // head height

  // Shadow
  ctx.fillStyle = '#00000044';
  ctx.fillRect(Math.round(cx - bw/2 * s + 2), Math.round(cy + (bh - 2) * s), Math.round(bw * s), Math.round(4 * s));

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(cx - bw/2 * s), Math.round(cy + hh * s), Math.round(bw * s), Math.round(bh * s));

  // Head
  ctx.fillStyle = lighten(color, 30);
  ctx.fillRect(Math.round(cx - hw/2 * s), Math.round(cy), Math.round(hw * s), Math.round(hh * s));

  // Eyes (little dark dots)
  ctx.fillStyle = '#00000088';
  ctx.fillRect(Math.round(cx - hw/2 * s + 1*s), Math.round(cy + 2*s), Math.round(1*s), Math.round(2*s));
  ctx.fillRect(Math.round(cx + hw/2 * s - 2*s), Math.round(cy + 2*s), Math.round(1*s), Math.round(2*s));

  if (isGalactus) {
    // Cosmic crown spikes
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(Math.round(cx - 6*s), Math.round(cy - 8*s), Math.round(4*s), Math.round(8*s));
    ctx.fillRect(Math.round(cx - 2*s), Math.round(cy - 11*s), Math.round(4*s), Math.round(11*s));
    ctx.fillRect(Math.round(cx + 3*s), Math.round(cy - 8*s), Math.round(4*s), Math.round(8*s));
  }
}

function lighten(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return '#' + ('0' + r.toString(16)).slice(-2) + ('0' + g.toString(16)).slice(-2) + ('0' + b.toString(16)).slice(-2);
}

// ── Speech bubble ──────────────────────────────────────────────────────────────
function drawBubble(cx, cy, lines, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  var pad = 5;
  ctx.font = '9px monospace';
  var lineH = 11;
  // lines can be a string or array
  var lineArr = Array.isArray(lines) ? lines : [lines];
  var maxW = 0;
  lineArr.forEach(function(l) { var w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
  var bw = maxW + pad * 2;
  var bh = lineH * lineArr.length + 4;
  var bx = cx - bw / 2;
  var by = cy - bh - 6;

  // Clamp to canvas
  if (bx < 2) bx = 2;
  if (bx + bw > W - 2) bx = W - 2 - bw;
  if (by < 2) by = 2;

  // Background
  ctx.fillStyle = '#ffffffee';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 3);
  ctx.fill();

  // Border
  ctx.strokeStyle = '#333355';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Tail
  ctx.fillStyle = '#ffffffee';
  ctx.beginPath();
  ctx.moveTo(cx - 3, by + bh);
  ctx.lineTo(cx + 3, by + bh);
  ctx.lineTo(cx, by + bh + 5);
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#111122';
  lineArr.forEach(function(l, i) {
    ctx.fillText(l, bx + pad, by + lineH * (i + 1) - 1);
  });

  ctx.restore();
}

// ── Gossip thought bubble (Feature 1) ────────────────────────────────────────
function drawGossipBubble(cx, cy, lines, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  var pad = 5;
  ctx.font = 'italic 9px monospace';
  var lineH = 11;
  var lineArr = Array.isArray(lines) ? lines : [lines];
  var maxW = 0;
  lineArr.forEach(function(l) { var w = ctx.measureText(l).width; if (w > maxW) maxW = w; });
  var bw = maxW + pad * 2;
  var bh = lineH * lineArr.length + 4;
  var bx = cx - bw / 2;
  var by = cy - bh - 12;
  if (bx < 2) bx = 2;
  if (bx + bw > W - 2) bx = W - 2 - bw;
  if (by < 2) by = 2;
  ctx.fillStyle = '#fffae0ee';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
  ctx.strokeStyle = '#c8a000'; ctx.lineWidth = 1; ctx.stroke();
  // Thought dots
  ctx.fillStyle = '#fffae0ee';
  ctx.beginPath(); ctx.arc(cx, by + bh + 3, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, by + bh + 7, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7a6000';
  ctx.font = 'italic 9px monospace';
  lineArr.forEach(function(l, i) {
    ctx.fillText(l, bx + pad, by + lineH * (i + 1) - 1);
  });
  ctx.restore();
}

// ── Worn paths (Feature 5) ─────────────────────────────────────────────────────
// Track tile visit counts; reset daily via localStorage
var WORN_TILES = (function() {
  var DAY_MS = 24 * 3600 * 1000;
  var now = Date.now();
  var stored = null;
  try {
    var raw = localStorage.getItem('commons_worn_tiles');
    if (raw) {
      var obj = JSON.parse(raw);
      if (now - obj.ts < DAY_MS) stored = obj;
    }
  } catch(e) {}
  if (!stored) {
    stored = { ts: now, counts: {} };
    try { localStorage.setItem('commons_worn_tiles', JSON.stringify(stored)); } catch(e) {}
  }
  return stored;
})();

function recordTileVisit(tx, ty) {
  var key = tx + ',' + ty;
  WORN_TILES.counts[key] = (WORN_TILES.counts[key] || 0) + 1;
  // Persist every 30 visits (avoid thrashing localStorage)
  var total = WORN_TILES.counts[key];
  if (total % 30 === 0) {
    try { localStorage.setItem('commons_worn_tiles', JSON.stringify(WORN_TILES)); } catch(e) {}
  }
}

function getWornLevel(tx, ty) {
  var key = tx + ',' + ty;
  var count = WORN_TILES.counts[key] || 0;
  if (count >= 30) return 2; // dirt
  if (count >= 10) return 1; // worn
  return 0;
}

// ── NPC Gossip state (Feature 1) ───────────────────────────────────────────────
// gossipBubble: { lines, ttl } — shown like a thought bubble (yellow/italic style)

// ── NPC class ────────────────────────────────────────────────────────────────
var DIRS = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];

function NPC(persona, startTx, startTy) {
  this.name = persona.name;
  this.displayName = persona.display_name || persona.name;
  this.color = COLOR_OVERRIDES[persona.name] || persona.color || '#888888';
  this.role = persona.role || '';
  this.avatarUrl = persona.avatar_url || '';
  this.quips = QUIPS[persona.name] || DEFAULT_QUIPS;

  // Pixel position (center of character)
  this.px = startTx * TILE + TILE / 2;
  this.py = startTy * TILE + TILE / 2;

  // Tile position
  this.tx = startTx;
  this.ty = startTy;

  // Movement params
  var isGalactus = this.name === 'galactus';
  var isKid = this.name === 'the-kid';
  var isIbrahim = this.name === 'chairman';
  var isWolf = this.name === 'wolf';
  var isUncle = this.name === 'uncle-bob';

  this.speed = isGalactus ? 0.2 : isIbrahim ? 0.25 : isKid ? 1.2 : isWolf ? 0.8 : 0.4; // px per frame
  this.isGalactus = isGalactus;
  this.isKid = isKid;
  this.isIbrahim = isIbrahim;
  this.isUncle = isUncle;
  this.isDesigner = this.name === 'designer';
  this.isAdelbert = this.name === 'adelbert';

  // Wander state
  this.dir = { dx: 1, dy: 0 };
  this.stepsLeft = 0;
  this.waitFrames = 0;
  this.frame = Math.floor(Math.random() * 60);

  // Speech state
  this.bubble = null; // {lines: [], ttl} null when silent
  this.speakCooldown = 120 + Math.floor(Math.random() * 240); // frames before can speak again
  this.quipIndex = Math.floor(Math.random() * this.quips.length);

  // Response bubble (from invoke)
  this.responseBubble = null; // {lines: [], ttl}

  // Target for movement
  this.targetPx = this.px;
  this.targetPy = this.py;

  // Congress target tile
  this.congressTarget = null;
  this.inCouncil = false;

  // Drag state
  this.held = false;

  // Gossip state (Feature 1)
  this.gossipBubble = null; // {lines, ttl}
  this.lastSpokenQuip = '';
  this.proximityTimers = {}; // npc.name -> frames spent close

  // Faction post-congress (Feature 2)
  this.factionTarget = null; // NPC to drift toward

  // Last tile (for worn path tracking)
  this.lastTx = this.tx;
  this.lastTy = this.ty;

  // Server-authoritative position (from tick WS message npcs array)
  this.serverX = null; // null = no server data yet, use client simulation
  this.serverY = null;
  this.serverFacing = null;
  this.firstServerSync = true; // snap on first tick to avoid fly-in
}

NPC.prototype.pickNewDir = function (npcs) {
  var self = this;

  // Uncle Bob: always picks axis-aligned straight lines (no random turn)
  if (this.isUncle) {
    // Stay on current dir if possible, else turn 90 degrees
    var newTx = this.tx + this.dir.dx;
    var newTy = this.ty + this.dir.dy;
    if (!isBlocked(newTx, newTy)) {
      this.stepsLeft = 6 + Math.floor(Math.random() * 4);
      return;
    }
    // Turn 90
    var perp = this.dir.dx !== 0 ? [{dx:0,dy:1},{dx:0,dy:-1}] : [{dx:1,dy:0},{dx:-1,dy:0}];
    this.dir = perp[Math.floor(Math.random() * 2)];
    this.stepsLeft = 4;
    return;
  }


  // Designer: circular-ish motion
  if (this.isDesigner) {
    // Rotate dir clockwise with some randomness
    var rotate = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
    var curIdx = rotate.findIndex(function(d) { return d.dx === self.dir.dx && d.dy === self.dir.dy; });
    if (curIdx < 0) curIdx = 0;
    var nextIdx = (curIdx + 1) % 4;
    var nextDir = rotate[nextIdx];
    var nx = this.tx + nextDir.dx, ny = this.ty + nextDir.dy;
    if (!isBlocked(nx, ny) && Math.random() < 0.6) {
      this.dir = nextDir;
    } else {
      this.dir = rotate[curIdx]; // keep going
    }
    this.stepsLeft = 2 + Math.floor(Math.random() * 4);
    return;
  }

  // Adelbert: try to move toward nearest other NPC
  if (this.isAdelbert && npcs && npcs.length > 1) {
    var target = null, bestDist = 999;
    npcs.forEach(function(n) {
      if (n === self) return;
      var dist = Math.abs(n.tx - self.tx) + Math.abs(n.ty - self.ty);
      if (dist > 1 && dist < bestDist) { bestDist = dist; target = n; }
    });
    if (target && Math.random() < 0.6) {
      var ddx = target.tx - this.tx;
      var ddy = target.ty - this.ty;
      var candidates = [];
      if (Math.abs(ddx) >= Math.abs(ddy)) {
        candidates.push({dx: Math.sign(ddx), dy: 0});
        candidates.push({dx: 0, dy: Math.sign(ddy)});
      } else {
        candidates.push({dx: 0, dy: Math.sign(ddy)});
        candidates.push({dx: Math.sign(ddx), dy: 0});
      }
      for (var i = 0; i < candidates.length; i++) {
        var nd = candidates[i];
        if (!isBlocked(this.tx + nd.dx, this.ty + nd.dy)) {
          this.dir = nd;
          this.stepsLeft = 2 + Math.floor(Math.random() * 3);
          return;
        }
      }
    }
  }

  // Feature 2: Faction clustering — after congress, debaters drift toward co-debaters
  if (this.factionTarget && Math.random() < 0.4) {
    var ft = this.factionTarget;
    var fddx = ft.tx - this.tx;
    var fddy = ft.ty - this.ty;
    var fdist = Math.abs(fddx) + Math.abs(fddy);
    if (fdist > 2) {
      var fcandidates = [];
      if (Math.abs(fddx) >= Math.abs(fddy)) {
        if (fddx !== 0) fcandidates.push({dx: Math.sign(fddx), dy: 0});
        if (fddy !== 0) fcandidates.push({dx: 0, dy: Math.sign(fddy)});
      } else {
        if (fddy !== 0) fcandidates.push({dx: 0, dy: Math.sign(fddy)});
        if (fddx !== 0) fcandidates.push({dx: Math.sign(fddx), dy: 0});
      }
      for (var fi = 0; fi < fcandidates.length; fi++) {
        var fnd = fcandidates[fi];
        if (!isBlocked(this.tx + fnd.dx, this.ty + fnd.dy)) {
          this.dir = fnd;
          this.stepsLeft = 2 + Math.floor(Math.random() * 3);
          return;
        }
      }
    }
  }

  // Default: pick a random walkable direction
  var valid = DIRS.filter(function(d) {
    return !isBlocked(self.tx + d.dx, self.ty + d.dy);
  });
  if (valid.length === 0) { this.stepsLeft = 10; return; }
  this.dir = valid[Math.floor(Math.random() * valid.length)];
  this.stepsLeft = 2 + Math.floor(Math.random() * (this.isKid ? 8 : this.isGalactus ? 3 : 5));
};

// Step toward a target tile (for congress mode)
NPC.prototype.stepToward = function(targetTx, targetTy) {
  var ddx = targetTx - this.tx;
  var ddy = targetTy - this.ty;
  if (ddx === 0 && ddy === 0) return true; // arrived
  var candidates = [];
  if (Math.abs(ddx) >= Math.abs(ddy)) {
    if (ddx !== 0) candidates.push({dx: Math.sign(ddx), dy: 0});
    if (ddy !== 0) candidates.push({dx: 0, dy: Math.sign(ddy)});
  } else {
    if (ddy !== 0) candidates.push({dx: 0, dy: Math.sign(ddy)});
    if (ddx !== 0) candidates.push({dx: Math.sign(ddx), dy: 0});
  }
  for (var i = 0; i < candidates.length; i++) {
    var nd = candidates[i];
    var nx = this.tx + nd.dx, ny = this.ty + nd.dy;
    if (!isBlocked(nx, ny)) {
      this.dir = nd;
      this.tx = nx; this.ty = ny;
      this.targetPx = nx * TILE + TILE / 2;
      this.targetPy = ny * TILE + TILE / 2;
      this.stepsLeft = 0;
      return false;
    }
  }
  return false; // blocked
};

NPC.prototype.update = function (npcs) {
  // Skip all movement and speech while being dragged
  if (this.held) return;

  this.frame++;

  // Speech cooldown
  if (this.speakCooldown > 0) this.speakCooldown--;
  if (this.bubble) {
    this.bubble.ttl--;
    if (this.bubble.ttl <= 0) {
      this.bubble = null;
      var baseCD = this.isIbrahim ? 600 : this.isGalactus ? 450 : this.isKid ? 80 : 180;
      this.speakCooldown = baseCD + Math.floor(Math.random() * 200);
    }
  } else if (this.speakCooldown <= 0) {
    var chance = this.isIbrahim ? 0.002 : this.isKid ? 0.02 : this.isGalactus ? 0.004 : 0.006;
    if (Math.random() < chance) {
      var quip = this.quips[this.quipIndex % this.quips.length];
      this.bubble = { lines: [quip], ttl: Math.round(2.5 * 60) };
      this.lastSpokenQuip = quip;
      this.quipIndex++;
    }
  }

  // Gossip bubble TTL (Feature 1)
  if (this.gossipBubble) {
    this.gossipBubble.ttl--;
    if (this.gossipBubble.ttl <= 0) this.gossipBubble = null;
  }

  // Response bubble TTL
  if (this.responseBubble) {
    this.responseBubble.ttl--;
    if (this.responseBubble.ttl <= 0) this.responseBubble = null;
  }

  // Feature 1: Gossip spreading — check proximity to other NPCs
  if (npcs && !this.gossipBubble) {
    for (var gi = 0; gi < npcs.length; gi++) {
      var other = npcs[gi];
      if (other === this) continue;
      var gdist = Math.abs(other.tx - this.tx) + Math.abs(other.ty - this.ty);
      if (gdist <= 3) {
        // Track time spent close
        this.proximityTimers[other.name] = (this.proximityTimers[other.name] || 0) + 1;
        // >5 seconds at 60fps = 300 frames; 10% chance per proximity check (run every frame)
        if (this.proximityTimers[other.name] > 300 && other.lastSpokenQuip && Math.random() < 0.001) {
          var distortedQuip = other.lastSpokenQuip;
          this.gossipBubble = {
            lines: ['*heard: "' + distortedQuip.slice(0, 25) + '"*'],
            ttl: 4 * 60,
          };
          this.proximityTimers[other.name] = 0; // reset after gossip
          break;
        }
      } else {
        this.proximityTimers[other.name] = 0;
      }
    }
  }

  // Congress mode: if debater, move toward council area
  var isDebater = congressState.active && congressState.debaters.indexOf(this.name) >= 0;
  if (isDebater) {
    // Pick a council tile if we don't have one yet
    if (!this.congressTarget) {
      var idx = Math.floor(Math.random() * COUNCIL_TILES.length);
      this.congressTarget = COUNCIL_TILES[idx];
    }
    // Move toward it every few frames (not every frame — pace it)
    if (this.frame % 20 === 0) {
      var arrived = this.stepToward(this.congressTarget.tx, this.congressTarget.ty);
      this.inCouncil = arrived || (Math.abs(this.tx - this.congressTarget.tx) <= 1 && Math.abs(this.ty - this.congressTarget.ty) <= 1);
    }
  } else {
    this.congressTarget = null;
    this.inCouncil = false;
  }

  // If server has sent position data, lerp toward it; otherwise fall back to client simulation
  if (this.serverX !== null && this.serverY !== null) {
    if (this.firstServerSync) {
      // Snap directly on first server sync to avoid fly-in from random client position
      this.px = this.serverX;
      this.py = this.serverY;
      this.targetPx = this.serverX;
      this.targetPy = this.serverY;
      this.firstServerSync = false;
    }
    var LERP = 0.15;
    this.px += (this.serverX - this.px) * LERP;
    this.py += (this.serverY - this.py) * LERP;
    // Sync tile coords for worn path tracking
    var newTx = Math.floor(this.px / TILE);
    var newTy = Math.floor(this.py / TILE);
    if (newTx !== this.lastTx || newTy !== this.lastTy) {
      if (MAP[newTy] && MAP[newTy][newTx] === 0) {
        recordTileVisit(newTx, newTy);
      }
      this.tx = newTx;
      this.ty = newTy;
      this.lastTx = newTx;
      this.lastTy = newTy;
    }
  } else {
    // Client-side simulation fallback (before first server tick arrives)
    if (!isDebater || !this.inCouncil) {
      // Waiting between moves
      if (this.waitFrames > 0) {
        this.waitFrames--;
        return;
      }

      // Feature 4 winter: 70% speed
      var effectiveSpeed = SEASON === 3 ? this.speed * 0.7 : this.speed;

      var dx = this.targetPx - this.px;
      var dy = this.targetPy - this.py;
      var dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < effectiveSpeed + 0.5) {
        this.px = this.targetPx;
        this.py = this.targetPy;

        // Feature 5: record tile visit when NPC lands on a grass tile
        if (this.tx !== this.lastTx || this.ty !== this.lastTy) {
          if (MAP[this.ty] && MAP[this.ty][this.tx] === 0) {
            recordTileVisit(this.tx, this.ty);
          }
          this.lastTx = this.tx;
          this.lastTy = this.ty;
        }

        if (this.stepsLeft > 0) {
          var nx = this.tx + this.dir.dx;
          var ny = this.ty + this.dir.dy;
          if (isBlocked(nx, ny)) {
            this.stepsLeft = 0;
          } else {
            this.tx = nx;
            this.ty = ny;
            this.targetPx = nx * TILE + TILE / 2;
            this.targetPy = ny * TILE + TILE / 2;
            this.stepsLeft--;
          }
        } else {
          var pause = this.isKid ? 2 : this.isGalactus ? 30 : this.isIbrahim ? 40 : 8 + Math.floor(Math.random() * 20);
          this.waitFrames = pause;
          this.pickNewDir(npcs);
        }
      } else {
        this.px += (dx / dist) * effectiveSpeed;
        this.py += (dy / dist) * effectiveSpeed;
      }
    }
  }
};

NPC.prototype.draw = function () {
  // Don't draw until server has sent first position (prevents fly-in from random spawn)
  if (this.firstServerSync) return;

  var cx = Math.round(this.px);
  var cy = Math.round(this.py) - 14; // top of sprite (for generic NPC drawing + bubble anchoring)
  // cy_feet: bottom of sprite position for drawSprite_* functions (they draw upward from feet)
  var cy_feet = Math.round(this.py) + 8;

  // Determine facing from serverFacing (server-authoritative) or dir (client fallback)
  var facingLeft = this.serverFacing ? (this.serverFacing === 'left') : (this.dir && this.dir.dx < 0);

  // Check if this persona has a sprite winner
  var spriteInfo = SPRITE_SLUG_MAP[this.name];
  var winner = spriteInfo ? SPRITE_WINNERS[this.name] : null;
  var spriteFn = winner ? window['drawSprite_' + spriteInfo.id + '_' + winner] : null;

  if (this.held) {
    // Draw white glow halo behind character
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 12;
    if (typeof spriteFn === 'function') {
      if (this.isGalactus) {
        ctx.save();
        ctx.scale(2, 2);
        spriteFn(ctx, cx / 2, cy_feet / 2);
        ctx.restore();
      } else if (facingLeft) {
        ctx.save();
        ctx.translate(cx * 2, 0);
        ctx.scale(-1, 1);
        spriteFn(ctx, cx, cy_feet);
        ctx.restore();
      } else {
        spriteFn(ctx, cx, cy_feet);
      }
    } else {
      var heldScale = (this.isGalactus ? 1.8 : 1) * 1.3;
      if (facingLeft && !this.isGalactus) {
        ctx.save();
        ctx.translate(cx * 2, 0);
        ctx.scale(-1, 1);
        drawCharacter(cx, cy, this.color, heldScale, this.isGalactus);
        ctx.restore();
      } else {
        drawCharacter(cx, cy, this.color, heldScale, this.isGalactus);
      }
    }
    ctx.restore();
    // No speech bubbles while held
    return;
  }

  if (typeof spriteFn === 'function') {
    if (this.isGalactus) {
      ctx.save();
      ctx.scale(2, 2);
      spriteFn(ctx, cx / 2, cy_feet / 2);
      ctx.restore();
    } else if (facingLeft) {
      ctx.save();
      ctx.translate(cx * 2, 0);
      ctx.scale(-1, 1);
      spriteFn(ctx, cx, cy_feet);
      ctx.restore();
    } else {
      spriteFn(ctx, cx, cy_feet);
    }
  } else {
    if (facingLeft && !this.isGalactus) {
      ctx.save();
      ctx.translate(cx * 2, 0);
      ctx.scale(-1, 1);
      drawCharacter(cx, cy, this.color, this.isGalactus ? 1.8 : 1, this.isGalactus);
      ctx.restore();
    } else {
      drawCharacter(cx, cy, this.color, this.isGalactus ? 1.8 : 1, this.isGalactus);
    }
  }

  // Response bubble takes priority over quip bubble, gossip shows separately
  if (this.responseBubble) {
    var alpha = this.responseBubble.ttl > 30 ? 1.0 : this.responseBubble.ttl / 30;
    var headY = cy - 4;
    drawBubble(cx, headY, this.responseBubble.lines, alpha);
  } else if (this.bubble) {
    var alpha = this.bubble.ttl > 20 ? 1.0 : this.bubble.ttl / 20;
    var headY = cy - 4;
    drawBubble(cx, headY, this.bubble.lines, alpha);
  }

  // Feature 1: gossip thought bubble (amber, italic, shown above normal bubble)
  if (this.gossipBubble) {
    var galpha = this.gossipBubble.ttl > 20 ? 1.0 : this.gossipBubble.ttl / 20;
    drawGossipBubble(cx, cy - 4, this.gossipBubble.lines, galpha);
  }
};

// ── Drag state ────────────────────────────────────────────────────────────────
var dragState = null; // null | { npc, startClientX, startClientY, dragging }

function canvasCoords(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    mx: (e.clientX - rect.left) * (W / rect.width),
    my: (e.clientY - rect.top) * (H / rect.height),
  };
}

function npcAtCanvasCoords(mx, my) {
  for (var i = 0; i < npcs.length; i++) {
    var n = npcs[i];
    var dx = mx - n.px;
    var dy = my - (n.py - 8);
    if (Math.abs(dx) < 14 && Math.abs(dy) < 20) return n;
  }
  return null;
}

function nearestValidTile(mx, my) {
  // Convert pixel coords to tile, then spiral out to find non-blocked tile
  var bestTx = Math.round((mx - TILE / 2) / TILE);
  var bestTy = Math.round((my - TILE / 2) / TILE);
  if (!isBlocked(bestTx, bestTy)) return { tx: bestTx, ty: bestTy };
  // Search expanding radius
  for (var r = 1; r <= 8; r++) {
    for (var dy = -r; dy <= r; dy++) {
      for (var dx = -r; dx <= r; dx++) {
        if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
        var tx = bestTx + dx, ty = bestTy + dy;
        if (!isBlocked(tx, ty)) return { tx: tx, ty: ty };
      }
    }
  }
  return { tx: bestTx, ty: bestTy }; // fallback
}

canvas.addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  var c = canvasCoords(e);
  var found = npcAtCanvasCoords(c.mx, c.my);
  if (!found) return;
  dragState = {
    npc: found,
    startClientX: e.clientX,
    startClientY: e.clientY,
    dragging: false,
  };
  found.held = true;
  e.preventDefault();
});

canvas.addEventListener('mousemove', function(e) {
  // Track mouse position in canvas coords for per-frame tooltip updates
  var rect0 = canvas.getBoundingClientRect();
  lastMouseCanvas = {
    mx: (e.clientX - rect0.left) * (W / rect0.width),
    my: (e.clientY - rect0.top) * (H / rect0.height),
    clientX: e.clientX,
    clientY: e.clientY,
  };

  // Tooltip logic (only when not dragging)
  if (!dragState || !dragState.dragging) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var mx = (e.clientX - rect.left) * scaleX;
    var my = (e.clientY - rect.top) * (H / rect.height);

    var found = null;
    for (var i = 0; i < npcs.length; i++) {
      var n = npcs[i];
      var dx = mx - n.px;
      var dy = my - (n.py - 8);
      if (Math.abs(dx) < 14 && Math.abs(dy) < 20) { found = n; break; }
    }

    if (found) {
      ttName.textContent = found.displayName;
      ttRole.textContent = found.role;
      if (found.avatarUrl) {
        ttAvatar.src = found.avatarUrl;
        ttAvatar.style.display = 'block';
      } else {
        ttAvatar.style.display = 'none';
      }
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      canvas.style.cursor = dragState ? 'grabbing' : 'pointer';
    } else {
      tooltip.style.display = 'none';
      canvas.style.cursor = dragState ? 'grabbing' : 'default';
    }

    // Audition walker hover detection (only walkers on-canvas)
    var foundWalker = null;
    for (var ai = 0; ai < auditionWalkers.length; ai++) {
      var aw = auditionWalkers[ai];
      if (aw.x < 0) continue; // not yet on canvas — no ghost tooltips
      var awdx = mx - aw.x;
      var awdy = my - auditionWalkerY;
      if (Math.abs(awdx) < 20 && Math.abs(awdy) < 20) { foundWalker = aw; break; }
    }
    if (foundWalker) {
      if (auditionHoveredId !== foundWalker.id) {
        // New hover: pause previous if any
        if (auditionHoveredId) {
          fetch(AUDITION_URL + '/api/audition/resume', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: auditionHoveredId }),
          }).catch(function() {});
        }
        auditionHoveredId = foundWalker.id;
        // Pause this walker
        fetch(AUDITION_URL + '/api/audition/pause', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: foundWalker.id }),
        }).catch(function() {});
        // Mark paused in local state
        for (var pi = 0; pi < auditionWalkers.length; pi++) {
          auditionWalkers[pi].paused = (auditionWalkers[pi].id === foundWalker.id);
        }
        showAuditionCard(foundWalker, e.clientX, e.clientY);
      }
      canvas.style.cursor = 'pointer';
    } else if (auditionHoveredId && !auditionCard.classList.contains('active')) {
      // Mouse left walker and card was closed — resume
      fetch(AUDITION_URL + '/api/audition/resume', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: auditionHoveredId }),
      }).catch(function() {});
      for (var ri = 0; ri < auditionWalkers.length; ri++) {
        if (auditionWalkers[ri].id === auditionHoveredId) auditionWalkers[ri].paused = false;
      }
      auditionHoveredId = null;
    }
  }

  if (!dragState) return;

  var ddx = e.clientX - dragState.startClientX;
  var ddy = e.clientY - dragState.startClientY;
  if (!dragState.dragging && Math.sqrt(ddx * ddx + ddy * ddy) >= 5) {
    dragState.dragging = true;
    tooltip.style.display = 'none';
    canvas.style.cursor = 'grabbing';
  }

  if (dragState.dragging) {
    var c = canvasCoords(e);
    dragState.npc.px = c.mx;
    dragState.npc.py = c.my + 20; // offset -20px y means NPC floats 20px above cursor
  }
});

// Feature 3: Determine location context from tile position
function getLocationContext(tx, ty) {
  // Congress building area (tx 2-8, ty 2-6)
  if (tx >= 2 && tx <= 8 && ty >= 2 && ty <= 6) {
    return 'the congress building — formal, deliberative atmosphere';
  }
  // Near the pond (tx 4-10, ty 22-27)
  if (tx >= 4 && tx <= 10 && ty >= 22 && ty <= 27) {
    return 'the pond — reflective, tranquil surroundings';
  }
  // Path (horizontal or vertical)
  if (MAP[ty] && (MAP[ty][tx] === 1)) {
    return 'the main path through the commons';
  }
  return 'the open commons';
}

invokeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    var text = invokeInput.value.trim();
    if (!text || !activeInvokeNPC) return;
    var npc = activeInvokeNPC;
    var locationCtx = getLocationContext(npc.tx, npc.ty);
    invokeOverlay.classList.remove('active');
    activeInvokeNPC = null;
    // Show a "..." bubble while waiting
    npc.responseBubble = { lines: ['...'], ttl: 600 };
    fetch('/api/invoke-persona', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: npc.name, prompt: text, location: locationCtx }),
    })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var raw = (d.response || d.error || 'no response').trim();
        // Wrap to ~40 chars per line, max 3 lines
        var words = raw.split(' ');
        var lines = [], cur = '';
        for (var i = 0; i < words.length; i++) {
          var test = cur ? cur + ' ' + words[i] : words[i];
          if (test.length > 40) { lines.push(cur); cur = words[i]; }
          else cur = test;
        }
        if (cur) lines.push(cur);
        if (lines.length > 3) { lines = lines.slice(0, 3); lines[2] = lines[2].slice(0, 37) + '...'; }
        npc.responseBubble = { lines: lines, ttl: 7 * 60 };
      })
      .catch(function(err) {
        npc.responseBubble = { lines: ['(error: ' + err.message.slice(0,30) + ')'], ttl: 4 * 60 };
      });
  }
  if (e.key === 'Escape') {
    invokeOverlay.classList.remove('active');
    activeInvokeNPC = null;
  }
});

// ── Traces (NPC footprints/thoughts/artifacts) ────────────────────────────────
var tracesData = []; // [{persona_name, trace_type, tile_x, tile_y, content, age_ms}]
var tracesLastFetch = 0;
var TRACES_FETCH_INTERVAL = 30000; // ms

function fetchTraces() {
  var now = Date.now();
  if (now - tracesLastFetch < TRACES_FETCH_INTERVAL) return;
  tracesLastFetch = now;
  fetch('/api/commons/traces')
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) { if (d && d.traces) tracesData = d.traces; })
    .catch(function() {});
}

function drawTraces() {
  var STALE_MS = 10 * 60 * 1000; // fade out over last minute before expiry (7 days)
  for (var i = 0; i < tracesData.length; i++) {
    var t = tracesData[i];
    var px = t.tile_x * TILE + TILE / 2;
    var py = t.tile_y * TILE + TILE / 2;
    var alpha = Math.max(0.1, Math.min(1, 1 - (t.age_ms / (7 * 24 * 3600 * 1000))));

    ctx.save();
    ctx.globalAlpha = alpha * 0.55;

    if (t.trace_type === 'footprint') {
      // Small dots representing footsteps
      ctx.fillStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.beginPath();
      ctx.arc(px - 3, py + 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 3, py - 2, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (t.trace_type === 'thought') {
      // Small speech bubble dot
      ctx.fillStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
      // Tiny thought dots above
      ctx.beginPath(); ctx.arc(px, py - 6, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + 3, py - 9, 1, 0, Math.PI * 2); ctx.fill();
    } else if (t.trace_type === 'artifact') {
      // Small diamond
      ctx.strokeStyle = COLOR_OVERRIDES[t.persona_name] || '#aaaaaa';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, py - 4);
      ctx.lineTo(px + 4, py);
      ctx.lineTo(px, py + 4);
      ctx.lineTo(px - 4, py);
      ctx.closePath();
      ctx.stroke();
    }

    ctx.restore();
  }
}

  // Main body (olive/tan military green)
  ctx.fillStyle = '#6b7c3a';
  ctx.fillRect(8, 8, 44, 18); // main body
  ctx.fillRect(12, 2, 36, 10); // cab top

  // Accent panels
  ctx.fillStyle = '#5a6830';
  ctx.fillRect(8, 20, 44, 6); // lower body stripe
  ctx.fillRect(12, 2, 4, 8); // left cab pillar
  ctx.fillRect(44, 2, 4, 8); // right cab pillar

  // Wheels (dark grey)
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(4, 22, 14, 8);  // front wheel
  ctx.fillRect(42, 22, 14, 8); // rear wheel
  // Wheel rims
  ctx.fillStyle = '#555';
  ctx.fillRect(7, 24, 8, 4);   // front rim
  ctx.fillRect(45, 24, 8, 4);  // rear rim
  // Rim center dot
  ctx.fillStyle = '#888';
  ctx.fillRect(10, 25, 2, 2);
  ctx.fillRect(48, 25, 2, 2);

  // Windshield
  ctx.fillStyle = '#4a8fa8';
  ctx.fillRect(14, 4, 14, 7);
  // Windshield glare
  ctx.fillStyle = '#7abfcc';
  ctx.fillRect(15, 5, 4, 2);

  // Hood details
  ctx.fillStyle = '#7a8c42';
  ctx.fillRect(8, 10, 8, 4); // front hood box
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(10, 11, 4, 2); // grill slot 1
  ctx.fillRect(10, 14, 4, 2); // grill slot 2 (small)

  // Gun mount (rear — turret post)
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(44, 4, 4, 8); // turret base
  ctx.fillRect(40, 4, 12, 3); // gun barrel
  // Barrel tip
  ctx.fillStyle = '#555';
  ctx.fillRect(40, 5, 2, 1);

  // Seat occupant heads
  for (var i = 0; i < seats.length; i++) {
    if (seats[i]) {
      var headX = 16 + i * 10;
      var headY = 3;
      // Body hint
      ctx.fillStyle = seats[i].color || '#fff';
      ctx.fillRect(headX, headY, 6, 6);
      // Eye dots
      ctx.fillStyle = '#000';
      ctx.fillRect(headX + 1, headY + 2, 1, 1);
      ctx.fillRect(headX + 4, headY + 2, 1, 1);
    }
  }

  ctx.restore();
}

function sendWarthogInput(dx, dy) {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({
    type: 'warthog_input',
    dx: dx,
    dy: dy,
  }));
}

function sendWarthogJoin() {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({ type: 'warthog_join' }));
}

function sendWarthogLeave() {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({ type: 'warthog_leave' }));
}

document.addEventListener('keydown', function(e) {
  if (congressModalOpen) return;
  // If focus is inside a text input or textarea, let it handle the key
  if (document.activeElement && (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT')) return;
  keysDown[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  // Spacebar hop
  if (e.key === ' ' && localPlayer.hopFrame === 0) {
    localPlayer.hopFrame = 12;
    sendPlayerHop();
    e.preventDefault();
  }
  // E key — enter/exit warthog
  if (e.key === 'e' || e.key === 'E') {
    if (inVehicle) {
      // Exit vehicle
      inVehicle = false;
      localSeatIndex = -1;
      sendWarthogLeave();
    } else {
      // Check proximity to warthog center
      var wcx = warthog.x + WARTHOG_W / 2;
      var wcy = warthog.y + WARTHOG_H / 2;
      var dx = localPlayer.px - wcx;
      var dy = localPlayer.py - wcy;
      if (Math.sqrt(dx * dx + dy * dy) < WARTHOG_BOARD_DIST) {
        // Find first empty seat (server assigns seat; we'll learn our index from next tick)
        var hasEmptySeat = false;
        for (var si = 0; si < warthog.seats.length; si++) {
          if (!warthog.seats[si]) { hasEmptySeat = true; break; }
        }
        if (hasEmptySeat) {
          inVehicle = true;
          localSeatIndex = 0; // tentative; corrected on next tick
          sendWarthogJoin();
        }
      }
    }
  }
});
document.addEventListener('keyup', function(e) {
  delete keysDown[e.key];
});
window.addEventListener('blur', function() {
  for (var k in keysDown) keysDown[k] = false;
});

// ── Congress modal ────────────────────────────────────────────────────────────
var congressModalOpen = false;

function showCongressModal() {
  if (congressModalOpen) return;
  congressModalOpen = true;
  document.getElementById('congress-modal-overlay').style.display = 'flex';
}

function hideCongressModal() {
  congressModalOpen = false;
  document.getElementById('congress-modal-overlay').style.display = 'none';
}

document.getElementById('congress-modal-close').addEventListener('click', hideCongressModal);
document.getElementById('congress-modal-overlay').addEventListener('click', function(e) {
