});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && congressModalOpen) { e.stopPropagation(); hideCongressModal(); }
});

function updateLocalPlayer() {
  // If local player is driver (seat 0), drive the warthog
  if (inVehicle && localSeatIndex === warthog.driverSeat) {
    var inputDx = 0, inputDy = 0;
    if (keysDown['ArrowLeft']  || keysDown['a'] || keysDown['A']) inputDx = -1;
    if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) inputDx = 1;
    if (keysDown['ArrowUp']    || keysDown['w'] || keysDown['W']) inputDy = -1;
    if (keysDown['ArrowDown']  || keysDown['s'] || keysDown['S']) inputDy = 1;

    // Send input to server; server is authoritative for warthog position
    sendWarthogInput(inputDx, inputDy);

    // Apply local prediction for smooth rendering (server will correct on next tick)
    if (inputDx !== 0 && inputDy !== 0) {
      warthog.vx = (inputDx / DIAGONAL_NORM) * WARTHOG_SPEED;
      warthog.vy = (inputDy / DIAGONAL_NORM) * WARTHOG_SPEED;
    } else {
      warthog.vx = inputDx * WARTHOG_SPEED;
      warthog.vy = inputDy * WARTHOG_SPEED;
    }

    warthog.x += warthog.vx;
    warthog.y += warthog.vy;
    warthog.x = Math.max(0, Math.min(W - WARTHOG_W, warthog.x));
    warthog.y = Math.max(0, Math.min(H - WARTHOG_H, warthog.y));

    if (warthog.vx > 0) warthog.facing = 'right';
    else if (warthog.vx < 0) warthog.facing = 'left';

    // Player tracks warthog center
    localPlayer.px = warthog.x + WARTHOG_W / 2;
    localPlayer.py = warthog.y + WARTHOG_H / 2;
    localPlayer.tx = Math.floor(localPlayer.px / TILE);
    localPlayer.ty = Math.floor(localPlayer.py / TILE);
    localPlayer.facing = warthog.facing;

    sendPlayerMove();
    return;
  }

  // Passenger: track warthog position but don't drive
  if (inVehicle) {
    localPlayer.px = warthog.x + WARTHOG_W / 2;
    localPlayer.py = warthog.y + WARTHOG_H / 2;
    localPlayer.tx = Math.floor(localPlayer.px / TILE);
    localPlayer.ty = Math.floor(localPlayer.py / TILE);
    return;
  }

  var inputDx = 0, inputDy = 0;
  if (keysDown['ArrowLeft']  || keysDown['a'] || keysDown['A']) inputDx = -1;
  if (keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) inputDx = 1;
  if (keysDown['ArrowUp']    || keysDown['w'] || keysDown['W']) inputDy = -1;
  if (keysDown['ArrowDown']  || keysDown['s'] || keysDown['S']) inputDy = 1;

  // Normalise diagonal
  if (inputDx !== 0 && inputDy !== 0) {
    localPlayer.vx = (inputDx / DIAGONAL_NORM) * PLAYER_SPEED;
    localPlayer.vy = (inputDy / DIAGONAL_NORM) * PLAYER_SPEED;
  } else {
    localPlayer.vx = inputDx * PLAYER_SPEED;
    localPlayer.vy = inputDy * PLAYER_SPEED;
  }

  // Track facing direction based on horizontal velocity
  if (localPlayer.vx > 0) localPlayer.facing = 'right';
  else if (localPlayer.vx < 0) localPlayer.facing = 'left';

  if (localPlayer.vx === 0 && localPlayer.vy === 0) return;

  var newPx = localPlayer.px + localPlayer.vx;
  var newPy = localPlayer.py + localPlayer.vy;

  // ── Chunk edge detection — MUST happen before collision check ─────────────
  // isBlocked() returns true for out-of-bounds tiles, so edge crossing must
  // be detected here before the collision code can block it with an early return.
  var crossed = false;
  var newCx = chunkX, newCy = chunkY;
  var wrapPx = newPx, wrapPy = newPy;

  if (newPx < 0) {
    newCx = chunkX - 1;
    wrapPx = W - TILE;
    crossed = true;
  } else if (newPx >= W) {
    newCx = chunkX + 1;
    wrapPx = TILE;
    crossed = true;
  }

  if (newPy < 0) {
    newCy = chunkY - 1;
    wrapPy = H - TILE;
    crossed = true;
  } else if (newPy >= H) {
    newCy = chunkY + 1;
    wrapPy = TILE;
    crossed = true;
  }

  if (crossed) {
    loadChunk(newCx, newCy);
    localPlayer.px = wrapPx;
    localPlayer.py = wrapPy;
    localPlayer.tx = Math.floor(wrapPx / TILE);
    localPlayer.ty = Math.floor(wrapPy / TILE);
    // Reset NPC positions to center so they don't get stuck in walls of new chunk
    for (var ni = 0; ni < npcs.length; ni++) {
      var midTx = Math.floor(COLS / 2);
      var midTy = Math.floor(ROWS / 2);
      npcs[ni].tx = midTx + (ni % 5) - 2;
      npcs[ni].ty = midTy + Math.floor(ni / 5) - 2;
      npcs[ni].px = npcs[ni].tx * TILE + TILE / 2;
      npcs[ni].py = npcs[ni].ty * TILE + TILE / 2;
      npcs[ni].targetPx = npcs[ni].px;
      npcs[ni].targetPy = npcs[ni].py;
      npcs[ni].stepsLeft = 0;
      npcs[ni].congressTarget = null;
    }
    sendChunkChange(newCx, newCy);
    sendPlayerMove();
    return;
  }

  var newTx = Math.floor(newPx / TILE);
  var newTy = Math.floor(newPy / TILE);

  // Try full movement; slide on each axis if blocked
  if (!isBlocked(newTx, newTy)) {
    localPlayer.px = newPx;
    localPlayer.py = newPy;
  } else if (!isBlocked(Math.floor(newPx / TILE), localPlayer.ty)) {
    localPlayer.px = newPx;
    newTy = localPlayer.ty;
  } else if (!isBlocked(localPlayer.tx, Math.floor(newPy / TILE))) {
    localPlayer.py = newPy;
    newTx = localPlayer.tx;
  } else {
    return; // fully blocked
  }

  // Clamp to canvas bounds
  localPlayer.px = Math.max(TILE / 2, Math.min(W - TILE / 2, localPlayer.px));
  localPlayer.py = Math.max(TILE / 2, Math.min(H - TILE / 2, localPlayer.py));

  // Sync tile coords
  var prevTx = localPlayer.tx;
  var prevTy = localPlayer.ty;
  localPlayer.tx = Math.floor(localPlayer.px / TILE);
  localPlayer.ty = Math.floor(localPlayer.py / TILE);

  // Broadcast move if tile changed
  if (localPlayer.tx !== prevTx || localPlayer.ty !== prevTy) {
    sendPlayerMove();
  }

  // Congress building entry: trigger modal when player reaches the approach path,
  // steps, or doorway at tx=5 (chunk 0,0 only). ty=7 is just outside, ty=6 is
  // the steps row, ty=5 is the doorway interior.
  if (chunkX === 0 && chunkY === 0 &&
      localPlayer.tx === 5 &&
      (localPlayer.ty === 5 || localPlayer.ty === 6 || localPlayer.ty === 7)) {
    showCongressModal();
  }
}

function drawLocalPlayer() {
  // Hide player avatar while mounted in vehicle
  if (inVehicle) return;
  var cx = Math.round(localPlayer.px);
  // Hop arc: offset Y upward based on hopFrame (12→0)
  var hopOffset = 0;
  if (localPlayer.hopFrame > 0) {
    hopOffset = -Math.sin(localPlayer.hopFrame / 12 * Math.PI) * 10;
    localPlayer.hopFrame--;
  }
  var cy = Math.round(localPlayer.py) - 14 + hopOffset;

  // White glow halo (radial gradient, drawn under character — avoids shadowBlur bleeding onto map)
  var glowCy = cy + 14; // center at feet level (cy is top-of-sprite; feet at cy+14)
  var grad = ctx.createRadialGradient(cx, glowCy, 2, cx, glowCy, 16);
  grad.addColorStop(0, 'rgba(255,255,255,0.30)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(cx, glowCy, 16, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // Draw character on top of halo (no shadow)
  if (localPlayer.facing === 'left') {
    ctx.save();
    ctx.translate(cx * 2, 0);
    ctx.scale(-1, 1);
    drawCharacter(cx, cy, localPlayer.color, 1, false);
    ctx.restore();
  } else {
    drawCharacter(cx, cy, localPlayer.color, 1, false);
  }

  // Name label above
  ctx.save();
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(localPlayer.name, cx, cy - 3);
  ctx.restore();
}

function drawRemotePlayers() {
  var now = Date.now();
  var toDelete = [];
  for (var id in remotePlayers) {
    var p = remotePlayers[id];
    if (now - p.ts > 10000) { toDelete.push(id); continue; }
    // Skip self by socket_id (fix dual-avatar bug)
    if (localPlayer.socketId && p.socket_id === localPlayer.socketId) continue;
    // Only render players in the same chunk as us
    var pCx = (p.chunkX !== undefined ? p.chunkX : 0);
    var pCy = (p.chunkY !== undefined ? p.chunkY : 0);
    if (pCx !== chunkX || pCy !== chunkY) continue;

    // Lerp render position toward target pixel position
    p.renderX += (p.targetX - p.renderX) * 0.2;
    p.renderY += (p.targetY - p.renderY) * 0.2;

    var cx = Math.round(p.renderX);
    // Hop arc for remote player
    var remoteHopOffset = 0;
    if (p.hopFrame && p.hopFrame > 0) {
      remoteHopOffset = -Math.sin(p.hopFrame / 12 * Math.PI) * 10;
      p.hopFrame--;
    }
    var cy = Math.round(p.renderY) - 14 + remoteHopOffset;

    // Draw sprite with facing flip (grey overlay if away)
    ctx.save();
    if (p.isAway) {
      ctx.filter = 'grayscale(100%)';
      ctx.globalAlpha = 0.4;
    }
    if (p.facing === 'left') {
      ctx.save();
      ctx.translate(cx * 2, 0);
      ctx.scale(-1, 1);
      drawCharacter(cx, cy, p.color, 1, false);
      ctx.restore();
    } else {
      drawCharacter(cx, cy, p.color, 1, false);
    }
    ctx.restore();

    // Small dot indicator above head
    ctx.save();
    if (p.isAway) ctx.globalAlpha = 0.4;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(cx, cy - 5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Name label above sprite
    if (p.name) {
      ctx.save();
      if (p.isAway) ctx.globalAlpha = 0.4;
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = p.isAway ? '#666666' : '#cccccc';
      ctx.fillText(p.name, cx, cy - 10);
      ctx.restore();
    }
  }
  for (var j = 0; j < toDelete.length; j++) delete remotePlayers[toDelete[j]];
}

// ── WebSocket connection (commons-server via /commons-ws proxy) ───────────────
var commonsWs = null;
var wsReconnectTimer = null;
var wsMoveSeq = 0; // monotonic input sequence number

function connectCommonsWs() {
  if (commonsWs && (commonsWs.readyState === WebSocket.OPEN || commonsWs.readyState === WebSocket.CONNECTING)) return;

  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var params = 'userId=' + encodeURIComponent(localPlayer.name) +
               '&name=' + encodeURIComponent(localPlayer.name) +
               '&color=' + encodeURIComponent(localPlayer.color);
  var url = proto + '//' + location.host + '/commons-ws?' + params;
  commonsWs = new WebSocket(url);

  commonsWs.onopen = function() {
    // Send initial position
    sendPlayerMove();
  };

  commonsWs.onmessage = function(e) {
    var msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    // commons-server sends 'tick' messages containing players, npcs?, warthog?, congress?
    if (msg.type === 'tick') {
      // --- Players ---
      var prevRemote = remotePlayers;
      remotePlayers = {};
      for (var id in msg.players) {
        var p = msg.players[id];
        // Identify our own socketId by matching name (server assigns socketId)
        if (p.name === localPlayer.name && !localPlayer.socketId) {
          localPlayer.socketId = p.socketId || id;
        }
        // Skip rendering ourselves as a remote player
        if (p.socketId === localPlayer.socketId || (p.name === localPlayer.name && id === localPlayer.socketId)) continue;
        // Tile coords from server; convert to pixel center
        var targetX = p.x * TILE + TILE / 2;
        var targetY = p.y * TILE + TILE / 2;
        var existingHop = (prevRemote[id] && prevRemote[id].hopFrame) || p.hopFrame || 0;
        var renderX = (prevRemote[id] && prevRemote[id].renderX !== undefined) ? prevRemote[id].renderX : targetX;
        var renderY = (prevRemote[id] && prevRemote[id].renderY !== undefined) ? prevRemote[id].renderY : targetY;
        remotePlayers[id] = {
          x: p.x, y: p.y, name: p.name, color: p.color,
          facing: p.facing || 'right',
          socket_id: p.socketId || id,
          hopFrame: existingHop,
          ts: p.lastSeen || Date.now(),
          chunkX: p.chunkX !== undefined ? p.chunkX : 0,
          chunkY: p.chunkY !== undefined ? p.chunkY : 0,
          targetX: targetX,
          targetY: targetY,
          renderX: renderX,
          renderY: renderY,
          isAway: p.isAway || false,
        };
      }

      // --- NPCs (delta: only present when changed) ---
      // Server and client share the same pixel coordinate space (TILE_SIZE=20).
      if (msg.npcs && npcs.length > 0) {
        for (var ni = 0; ni < msg.npcs.length; ni++) {
          var npcData = msg.npcs[ni];
          for (var nj = 0; nj < npcs.length; nj++) {
            if (npcs[nj].name === npcData.name) {
              npcs[nj].serverX = npcData.x;
              npcs[nj].serverY = npcData.y;
              npcs[nj].serverFacing = npcData.facing;
              break;
            }
          }
        }
      }

      // --- Congress state (delta: only present when changed) ---
      if (msg.congress !== undefined) {
        var wasActive = congressState.active;
        congressState.active = !!msg.congress.active;
        if (congressState.active && !wasActive) showCongressModal();
        else if (!congressState.active && wasActive) hideCongressModal();
      }

      // --- Warthog (delta: only present when changed) ---
      if (msg.warthog) {
        var wsData = msg.warthog;
        // Driver keeps local position authority; passengers follow server
        if (!inVehicle) {
          warthog.x = wsData.x;
          warthog.y = wsData.y;
        } else if (localSeatIndex !== warthog.driverSeat) {
          warthog.x = wsData.x;
          warthog.y = wsData.y;
        }
        warthog.vx = wsData.vx;
        warthog.vy = wsData.vy;
        warthog.facing = wsData.facing;
        // seats are now socketId strings (or null); update all except local seat
        for (var si2 = 0; si2 < wsData.seats.length; si2++) {
          if (!(inVehicle && si2 === localSeatIndex)) {
            // Convert socketId to a seat object with color looked up from remote players
            var seatId = wsData.seats[si2];
            if (seatId) {
              var seatColor = (remotePlayers[seatId] && remotePlayers[seatId].color) ||
                              (seatId === localPlayer.socketId ? localPlayer.color : '#ffffff');
              var seatName = (remotePlayers[seatId] && remotePlayers[seatId].name) ||
                             (seatId === localPlayer.socketId ? localPlayer.name : '?');
              warthog.seats[si2] = { name: seatName, socketId: seatId, color: seatColor };
            } else {
              warthog.seats[si2] = null;
            }
          }
        }
        // Update localSeatIndex if our socketId appears in seats
        if (localPlayer.socketId && inVehicle) {
          var newSeatIdx = wsData.seats.indexOf(localPlayer.socketId);
          if (newSeatIdx >= 0) localSeatIndex = newSeatIdx;
        }
      }
    }
  };

  commonsWs.onclose = function() {
    commonsWs = null;
    // Reconnect after 3s
    if (!wsReconnectTimer) {
      wsReconnectTimer = setTimeout(function() { wsReconnectTimer = null; connectCommonsWs(); }, 3000);
    }
  };

  commonsWs.onerror = function() {
    // onclose will fire after onerror, so reconnect handled there
  };
}

function sendPlayerMove() {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({
    type: 'move',
    seq: ++wsMoveSeq,
    x: localPlayer.tx,
    y: localPlayer.ty,
    facing: localPlayer.facing,
    chunkX: chunkX,
    chunkY: chunkY,
  }));
}

function sendPlayerHop() {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({ type: 'hop' }));
}

function sendChunkChange(cx, cy) {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({
    type: 'chunk',
    chunkX: cx,
    chunkY: cy,
  }));
}

function sendPlayerStatus(status) {
  if (!commonsWs || commonsWs.readyState !== WebSocket.OPEN) return;
  commonsWs.send(JSON.stringify({
    type: 'status',
    away: status === 'away',
  }));
}

// Broadcast away/active status when tab visibility changes or window loses/gains focus
document.addEventListener('visibilitychange', function() {
  sendPlayerStatus(document.hidden ? 'away' : 'active');
});
window.addEventListener('blur', function() {
  sendPlayerStatus('away');
});
window.addEventListener('focus', function() {
  sendPlayerStatus('active');
});

// Start WebSocket connection after personas are loaded (startLoop is called)
var wsStarted = false;
function maybeStartWs() {
  if (wsStarted) return;
  wsStarted = true;
  connectCommonsWs();
}

// ── Feature 5: Worn path rendering ────────────────────────────────────────────
function drawWornPaths() {
  for (var ty = 0; ty < ROWS; ty++) {
    for (var tx = 0; tx < COLS; tx++) {
      if (MAP[ty][tx] !== 0) continue; // only grass
      var wl = getWornLevel(tx, ty);
      if (wl === 0) continue;
      var x = tx * TILE, y = ty * TILE;
      if (wl === 2) {
        // dirt — light brown overlay
        ctx.fillStyle = '#6b4c1888';
        ctx.fillRect(x, y, TILE, TILE);
      } else {
        // worn — slight dark overlay
        ctx.fillStyle = '#00000028';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }
  }
}

// ── Game loop ─────────────────────────────────────────────────────────────────
var loopStarted = false;
function startLoop() {
  if (loopStarted) return;
  loopStarted = true;
  maybeStartWs();
  requestAnimationFrame(loop);
}

// Draw a single tree (t=4) or rock (t=5) tile at canvas position (x, y).
// Shared by drawMap, drawForegroundTiles, and the glow-halo repair pass.
function drawTreeRockTile(t, x, y) {
  if (t === 4) {
    // tree
    ctx.fillStyle = '#4a2c0a';
    ctx.fillRect(x + 6, y + 10, 4, 6);
    if (SEASON === 2) {
      ctx.fillStyle = '#8b4513'; ctx.fillRect(x + 2, y + 2, 12, 10);
      ctx.fillStyle = '#a0521a'; ctx.fillRect(x + 4, y, 8, 6);
    } else if (SEASON === 3) {
      ctx.fillStyle = '#b0b8c0'; ctx.fillRect(x + 2, y + 2, 12, 10);
      ctx.fillStyle = '#c8d0d8'; ctx.fillRect(x + 4, y, 8, 6);
    } else {
      ctx.fillStyle = '#1a5c1a'; ctx.fillRect(x + 2, y + 2, 12, 10);
      ctx.fillStyle = '#236623'; ctx.fillRect(x + 4, y, 8, 6);
    }
  } else {
    // rock (t === 5)
    ctx.fillStyle = '#3a3a4a'; ctx.fillRect(x + 2, y + 6, 12, 8);
    ctx.fillStyle = '#4e4e60'; ctx.fillRect(x + 3, y + 4, 10, 7);
    ctx.fillStyle = '#606070'; ctx.fillRect(x + 5, y + 3, 4, 3);
  }
}

// Redraw tree/rock tiles that spatially overlap the warthog and are visually in front of it.
// This corrects the z-order bug where the warthog (drawn on top of the cached map) would
// appear to pass over trees/rocks that should occlude it from the front.
function drawForegroundTiles() {
  // Warthog bounding box in canvas pixels
  var wx = Math.round(warthog.x);
  var wy = Math.round(warthog.y);
  var wCenterY = wy + WARTHOG_H / 2;

  // Tile range that could possibly overlap the warthog bbox
  var txMin = Math.floor(wx / TILE);
  var txMax = Math.floor((wx + WARTHOG_W) / TILE);
  var tyMin = Math.floor(wy / TILE);
  var tyMax = Math.floor((wy + WARTHOG_H) / TILE);

  for (var ty = tyMin; ty <= tyMax; ty++) {
    if (ty < 0 || ty >= ROWS) continue;
    for (var tx = txMin; tx <= txMax; tx++) {
      if (tx < 0 || tx >= COLS) continue;
      var t = MAP[ty][tx];
      if (t !== 4 && t !== 5) continue;

      // Tile center y — if greater than warthog center y, tile is visually in front
      var tileCenterY = ty * TILE + TILE / 2;
      if (tileCenterY <= wCenterY) continue;

      var x = tx * TILE, y = ty * TILE;
      // Fill tile with grass first — tree/rock sprites have transparent pixels
      // and without this fill the warthog bleeds through the gaps
      ctx.fillStyle = grassColor(tx, ty);
      ctx.fillRect(x, y, TILE, TILE);
      drawTreeRockTile(t, x, y);
    }
  }
}

function loop() {
  // Fetch traces periodically
  fetchTraces();

  // Feature 2: apply faction clustering bias
  applyFactionClustering();

  // Update all NPCs
  for (var i = 0; i < npcs.length; i++) {
    npcs[i].update(npcs);
  }

  // Per-frame tooltip staleness check: NPCs move each frame, so the tooltip
  // can become stale if an NPC walks out from under a stationary mouse cursor.
  // Re-run hit detection each frame using the last known mouse position.
  if (lastMouseCanvas && !dragState) {
    var _mx = lastMouseCanvas.mx, _my = lastMouseCanvas.my;
    var _found = null;
    for (var _i = 0; _i < npcs.length; _i++) {
      var _n = npcs[_i];
      var _dx = _mx - _n.px, _dy = _my - (_n.py - 8);
      if (Math.abs(_dx) < 14 && Math.abs(_dy) < 20) { _found = _n; break; }
    }
    if (_found) {
      ttName.textContent = _found.displayName;
      ttRole.textContent = _found.role;
      if (_found.avatarUrl) { ttAvatar.src = _found.avatarUrl; ttAvatar.style.display = 'block'; }
      else { ttAvatar.style.display = 'none'; }
      tooltip.style.display = 'block';
      tooltip.style.left = (lastMouseCanvas.clientX + 14) + 'px';
      tooltip.style.top = (lastMouseCanvas.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }

    // Per-frame audition walker card staleness check: if card is open but cursor has moved
    // off the walker (walker keeps moving), hide the card automatically.
    if (auditionHoveredId && !auditionCard.classList.contains('active')) {
      // Card was already dismissed but hover state wasn't cleared — clean up
      auditionHoveredId = null;
    } else if (auditionHoveredId && auditionCard.classList.contains('active')) {
      var _cardWalker = null;
      for (var _ai = 0; _ai < auditionWalkers.length; _ai++) {
        if (auditionWalkers[_ai].id === auditionHoveredId) { _cardWalker = auditionWalkers[_ai]; break; }
      }
      if (_cardWalker && lastMouseCanvas) {
        var _awdx = lastMouseCanvas.mx - _cardWalker.x;
        var _awdy = lastMouseCanvas.my - auditionWalkerY;
        if (Math.abs(_awdx) >= 20 || Math.abs(_awdy) >= 20) {
          // Cursor is no longer over the walker — hide card
          hideAuditionCard();
          fetch(AUDITION_URL + '/api/audition/resume', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: auditionHoveredId }),
          }).catch(function() {});
          for (var _ri = 0; _ri < auditionWalkers.length; _ri++) {
            if (auditionWalkers[_ri].id === auditionHoveredId) auditionWalkers[_ri].paused = false;
          }
          auditionHoveredId = null;
        }
      }
    }
  }

  // Update local player (keyboard movement)
  updateLocalPlayer();

  // Clear canvas fully each frame so warthog (and other sprites) don't ghost
  ctx.clearRect(0, 0, W, H);

  // Draw map (cached)
  ctx.drawImage(mapCache, 0, 0);

  // Fountain water animation (dynamic, drawn each frame on top of cached map — chunk 0,0 only)
  if (chunkX === 0 && chunkY === 0) drawFountainAnimation();

  // Feature 5: draw worn path overlays on grass tiles
  drawWornPaths();

  // Draw NPC traces (footprints, thoughts, artifacts)
  drawTraces();

  // Sort NPCs by y position (painter's algorithm)
  var sorted = npcs.slice().sort(function(a,b) { return a.py - b.py; });
  for (var i = 0; i < sorted.length; i++) {
    sorted[i].draw();
  }

  // Draw audition walkers (candidates crossing the map)
  fetchAuditionWalkers();
  drawAuditionWalkers();

  // Draw Warthog (under players); apply hop offset if driver is hopping
  var warthogHopOffset = 0;
  if (inVehicle && localPlayer.hopFrame > 0) {
    warthogHopOffset = -Math.sin(localPlayer.hopFrame / 12 * Math.PI) * 10;
  }
  drawWarthog(Math.round(warthog.x), Math.round(warthog.y) + warthogHopOffset, warthog.facing, warthog.seats);

  // Foreground z-order pass: redraw trees/rocks that are visually in front of the warthog
  drawForegroundTiles();

  // "E to drive" hint when near warthog and not in vehicle
  if (!inVehicle) {
    var wcx2 = warthog.x + WARTHOG_W / 2;
    var wcy2 = warthog.y + WARTHOG_H / 2;
    var dxh = localPlayer.px - wcx2;
    var dyh = localPlayer.py - wcy2;
    if (Math.sqrt(dxh * dxh + dyh * dyh) < WARTHOG_BOARD_DIST) {
      ctx.save();
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#00000088';
      ctx.fillText('[E] to drive', Math.round(wcx2) + 1, Math.round(warthog.y) - 4);
      ctx.fillStyle = '#f0e060';
      ctx.fillText('[E] to drive', Math.round(wcx2), Math.round(warthog.y) - 5);
      ctx.restore();
    }
  }

  // Draw remote players (other visitors)
  drawRemotePlayers();

  // Draw local player (always on top)
  drawLocalPlayer();

  // Redraw tree/rock tiles that overlap the player's glow halo (radius ~16px).
  // The radial gradient halo bleeds semi-transparent white onto adjacent tiles;
  // redrawing them here corrects the corruption without disrupting the draw order.
  if (!inVehicle) {
    var plx = Math.round(localPlayer.px);
    var ply = Math.round(localPlayer.py);
    var GLOW_R = 18; // slightly larger than the 16px glow radius
    var ptxMin = Math.floor((plx - GLOW_R) / TILE);
    var ptxMax = Math.floor((plx + GLOW_R) / TILE);
    var ptyMin = Math.floor((ply - GLOW_R - 14) / TILE); // -14 for sprite top offset
    var ptyMax = Math.floor((ply + GLOW_R) / TILE);
    for (var pty = ptyMin; pty <= ptyMax; pty++) {
      if (pty < 0 || pty >= ROWS) continue;
      for (var ptx = ptxMin; ptx <= ptxMax; ptx++) {
        if (ptx < 0 || ptx >= COLS) continue;
        var pt = MAP[pty][ptx];
        if (pt !== 4 && pt !== 5) continue;
        var px0 = ptx * TILE, py0 = pty * TILE;
        ctx.fillStyle = grassColor(ptx, pty);
        ctx.fillRect(px0, py0, TILE, TILE);
        drawTreeRockTile(pt, px0, py0);
      }
    }
  }

  // ── Time of day overlay ──────────────────────────────────────────────────
  var tov = getTimeOverlay();
  if (tov) {
    ctx.save();
    ctx.fillStyle = 'rgba(' + tov.r + ',' + tov.g + ',' + tov.b + ',' + tov.a + ')';
    ctx.fillRect(0, 0, W, H);
    if (tov.stars) {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (var si = 0; si < STAR_POS.length; si++) {
        // Twinkle: show only ~80% each frame
        if (Math.random() < 0.8) {
          ctx.fillRect(STAR_POS[si].x, STAR_POS[si].y, 1, 1);
        }
      }
    }
    ctx.restore();
  }

  // ── Congress flag (above congress building when in session — chunk 0,0 only) ─
  if (congressState.active && chunkX === 0 && chunkY === 0) {
    ctx.save();
    var fx = 5 * TILE; // flag pole x (center of building)
    var fy = TILE;     // above building (row 1)
    ctx.fillStyle = '#222';
    ctx.fillRect(fx, fy, 2, TILE); // pole
    ctx.fillStyle = '#f87171'; // red flag
    ctx.fillRect(fx + 2, fy, 12, 8); // flag body
    ctx.fillStyle = '#fff';
    ctx.fillRect(fx + 4, fy + 2, 2, 4); // simplified scale icon — left arm
    ctx.fillRect(fx + 8, fy + 2, 2, 4); // right arm
    ctx.fillRect(fx + 6, fy + 1, 2, 2); // center top
    ctx.restore();
  }

  // Feature 4: Season indicator (bottom-left corner)
  ctx.save();
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#00000066';
  ctx.fillText(SEASON_LABELS[SEASON], 7, H - 7);
  ctx.fillStyle = '#c8e8d0';
  ctx.fillText(SEASON_LABELS[SEASON], 6, H - 8);
  ctx.restore();

  // Chunk coordinates indicator (bottom-right corner)
  if (chunkX !== 0 || chunkY !== 0) {
    var chunkLabel = 'chunk ' + chunkX + ',' + chunkY;
    ctx.save();
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#00000066';
    ctx.fillText(chunkLabel, W - 6, H - 7);
    ctx.fillStyle = '#8888cc';
    ctx.fillText(chunkLabel, W - 7, H - 8);
    ctx.restore();
  }

  // "The Commons" title overlay (pixel-ish style)
  ctx.save();
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00000088';
  ctx.fillText('The Commons', W/2 + 1, 22);
  ctx.fillStyle = '#4ecca3';
  ctx.fillText('The Commons', W/2, 21);
  ctx.restore();

  // Council building label (chunk 0,0 only)
  if (chunkX === 0 && chunkY === 0) {
    ctx.save();
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00000066';
    ctx.fillText('CONGRESS', 5*TILE + TILE/2 + 1, 2*TILE - 2);
    ctx.fillStyle = '#c8c8e8';
    ctx.fillText('CONGRESS', 5*TILE + TILE/2, 2*TILE - 3);
    // Dungeon entrance label (top-right building, col 43)
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText('⚔ DUNGEON', 43*TILE + TILE/2 + 1, 2*TILE - 2);
    ctx.fillStyle = '#a0ffa0';
    ctx.fillText('⚔ DUNGEON', 43*TILE + TILE/2, 2*TILE - 3);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

})();
</script>

<!-- YouTube IFrame API ambient soundtrack -->
<script>
(function() {
  var ytPlayer = null;
  var playerReady = false;
  var musicStarted = false;
  var btn = document.getElementById('music-btn');

  // Load YouTube IFrame API
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  var firstScript = document.getElementsByTagName('script')[0];
  firstScript.parentNode.insertBefore(tag, firstScript);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      width: '1',
      height: '1',
      videoId: 'cJQQrI7nCeY',
      playerVars: {
        autoplay: 0,
        loop: 1,
        playlist: 'cJQQrI7nCeY',
        controls: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel: 0
      },
      events: {
        onReady: function() {
          playerReady = true;
        }
      }
    });
  };

  btn.addEventListener('click', function() {
    if (!playerReady || !ytPlayer) return;

    if (!musicStarted) {
      // First click: start playing
      ytPlayer.unMute();
      ytPlayer.setVolume(50);
      ytPlayer.playVideo();
      musicStarted = true;
      btn.textContent = '🎵';
    } else {
      // Subsequent clicks: toggle mute
      if (ytPlayer.isMuted()) {
        ytPlayer.unMute();
        btn.textContent = '🎵';
      } else {
        ytPlayer.mute();
        btn.textContent = '🔇';
      }
    }
  });
})();
</script>
